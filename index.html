<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Banner — VAKDAB</title>

    <!-- Font Awesome (для іконок) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ----- Загальні скидання ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .page-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ----- Стилі Hero-банера (повністю з твого коду) ----- */
        .hero-wrapper {
            position: relative;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            background: #0a0a0a;
            aspect-ratio: 16/9;
            min-height: 240px;
        }
        @media (min-width:480px) {
            .hero-wrapper {
                min-height: 280px;
            }
        }
        @media (min-width:768px) {
            .hero-wrapper {
                min-height: 340px;
            }
        }
        @media (min-width:1024px) {
            .hero-wrapper {
                min-height: 400px;
            }
        }

        .hero-slide {
            display: none;
            position: relative;
            width: 100%;
            height: 100%;
            aspect-ratio: 16/9;
            min-height: 240px;
            overflow: hidden;
        }
        .hero-slide.active {
            display: block;
            animation: heroFadeIn 0.6s ease;
        }

        @keyframes heroFadeIn {
            from { opacity: 0; transform: scale(1.04) rotate(0.5deg); }
            to   { opacity: 1; transform: scale(1) rotate(0); }
        }

        .hero-slide-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center top;
            filter: grayscale(100%) blur(2px);
            transform: scale(1.06);
            transition: transform 8s ease;
        }
        .hero-slide.active .hero-slide-bg {
            transform: scale(1);
        }

        .hero-slide-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    rgba(0, 0, 0, 0.55) 0%,
                    rgba(0, 0, 0, 0.35) 40%,
                    rgba(0, 0, 0, 0.72) 75%,
                    rgba(0, 0, 0, 0.92) 100%);
            z-index: 1;
        }

        .hero-slide-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 18px 16px 70px;
            backdrop-filter: blur(12px) brightness(0.55);
            -webkit-backdrop-filter: blur(12px) brightness(0.55);
            background: rgba(255, 255, 255, 0.04);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 2;
        }
        @media (min-width:480px) {
            .hero-slide-content {
                padding: 22px 20px 80px;
            }
        }
        @media (min-width:768px) {
            .hero-slide-content {
                padding: 26px 28px 90px;
            }
        }

        .hero-slide-title {
            font-size: clamp(1.1rem, 2.8vw, 2.2rem);
            font-weight: 800;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 2px;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.6);
        }
        .hero-slide-subtitle {
            font-size: clamp(0.65rem, 1.1vw, 0.9rem);
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
            font-weight: 400;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.4);
        }
        .hero-slide-tags {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .hero-tag {
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.9);
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 500;
            backdrop-filter: blur(6px);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }
        .hero-tag.rating {
            background: rgba(255, 200, 0, 0.15);
            border-color: rgba(255, 200, 0, 0.25);
            color: #ffd700;
        }
        .hero-tag.genre-tag {
            background: rgba(100, 150, 255, 0.12);
            border-color: rgba(100, 150, 255, 0.15);
            color: #aac8ff;
        }
        .hero-slide-desc {
            font-size: clamp(0.65rem, 0.9vw, 0.85rem);
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
            margin-bottom: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.3);
            max-width: 90%;
        }
        @media (min-width:768px) {
            .hero-slide-desc {
                -webkit-line-clamp: 3;
                max-width: 75%;
            }
        }

        .hero-slide-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #fff;
            padding: 9px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(16px);
            transition: all 0.25s ease;
            text-decoration: none;
            letter-spacing: 0.2px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
            font-family: inherit;
        }
        .hero-slide-btn:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
        }

        .hero-nav {
            position: absolute;
            bottom: 110px;
            width: 38px;
            height: 38px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: all 0.25s ease;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            padding: 0;
        }
        .hero-nav:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
            color: #fff;
        }
        .hero-nav-prev { left: 20px; }
        .hero-nav-next { right: 20px; }

        @media (min-width:480px) {
            .hero-nav {
                width: 42px;
                height: 42px;
                font-size: 1.1rem;
                bottom: 120px;
            }
        }
        @media (min-width:768px) {
            .hero-nav {
                bottom: 130px;
                left: 28px;
                right: 28px;
            }
        }

        .hero-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 20;
        }
        .hero-dot {
            width: 22px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.25);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .hero-dot.active {
            background: #fff;
            width: 34px;
        }

        .dark-mode .hero-slide-content {
            background: rgba(0, 0, 0, 0.25);
        }
        .dark-mode .hero-tag {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .dark-mode .hero-slide-btn {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.10);
        }
        .dark-mode .hero-nav {
            background: rgba(0, 0, 0, 0.5);
        }

        /* ----- Підпис під банером (дебаг-інфо) ----- */
        .hero-debug {
            text-align: center;
            margin-top: 1.2rem;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.7rem;
            font-family: monospace;
            letter-spacing: 0.3px;
        }
        .hero-debug span {
            color: rgba(255, 255, 255, 0.4);
        }
        .hero-debug .count {
            color: #ffd700;
        }
    </style>
</head>
<body>

    <div class="page-container">

        <!-- ===== HERO БАНЕР ===== -->
        <div class="hero-wrapper" id="heroWrapper">
            <div id="heroSlidesContainer"></div>
            <button class="hero-nav hero-nav-prev" id="heroPrevBtn" aria-label="Попередній">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button class="hero-nav hero-nav-next" id="heroNextBtn" aria-label="Наступний">
                <i class="fas fa-chevron-right"></i>
            </button>
            <div class="hero-dots" id="heroDots"></div>
        </div>

        <!-- ===== ІНФО-ПІДПИС ===== -->
        <div class="hero-debug" id="heroDebug">
            <span>⚡</span> Hero Banner • <span class="count" id="slideCount">0</span> слайдів
            <span style="margin-left:0.8rem;">🔄 автопрокрутка кожні 6с</span>
        </div>

    </div>

    <!-- ============================================================
    JAVASCRIPT — повний код твого Hero-банера
    ============================================================ -->
    <script>
        // ============================================================
        //  ЗМІННІ ТА API
        // ============================================================
        const PROXY_URL = 'https://monoanime.animegran8.workers.dev';
        const ANIMEUA_BASE = 'https://animeua.club';

        function safeQuery(sel, parent) {
            try { return (parent || document).querySelector(sel); } catch { return null; }
        }

        function safeQueryAll(sel, parent) {
            try { return Array.from((parent || document).querySelectorAll(sel)); } catch { return []; }
        }

        function getProxyUrl(url) {
            if (!url) return null;
            return PROXY_URL + '?url=' + encodeURIComponent(url);
        }

        // ============================================================
        //  API — ЗАВАНТАЖЕННЯ ДАНИХ
        // ============================================================
        async function fetchUA(url) {
            const proxyUrl = getProxyUrl(url);
            const resp = await fetch(proxyUrl);
            if (!resp.ok) throw new Error(`Помилка ${resp.status}`);
            const html = await resp.text();
            return new DOMParser().parseFromString(html, 'text/html');
        }

        function parseAnimeuaCards(doc) {
            const cards = safeQueryAll('.poster', doc);
            if (cards.length) {
                return cards.map(card => {
                    const linkEl = card.tagName === 'A' ? card : safeQuery('a', card);
                    const href = linkEl?.getAttribute('href') || '';
                    const img = safeQuery('img', card);
                    const posterSrc = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
                    const titleEl = safeQuery('.poster__title', card) || safeQuery('h3', card);
                    const title = (titleEl?.textContent || '').trim() || 'Без назви';
                    return {
                        mal_id: href.hashCode(),
                        title,
                        url: href.startsWith('http') ? href : ANIMEUA_BASE + href,
                        images: { jpg: { large_image_url: posterSrc.startsWith('http') ? posterSrc : (posterSrc ?
                                ANIMEUA_BASE + posterSrc : '') } },
                        score: null,
                        year: null,
                        from: 'animeua'
                    };
                });
            }
            const links = safeQueryAll('a[href*="/anime/"]', doc);
            const unique = new Map();
            links.forEach(a => { if (!unique.has(a.href)) unique.set(a.href, a); });
            return Array.from(unique.values()).map(a => {
                const img = safeQuery('img', a);
                const src = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
                const title = (safeQuery('.poster__title', a)?.textContent || a.textContent || '').trim();
                return {
                    mal_id: a.href.hashCode(),
                    title: title || 'Без назви',
                    url: a.href,
                    images: { jpg: { large_image_url: src.startsWith('http') ? src : ANIMEUA_BASE + src } },
                    score: null,
                    year: null,
                    from: 'animeua'
                };
            });
        }

        async function fetchAnimeuaMain(page) {
            const doc = await fetchUA(`${ANIMEUA_BASE}/page/${page}/`);
            return parseAnimeuaCards(doc);
        }

        async function fetchAnimeuaTop100() {
            const doc = await fetchUA(`${ANIMEUA_BASE}/top.html`);
            return parseAnimeuaCards(doc);
        }

        async function loadAnimeuaDetail(animeUrl) {
            const doc = await fetchUA(animeUrl);
            let title = '';
            for (const sel of ['.page__subcol-main h1', '.pmovie__title', 'h1.title', 'h1']) {
                const el = safeQuery(sel, doc);
                if (el?.textContent.trim()) { title = el.textContent.trim(); break; }
            }
            let poster = '';
            for (const sel of ['div.page__subcol-side .img-fit-cover img', '.pmovie__poster img', '.anime__poster img']) {
                const el = safeQuery(sel, doc);
                if (el) {
                    const src = el.getAttribute('data-src') || el.getAttribute('src') || '';
                    if (src) { poster = src.startsWith('http') ? src : ANIMEUA_BASE + src; break; }
                }
            }
            const genres = safeQueryAll('.pmovie__genres a, .genres a', doc).map(a => a.textContent.trim()).filter(Boolean);
            const yearEl = safeQuery('.pmovie__year, .release-year', doc);
            const yearMatch = (yearEl?.textContent || '').match(/\d{4}/);
            const year = yearMatch ? parseInt(yearMatch[0]) : null;
            let synopsis = '';
            for (const sel of ['.full-text', '.pmovie__description', '.anime__description']) {
                const el = safeQuery(sel, doc);
                if (el?.textContent.trim()) { synopsis = el.textContent.trim(); break; }
            }
            let rating = '';
            const ratingEl = doc.querySelector('.pmovie__age p, .pmovie__age');
            if (ratingEl) rating = ratingEl.textContent.replace('Рейтинг:', '').trim();

            return {
                mal_id: animeUrl.hashCode(),
                title,
                images: { jpg: { large_image_url: poster, image_url: poster } },
                genres,
                year,
                synopsis,
                url: animeUrl,
                from: 'animeua',
                score: rating,
            };
        }

        // ============================================================
        //  ОСНОВНА ЛОГІКА ХЕРО-БАНЕРА
        // ============================================================
        let heroItems = [],
            heroCurrentIndex = 0,
            heroCurrentItem = null,
            heroRotationTimer = null;

        async function buildHeroBanner() {
            const wrapper = document.getElementById('heroWrapper');
            if (!wrapper) return;
            try {
                const topAnime = await fetchAnimeuaTop100();
                const ordinaryAnime = await fetchAnimeuaMain(1);

                const getRandomItems = (arr, n) => {
                    const validItems = arr.filter(a => a.images?.jpg?.large_image_url);
                    const shuffled = [...validItems].sort(() => 0.5 - Math.random());
                    return shuffled.slice(0, n);
                };

                const selectedTop = getRandomItems(topAnime, 4);
                const selectedOrdinary = getRandomItems(ordinaryAnime, 4);
                heroItems = [...selectedTop, ...selectedOrdinary].sort(() => 0.5 - Math.random());

                if (heroItems.length === 0) { wrapper.style.display = 'none'; return; }
                wrapper.style.display = 'block';
                heroCurrentIndex = 0;
                await loadHeroItemDetails(0);
                renderHeroSlide(heroItems[0]);
                buildHeroIndicators();
                startHeroRotation();

                // Оновлюємо лічильник у підписі
                document.getElementById('slideCount').textContent = heroItems.length;

            } catch (err) {
                console.warn('Hero banner error:', err);
                wrapper.style.display = 'none';
                document.getElementById('heroDebug').innerHTML =
                    '<span style="color:#ff6b6b;">⚠️ Помилка завантаження: ' + err.message + '</span>';
            }
        }

        async function loadHeroItemDetails(idx) {
            if (idx < 0 || idx >= heroItems.length) return;
            const item = heroItems[idx];
            if (item.detailsLoaded) return;
            try {
                const detail = await loadAnimeuaDetail(item.url);
                item.genres = detail.genres || [];
                item.synopsis = detail.synopsis || '';
                item.year = detail.year || item.year || '';
                item.detailsLoaded = true;
                item.rating = (7 + Math.random() * 2.5).toFixed(1);
            } catch (e) {
                console.warn('Failed to load details for hero item:', item.title, e);
                item.genres = ['Аніме'];
                item.synopsis = 'Опис відсутній. Натисніть «Детальніше», щоб перейти до перегляду.';
                item.rating = (7 + Math.random() * 2.5).toFixed(1);
                item.detailsLoaded = true;
            }
        }

        function renderHeroSlide(item) {
            const container = document.getElementById('heroSlidesContainer');
            if (!container || !item) return;
            heroCurrentItem = item;

            const poster = item.images?.jpg?.large_image_url || '';
            const title = item.title || 'Без назви';
            const year = item.year || '';
            const rating = item.rating || (7 + Math.random() * 2.5).toFixed(1);
            const genres = item.genres || ['Аніме'];
            const synopsis = item.synopsis || 'Опис відсутній.';

            const slide = document.createElement('div');
            slide.className = 'hero-slide active';
            slide.dataset.url = item.url;

            slide.innerHTML = `
            <div class="hero-slide-bg" style="background-image: url('${poster}');"></div>
            <div class="hero-slide-overlay"></div>
            <div class="hero-slide-content">
              <div class="hero-slide-title">${title}</div>
              <div class="hero-slide-subtitle">${year ? year + ' · ' : ''}Аніме</div>
              <div class="hero-slide-tags">
                <span class="hero-tag">${year || '2026'}</span>
                <span class="hero-tag rating">★ ${rating}</span>
                ${genres.slice(0, 3).map(g => `<span class="hero-tag genre-tag">${g}</span>`).join('')}
              </div>
              <div class="hero-slide-desc">${synopsis}</div>
              <button class="hero-slide-btn">Детальніше →</button>
            </div>
          `;

            container.innerHTML = '';
            container.appendChild(slide);

            // Обробник для кнопки "Детальніше"
            slide.querySelector('.hero-slide-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                if (item.url) {
                    // Якщо є глобальний відкривач плеєра — використовуємо його
                    if (typeof window.openPlayerPage === 'function') {
                        window.openPlayerPage(item.url);
                    } else {
                        // Інакше — показуємо alert із посиланням
                        alert('🔗 Відкрити аніме:\n' + item.url);
                        // Або можна відкрити в новій вкладці:
                        // window.open(item.url, '_blank');
                    }
                }
            });

            // Клік по всьому слайду теж відкриває
            slide.addEventListener('click', () => {
                if (item.url) {
                    if (typeof window.openPlayerPage === 'function') {
                        window.openPlayerPage(item.url);
                    } else {
                        alert('🔗 Відкрити аніме:\n' + item.url);
                    }
                }
            });
        }

        function buildHeroIndicators() {
            const dotsContainer = document.getElementById('heroDots');
            if (!dotsContainer) return;
            dotsContainer.innerHTML = '';
            heroItems.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = 'hero-dot' + (idx === heroCurrentIndex ? ' active' : '');
                dot.addEventListener('click', () => goToSlide(idx));
                dotsContainer.appendChild(dot);
            });
        }

        function updateHeroIndicators() {
            const dots = document.querySelectorAll('.hero-dot');
            dots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === heroCurrentIndex);
            });
        }

        async function goToSlide(idx) {
            if (idx < 0 || idx >= heroItems.length) return;
            if (idx === heroCurrentIndex) return;
            const container = document.getElementById('heroSlidesContainer');
            if (!container) return;
            const slides = container.querySelectorAll('.hero-slide');
            if (slides.length === 0) return;

            slides.forEach(s => s.classList.remove('active'));
            heroCurrentIndex = idx;
            await loadHeroItemDetails(idx);
            renderHeroSlide(heroItems[idx]);
            updateHeroIndicators();
            resetHeroTimer();
        }

        function nextSlide() {
            goToSlide((heroCurrentIndex + 1) % heroItems.length);
        }

        function prevSlide() {
            goToSlide((heroCurrentIndex - 1 + heroItems.length) % heroItems.length);
        }

        function startHeroRotation() {
            stopHeroRotation();
            if (heroItems.length < 2) return;
            heroRotationTimer = setInterval(nextSlide, 6000);
        }

        function stopHeroRotation() {
            if (heroRotationTimer) { clearInterval(heroRotationTimer);
                heroRotationTimer = null; }
        }

        function resetHeroTimer() {
            stopHeroRotation();
            startHeroRotation();
        }

        // ============================================================
        //  ПІДКЛЮЧЕННЯ КНОПОК ТА ЗАПУСК
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const prevBtn = document.getElementById('heroPrevBtn');
            const nextBtn = document.getElementById('heroNextBtn');
            if (prevBtn) prevBtn.addEventListener('click', prevSlide);
            if (nextBtn) nextBtn.addEventListener('click', nextSlide);

            // Запускаємо банер
            buildHeroBanner();
        });

        // Глобальний доступ (для налагодження в консолі)
        window.hero = {
            buildHeroBanner,
            goToSlide,
            nextSlide,
            prevSlide,
            resetHeroTimer,
            stopHeroRotation,
            startHeroRotation,
            heroItems: () => heroItems,
            currentIndex: () => heroCurrentIndex,
        };
    </script>

</body>
</html>
