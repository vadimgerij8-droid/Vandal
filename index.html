<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VAKDAB • твій аніме каталог</title>
    <link rel="preconnect" href="https://monoanime.animegran8.workers.dev" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <meta property="og:title" content="VAKDAB - твій аніме каталог" />
    <meta property="og:description" content="Сучасна платформа для перегляду аніме" />
    <meta property="og:type" content="website" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" defer></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <meta name="theme-color" content="#0d0d0d" />

    <style>
        /* ============================================================
                   MONOCHROME THEME — лише відтінки сірого/чорного/білого
                   ============================================================ */
        :root {
            --accent: #0b0b0b;
            --accent-rgb: 11, 11, 11;
            --accent-hover: #1a1a1a;
            --accent-text: #ffffff;
            --accent-gradient: linear-gradient(135deg, #0b0b0b, #1a1a1a);
            --accent-light: rgba(11, 11, 11, 0.15);
            --accent-glow: rgba(11, 11, 11, 0.35);

            --primary: var(--accent);
            --primary-rgb: var(--accent-rgb);
            --primary-hover: var(--accent-hover);

            --bg: #ffffff;
            --surface: rgba(255, 255, 255, 0.98);
            --text: #0b0b0b;
            --text-secondary: #4a4a4a;
            --text-muted: #7a7a7a;
            --border: #e9e9e9;
            --border-light: #f3f3f3;
            --border-hover: #d0d0d0;
            --hover: rgba(0, 0, 0, 0.03);
            --active: #0b0b0b;
            --active-text: #ffffff;
            --tag-bg: #f6f6f6;
            --glass: rgba(255, 255, 255, 0.6);
            --glass-dark: rgba(20, 20, 20, 0.35);
            --blur-amount: 8px;
            --shadow-sm: 0 6px 18px rgba(11, 11, 11, 0.06);
            --shadow-md: 0 14px 32px rgba(11, 11, 11, 0.10);
            --shadow-lg: 0 30px 60px rgba(11, 11, 11, 0.14);
            --radius-sm: 12px;
            --radius: 16px;
            --radius-md: 14px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --transition: 280ms cubic-bezier(.2, .9, .2, 1);
            --transition-smooth: 360ms cubic-bezier(.2, .9, .2, 1);
            --agnative-scale: 1.15;
        }

        .dark-mode {
            --accent: #f7f7f7;
            --accent-rgb: 247, 247, 247;
            --accent-hover: #cfcfcf;
            --accent-text: #0a0a0a;
            --accent-gradient: linear-gradient(135deg, #f7f7f7, #cfcfcf);
            --accent-light: rgba(247, 247, 247, 0.15);
            --accent-glow: rgba(247, 247, 247, 0.35);

            --primary: var(--accent);
            --primary-rgb: var(--accent-rgb);
            --primary-hover: var(--accent-hover);

            --bg: #0a0a0a;
            --surface: rgba(20, 20, 20, 0.95);
            --text: #f7f7f7;
            --text-secondary: #cfcfcf;
            --text-muted: #9a9a9a;
            --border: #222222;
            --border-light: #151515;
            --border-hover: #3a3a3a;
            --hover: rgba(255, 255, 255, 0.02);
            --active: #f7f7f7;
            --active-text: #0a0a0a;
            --tag-bg: #141414;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-dark: rgba(0, 0, 0, 0.45);
            --shadow-sm: 0 6px 18px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 14px 32px rgba(0, 0, 0, 0.55);
            --shadow-lg: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            height: 100%;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background var(--transition-smooth), color var(--transition-smooth);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem 3rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes subtlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes skeletonShimmer {
            0% { background-position: -200px 0; }
            100% { background-position: calc(200px + 100%) 0; }
        }
        @keyframes kenBurns {
            0% { transform: scale(1) translateX(0); object-position: center center; }
            50% { transform: scale(1.08) translateX(2%); object-position: center top; }
            100% { transform: scale(1) translateX(0); object-position: center center; }
        }

        .agnative-hero {
            position: relative;
            width: auto;
            margin: clamp(1em, 2vw, 2.5em) clamp(1em, 3vw, 2.5em) clamp(1.5em, 3vw, 3em);
            height: 52vh;
            min-height: clamp(300px, 40vh, 450px);
            overflow: hidden;
            border-radius: clamp(1em, 2vw, 1.5em);
            display: block;
            z-index: 8;
            box-shadow: 0 16px 40px rgba(0, 0, 0, .32), 0 6px 14px rgba(0, 0, 0, .18);
            transition: box-shadow 0.4s ease, transform 0.4s ease;
            perspective: 1000px;
        }
        .agnative-hero__bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            border-radius: inherit;
            transition: opacity 0.8s ease;
            pointer-events: none;
            will-change: opacity, transform;
            backface-visibility: hidden;
            animation: kenBurns 20s ease-in-out infinite alternate;
            transform-origin: center center;
        }
        .agnative-hero--switching .agnative-hero__bg {
            animation-play-state: paused;
        }
        .agnative-hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg,
                    rgba(0, 0, 0, .7) 0%,
                    rgba(0, 0, 0, .35) 30%,
                    rgba(0, 0, 0, .05) 60%,
                    transparent 80%);
            pointer-events: none;
            z-index: 1;
            border-radius: inherit;
        }
        .agnative-hero__content {
            position: absolute;
            left: clamp(1.5em, 3vw, 2.4em);
            top: clamp(1.5em, 2.5vw, 2em);
            max-width: 45%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 2;
        }
        .agnative-hero__content>* {
            transform-style: preserve-3d;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .agnative-hero__logo {
            max-width: 60%;
            max-height: 6em;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, .7));
            margin: 0 0 0.5em;
            display: none;
        }
        .agnative-hero__title {
            font-size: clamp(1.8em, 4vw, 2.8em);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 2px 18px rgba(0, 0, 0, .85);
            line-height: 1.15;
            margin: 0 0 0.25em;
            letter-spacing: .005em;
            transform: translateZ(20px);
        }
        .agnative-hero__year {
            font-size: clamp(0.9em, 1.5vw, 1.1em);
            font-weight: 700;
            color: rgba(255, 255, 255, .85);
            margin-bottom: 0.4em;
            text-shadow: 0 1px 8px rgba(0, 0, 0, .6);
            transform: translateZ(10px);
        }
        .agnative-hero__overview {
            font-size: clamp(0.85em, 1.3vw, 1em);
            line-height: 1.4;
            color: rgba(255, 255, 255, .94);
            text-shadow: 0 1px 8px rgba(0, 0, 0, .6);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            max-width: 100%;
            font-weight: 500;
            transform: translateZ(5px);
        }
        .agnative-hero:not(.agnative-hero--switching) .agnative-hero__title { transition-delay: 0.1s; }
        .agnative-hero:not(.agnative-hero--switching) .agnative-hero__year { transition-delay: 0.2s; }
        .agnative-hero:not(.agnative-hero--switching) .agnative-hero__overview { transition-delay: 0.3s; }
        .agnative-hero__play.selector {
            position: absolute;
            inset: 0;
            display: block;
            padding: 0;
            background: transparent !important;
            border: 0 !important;
            color: transparent !important;
            font-size: 0 !important;
            cursor: pointer;
            outline: none;
            z-index: 3;
        }
        .agnative-hero:has(.agnative-hero__play:hover) {
            transform: scale(1.012);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, .9),
                0 24px 60px rgba(0, 0, 0, .5),
                0 8px 24px rgba(0, 0, 0, .3);
        }
        .agnative-hero__indicators {
            position: absolute;
            left: 50%;
            bottom: 1.4em;
            transform: translateX(-50%);
            display: inline-flex;
            gap: .42em;
            align-items: center;
            z-index: 3;
            padding: .46em .62em;
            border-radius: 999px;
            background: rgba(18, 18, 20, .5);
            box-shadow: 0 2px 12px rgba(0, 0, 0, .35), inset 0 1px 0 rgba(255, 255, 255, .08);
            backdrop-filter: blur(14px) saturate(140%);
            -webkit-backdrop-filter: blur(14px) saturate(140%);
        }
        .agnative-hero__indicator {
            display: inline-block;
            width: .5em;
            height: .5em;
            border-radius: 999px;
            background: rgba(255, 255, 255, .42);
            border: 0;
            padding: 0;
            cursor: pointer;
            outline: none;
            transition: background .25s ease, width .3s cubic-bezier(.22, .61, .36, 1), box-shadow .25s ease;
        }
        .agnative-hero__indicator--active {
            background: #fff;
            width: 1.25em;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .4);
        }
        .agnative-hero--switching .agnative-hero__bg { opacity: 0; }
        .agnative-hero--switching .agnative-hero__title,
        .agnative-hero--switching .agnative-hero__year,
        .agnative-hero--switching .agnative-hero__overview,
        .agnative-hero--switching .agnative-hero__logo {
            opacity: 0;
            transform: translateY(10px) translateZ(0);
        }

        .appletv-agnative-topnav .agnative-topnav-clock {
            position: absolute;
            right: 1.15em;
            top: .7em;
            z-index: 20;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 5em;
            height: 3em;
            padding: 0 1.1em;
            border-radius: 999px;
            background: rgba(22, 24, 30, .26);
            border: 1px solid rgba(255, 255, 255, .10);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .10), 0 8px 18px rgba(0, 0, 0, .12);
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            color: rgba(255, 255, 255, .95);
            font-size: 1.05em;
            font-weight: 700;
            letter-spacing: .01em;
            cursor: default;
            user-select: none;
        }
        .agnative-has-hero .appletv-agnative-topnav .agnative-topnav-clock {
            font-size: calc(.95em * var(--agnative-scale, 1)) !important;
        }

        .anime-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            cursor: pointer;
            overflow: hidden;
            position: relative;
            animation: fadeInUp 0.5s ease both;
            aspect-ratio: 2/3;
        }
        .anime-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }
        .anime-poster {
            width: 100%;
            height: 100%;
            position: relative;
            background: #e0e0e0;
            border-radius: var(--radius);
            overflow: hidden;
        }
        .dark-mode .anime-poster { background: #2a2a2a; }
        .anime-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .anime-card:hover .anime-poster img { transform: scale(1.05); }
        .nfx-card-overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.6em 0.9em 0.8em;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.75) 0%, rgba(0, 0, 0, 0.2) 70%, transparent 100%);
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .nfx-card-overlay__title {
            color: #ffffff;
            font-size: 0.9em;
            font-weight: 800;
            line-height: 1.2;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 0.2em;
            background: rgba(18, 18, 18, 0.72);
            padding: 0.3em 0.55em;
            border-radius: 7px;
            -webkit-box-decoration-break: clone;
            box-decoration-break: clone;
        }
        .nfx-card-overlay__ua {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.65em;
            font-weight: 700;
            padding: 0.15em 0.6em;
            border-radius: 4px;
            letter-spacing: 0.05em;
            backdrop-filter: blur(4px);
            align-self: flex-start;
        }

        .glass {
            background: linear-gradient(180deg, var(--glass), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .img--blur {
            filter: blur(10px) scale(1.02);
            transform-origin: center;
            transition: filter 600ms ease, transform 600ms ease;
        }
        .img--loaded {
            filter: blur(0) scale(1);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 1.8rem;
            padding-bottom: 1.4rem;
            border-bottom: 1px solid var(--border);
            transition: all var(--transition);
            position: relative;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .burger-btn {
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.3rem;
            box-shadow: var(--shadow-sm);
            position: relative;
            z-index: 30;
        }
        .burger-btn:hover {
            background: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
            transform: scale(1.1);
            box-shadow: 0 8px 24px var(--accent-glow);
        }
        .burger-btn.active {
            background: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            cursor: pointer;
            user-select: none;
            text-decoration: none;
            transition: transform var(--transition);
            margin-left: -0.25em;
        }
        .logo:hover { transform: translateY(-2px); }
        .logo-title-row {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            line-height: 1;
        }
        .logo-text h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--text);
            margin: 0;
            transition: color var(--transition);
            line-height: 1;
        }
        .logo-icon {
            font-size: 2.2rem;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            transform: translateY(-0.15em);
        }
        .logo:hover .logo-icon {
            transform: rotate(-8deg) scale(1.12) translateY(-0.15em);
            filter: brightness(1.1);
        }
        .logo-text span {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            display: block;
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            flex-wrap: wrap;
        }
        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 0.55rem 1rem;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            min-width: 280px;
            backdrop-filter: blur(4px);
        }
        .search-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light), var(--shadow-md);
            transform: translateY(-2px);
        }
        .search-wrapper i {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-right: 0.65rem;
            transition: color var(--transition);
        }
        .search-wrapper:focus-within i { color: var(--accent); }
        #searchInput {
            border: none;
            outline: none;
            font-size: 0.97rem;
            background: transparent;
            width: 100%;
            font-weight: 500;
            color: var(--text);
            font-family: inherit;
            padding: 0;
        }
        #searchInput::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }
        .search-clear {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.2rem;
            margin-left: 0.4rem;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .search-clear.visible {
            opacity: 0.7;
            visibility: visible;
            pointer-events: auto;
        }
        .search-clear:hover {
            opacity: 1;
            color: var(--accent);
            background: var(--hover);
            transform: scale(1.1);
        }
        .search-shortcut {
            font-size: 0.65rem;
            background: var(--tag-bg);
            color: var(--text-muted);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            margin-left: 0.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
        }
        .btn-icon {
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.15rem;
            position: relative;
            box-shadow: var(--shadow-sm);
        }
        .btn-icon:hover {
            background: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .leftdock-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(3px);
            z-index: 40;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .leftdock-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .agnative-leftdock {
            position: fixed !important;
            left: 1em !important;
            top: 45% !important;
            transform: translateX(-130%) translateY(-50%) !important;
            z-index: 50 !important;
            width: max-content !important;
            max-width: 16em !important;
            max-height: 80vh !important;
            overflow-y: auto !important;
            display: inline-flex !important;
            flex-direction: column !important;
            padding: .32em !important;
            border-radius: 1.35em !important;
            background: rgba(22, 24, 30, .42) !important;
            border: 1px solid rgba(255, 255, 255, .10) !important;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .10), 0 12px 32px rgba(0, 0, 0, .28) !important;
            backdrop-filter: blur(22px) saturate(140%) !important;
            -webkit-backdrop-filter: blur(22px) saturate(140%) !important;
            font-size: calc(clamp(0.92rem, 0.5rem + 1.4vmin, 1.7rem) * var(--agnative-scale, 1)) !important;
            opacity: 0 !important;
            pointer-events: none !important;
            transition: transform .28s cubic-bezier(.22, .61, .36, 1), opacity .2s ease !important;
        }
        .agnative-leftdock.is-visible {

        String.prototype.hashCode = function() {
            let h = 0;
            for (let i = 0; i < this.length; i++) { h = ((h << 5) - h) + this.charCodeAt(i);
                h |= 0; }
            return Math.abs(h);
        };

        // ==================== API (animeua.club) ====================
        async function fetchUA(url) {
            const proxyUrl = getProxyUrl(url);
            const resp = await fetch(proxyUrl);
            if (!resp.ok) throw new Error(`Помилка ${resp.status}`);
            const html = await resp.text();
            return new DOMParser().parseFromString(html, 'text/html');
        }

        function parseAnimeuaCards(doc) {
            const cards = safeQueryAll('.poster', doc);
            if (cards.length) return cards.map(card => {
                const linkEl = card.tagName === 'A' ? card : safeQuery('a', card);
                const href = linkEl?.getAttribute('href') || '';
                const img = safeQuery('img', card);
                const posterSrc = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
                const titleEl = safeQuery('.poster__title', card) || safeQuery('h3', card);
                const title = (titleEl?.textContent || '').trim() || 'Без назви';
                return {
                    mal_id: href.hashCode(),
                    title,
                    url: href.startsWith('http') ? href : ANIMEUA_BASE + href,
                    images: { jpg: { large_image_url: posterSrc.startsWith('http') ? posterSrc : (posterSrc ?
                                ANIMEUA_BASE + posterSrc : '') } },
                    score: null,
                    year: null,
                    from: 'animeua'
                };
            });
            const links = safeQueryAll('a[href*="/anime/"]', doc);
            const unique = new Map();
            links.forEach(a => { if (!unique.has(a.href)) unique.set(a.href, a); });
            return Array.from(unique.values()).map(a => {
                const img = safeQuery('img', a);
                const src = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
                const title = (safeQuery('.poster__title', a)?.textContent || a.textContent || '').trim();
                return {
                    mal_id: a.href.hashCode(),
                    title: title || 'Без назви',
                    url: a.href,
                    images: { jpg: { large_image_url: src.startsWith('http') ? src : ANIMEUA_BASE + src } },
                    score: null,
                    year: null,
                    from: 'animeua'
                };
            });
        }

        // ==================== API (uaserials.com) ====================
        async function fetchUASerials(url) {

            const resp = await fetch(proxyUrl, {
                headers: {
                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                    'Accept-Language': 'uk-UA,uk;q=0.9',
                    'Referer': 'https://uaserials.com/'
                }
            });
            if (!resp.ok) throw new Error(`Помилка ${resp.status} (uaserials)`);

        function parseUASerialsList(doc) {

        // ==================== ДЕШИФРУВАННЯ ПЛЕЄРА UASERIALS ====================

        /**
         * Завантажує розшифровані дані плеєра з uaserials через проксі.
         * Використовує fetch замість iframe, щоб уникнути SecurityError.
         * Повертає Promise з масивом даних або відхиляє.
         */
        async function loadUASerialsDataFromPage(url) {
            try {
                const resp = await fetch(
                    `${PROXY_URL}/extract-player?url=${encodeURIComponent(url)}`
                );
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                if (!Array.isArray(data) || data.length === 0) {
                    throw new Error('Порожні дані плеєра');
                }
                return data;
            } catch (e) {
                throw new Error('Не вдалося завантажити дані плеєра: ' + e.message);
            }
        }

        /**
         * Конвертує розшифровані дані з uaserials у формат сезонів для нашого плеєра.
         * Підтримує два формати:
         * 1. Старий: {title, seasons: { "1": { episodes: [...] } }}
         * 2. Новий: {tabName: "Плеєр", url: "https://tortuga.tw/embed/..."}
         * Вихід: { "1": { "Дубляж": [{episode:"1", file:"https://..."}], ... }, ... }
         */
        function convertUASerialsData(decryptedArray) {
            const seasons = {};
            if (!Array.isArray(decryptedArray)) return seasons;
            for (const item of decryptedArray) {
                const title = item.title || item.tabName || 'Озвучка';
                if (item.seasons) {
                    for (const [seasonNum, seasonData] of Object.entries(item.seasons)) {
                        if (!seasons[seasonNum]) seasons[seasonNum] = {};
                        const episodes = (seasonData.episodes || []).map(ep => ({
                            episode: ep.title || '?',
                            file: ep.source?.url || ''
                        }));
                        if (episodes.length > 0) seasons[seasonNum][title] = episodes;
                    }
                }
            }
            return seasons;
        }

        // ==================== ДЕТАЛЬНА СТОРІНКА UASERIALS ====================

        async function fetchUASerialsDetail(url) {
            const doc = await fetchUASerials(url);
            const data = { url };

            // --- Основна інформація ---
            const titleUa = safeQuery('.short-title .oname_ua', doc);
            const titleOrig = safeQuery('.oname', doc);
            data.title = (titleUa?.textContent || titleOrig?.textContent || '').trim() || 'Без назви';

            const poster = safeQuery('.fimg img', doc);
            let posterSrc = poster?.getAttribute('src') || '';
            if (posterSrc && !posterSrc.startsWith('http')) posterSrc = UASERIALS_BASE + posterSrc;
            data.images = { jpg: { large_image_url: posterSrc } };

            const imdb = safeQuery('.short-rate-imdb span', doc);
            data.score = imdb?.textContent?.trim() || null;

            const desc = safeQuery('.full-text', doc);
            data.synopsis = desc?.textContent?.trim() || '';

            // Парсимо поля зі списку
            const fields = {};
            for (const li of safeQueryAll('.short-list li', doc)) {
                const label = safeQuery('span', li);
                if (!label) continue;
                const key = label.textContent.replace(/[:\s]+$/, '').trim();
                const values = safeQueryAll('a', li).map(a => a.textContent.trim()).filter(Boolean);
                const spans = safeQueryAll('span', li).slice(1).map(s => s.textContent.trim()).filter(Boolean);
                const allVals = values.length ? values : spans;
                fields[key] = allVals.length > 1 ? allVals : (allVals[0] || '');
            }
            data.year = fields['Рік'] || null;
            data.genres = Array.isArray(fields['Жанр']) ? fields['Жанр'] : (fields['Жанр'] ? [fields['Жанр']] : []);
            data.country = fields['Країна'] || '';
            data.voice_over = Array.isArray(fields['Переклад']) ? fields['Переклад'] : (fields['Переклад'] ? [fields[
                'Переклад']] : []);
            data.director = Array.isArray(fields['Режисер']) ? fields['Режисер'] : (fields['Режисер'] ? [fields[
                'Режисер']] : []);
            data.actors = Array.isArray(fields['Актори']) ? fields['Актори'] : (fields['Актори'] ? [fields['Актори']] : []);

            // --- Плеєр: отримуємо розшифровані дані через fetch ---
            try {
                const decryptedData = await loadUASerialsDataFromPage(url);
                data.seasons = convertUASerialsData(decryptedData);
            } catch (e) {
                console.warn('Не вдалося отримати дані плеєра uaserials:', e);
                data.seasons = {};
                // Не показуємо помилку користувачеві, просто сезони будуть порожні
            }

            return data;
        }

        function showSkeleton() {

        function renderCards(list) {

        // ==================== ДЕТАЛІ ДЛЯ ANIMEUA ====================

        async function loadAnimeuaDetail(animeUrl) {
            const doc = await fetchUA(animeUrl);
            let title = '';
            for (const sel of ['.page__subcol-main h1', '.pmovie__title', 'h1.title', 'h1']) {
                const el = safeQuery(sel, doc);
                if (el?.textContent.trim()) { title = el.textContent.trim(); break; }
            }
            let poster = '';
            for (const sel of ['div.page__subcol-side .img-fit-cover img', '.pmovie__poster img', '.anime__poster img']) {
                const el = safeQuery(sel, doc);
                if (el) { const src = el.getAttribute('data-src') || el.getAttribute('src') || '';
                    if (src) { poster = src.startsWith('http') ? src : ANIMEUA_BASE + src; break; } }
            }
            const genres = safeQueryAll('.pmovie__genres a, .genres a', doc).map(a => a.textContent.trim()).filter(Boolean);
            const yearEl = safeQuery('.pmovie__year, .release-year', doc);
            const yearMatch = (yearEl?.textContent || '').match(/\d{4}/);
            const year = yearMatch ? parseInt(yearMatch[0]) : null;
            let synopsis = '';
            for (const sel of ['.full-text', '.pmovie__description', '.anime__description']) {
                const el = safeQuery(sel, doc);
                if (el?.textContent.trim()) { synopsis = el.textContent.trim(); break; }
            }
            let rating = '';
            const ratingEl = doc.querySelector('.pmovie__age p, .pmovie__age');
            if (ratingEl) rating = ratingEl.textContent.replace('Рейтинг:', '').trim();

            const playerUrls = extractPlayerIframeUrls(doc);
            const allRawSources = [];
            for (const playerUrl of playerUrls) {
                try {
                    let provider = 'Джерело';
                    if (playerUrl.includes('ashdi')) provider = 'Ashdi';
                    else if (playerUrl.includes('vidmoly')) provider = 'Vidmoly';
                    else if (playerUrl.includes('player')) provider = 'Player';
                    const playerHtml = await fetchUA(playerUrl);
                    const text = playerHtml.body?.innerHTML || '';
                    allRawSources.push(...extractSourcesFromText(text, provider));
                    const nestedIframes = safeQueryAll('iframe', playerHtml);
                    for (const nested of nestedIframes) {
                        let nestedUrl = nested.getAttribute('src') || nested.getAttribute('data-src');
                        if (nestedUrl && nestedUrl !== 'about:blank') {
                            if (nestedUrl.startsWith('//')) nestedUrl = 'https:' + nestedUrl;
                            if (!nestedUrl.startsWith('http')) nestedUrl = ANIMEUA_BASE + nestedUrl;
                            const nestedHtml = await fetchUA(nestedUrl);
                            allRawSources.push(...extractSourcesFromText(nestedHtml.body?.innerHTML || '',
                            provider));
                        }
                    }
                } catch (e) { console.warn('Player fetch failed', playerUrl, e); }
            }

            const seasons = {};
            const seenKeys = new Set();
            allRawSources.forEach(s => {
                const sn = s.season || '1',
                    dn = s.dub || 'UA',
                    en = s.episode || '1';
                const uk = `${sn}-${dn}-${en}-${s.file}`;
                if (!seenKeys.has(uk)) {
                    seenKeys.add(uk);
                    if (!seasons[sn]) seasons[sn] = {};
                    if (!seasons[sn][dn]) seasons[sn][dn] = [];
                    seasons[sn][dn].push({ title: s.label, season: sn, episode: en, file: s.file, dub: dn,
                        provider: s.provider });
                }
            });
            for (const s in seasons)
                for (const d in seasons[s]) seasons[s][d].sort((a, b) => parseInt(a.episode) - parseInt(b.episode));

            return {
                mal_id: animeUrl.hashCode(),
                title,
                images: { jpg: { large_image_url: poster, image_url: poster } },
                genres,
                year,
                synopsis,
                seasons,
                url: animeUrl,
                from: 'animeua',
                score: rating
            };
        }

        function extractPlayerIframeUrls(doc) {
            const selectors = ['.video-responsive iframe', '.player-responsive iframe', '#player iframe',
                '.pmovie__player iframe', 'iframe[src]', 'iframe[data-src]'
            ];
            const urls = [];
            for (const sel of selectors) {
                safeQueryAll(sel, doc).forEach(el => {
                    let src = el.getAttribute('src') || el.getAttribute('data-src');
                    if (!src || src === 'about:blank') return;
                    if (src.startsWith('//')) src = 'https:' + src;
                    if (!src.startsWith('http')) src = ANIMEUA_BASE + src;
                    urls.push(src);
                });
            }
            const scripts = safeQueryAll('script:not([src])', doc);
            for (const s of scripts) {
                const matches = s.textContent.matchAll(/(?:playerUrl|iframeUrl|src)\s*[:=]\s*['"]([^'"]+)['"]/g);
                for (const match of matches) {
                    let url = match[1];
                    if (url.includes('ashdi.vip') || url.includes('vidmoly') || url.includes('player')) {
                        if (url.startsWith('//')) url = 'https:' + url;
                        if (!url.startsWith('http')) url = ANIMEUA_BASE + url;
                        urls.push(url);
                    }
                }
            }
            return [...new Set(urls)];
        }

        function extractSourcesFromText(text, providerName) {
            let sources = [];
            const jsonMatch = text.match(/file\s*:\s*(\[[\s\S]+?\]|\'[\s\S]+?\'|\"[\s\S]+?\"|\{[\s\S]+?\})/i) || text
                .match(/playlist\s*:\s*(\[[\s\S]+?\])/i);
            if (jsonMatch) {
                try {
                    let raw = jsonMatch[1].trim();
                    if ((raw.startsWith("'") && raw.endsWith("'")) || (raw.startsWith('"') && raw.endsWith('"'))) raw = raw
                        .slice(1, -1);
                    if (raw.startsWith('{') && raw.endsWith('}')) raw = `[${raw}]`;
                    const clean = raw.replace(/,\s*\]/g, ']').replace(/,\s*\}/g, '}');
                    const arr = JSON.parse(clean);
                    const walk = (items, dub, season) => {
                        dub = dub || '';
                        season = season || '1';
                        items.forEach(item => {
                            if (item.folder || item.playlist) {
                                let nd = dub,
                                    ns = season;
                                const ft = item.title || '';
                                const sm = ft.match(/[Сс]езон\s*(\d+)/);
                                if (sm) { ns = sm[1]; if (ft.trim().toLowerCase() !== `сезон ${ns}`.toLowerCase()) nd =
                                        ft.replace(/[Сс]езон\s*\d+/g, '').replace(/\//g, '').trim() || dub; } else if (
                                    ft) nd = ft;
                                walk(item.folder || item.playlist, nd, ns);
                            } else if (item.file) {
                                const epT = item.title || 'Серія';
                                let fd = dub || providerName || 'UA',
                                    fs = season;
                                const esm = epT.match(/[Сс]езон\s*(\d+)/);
                                if (esm) fs = esm[1];
                                const epm = epT.match(/(\d+)\s*[Сс]ері[яіяа]|[Сс]ері[яіяа]\s*(\d+)|[Ее]п\.?\s*(\d+)/);
                                sources.push({ label: epT, file: item.file, provider: providerName, dub: fd.trim(),
                                    season: fs, episode: epm ? (epm[1] || epm[2] || epm[3]) : '1' });
                            }
                        });
                    };
                    if (Array.isArray(arr)) walk(arr);
                    else if (arr.file) sources.push({ label: arr.title || 'Озвучка', file: arr.file,
                        provider: providerName, dub: providerName || 'UA', season: '1', episode: '1' });
                } catch (e) { console.warn('JSON parse error', e); }
            }
            if (sources.length === 0) {
                const urlMatches = [...text.matchAll(/https?:\/\/[^\s\'"<>]+\.m3u8[^\s\'"<>]*/g)];
                urlMatches.forEach((m, idx) => {
                    if (!sources.some(s => s.file === m[0])) sources.push({ label: `Потік ${idx+1}`, file: m[0],
                        provider: providerName, dub: providerName || 'UA', season: '1', episode: String(idx +
                            1) });
                });
            }
            return sources;
        }

        // ==================== LAMPA PLAYER ====================

        class LampaPlayer {
            constructor(container, options) {
                this.container = container;
                this.options = options || {};
                this.hls = null;
                this.state = { playing: false, currentTime: 0, duration: 0, volume: 0.8, muted: false, fullscreen: false,
                    loading: true, src: null };
                this.videoRef = null;
                this.containerRef = null;
                this._init();
            }
            _init() {
                this.container.innerHTML = '';
                this.containerRef = document.createElement('div');
                this.containerRef.className = 'lampa-player-container';
                this.containerRef.style.cssText =
                    'width:100%;aspect-ratio:16/9;background:#000;position:relative;border-radius:12px;overflow:hidden;';
                this.videoRef = document.createElement('video');
                this.videoRef.setAttribute('crossorigin', 'anonymous');
                this.videoRef.setAttribute('playsinline', '');
                this.videoRef.controls = false;
                this.videoRef.style.cssText = 'width:100%;height:100%;object-fit:contain;';
                this.containerRef.appendChild(this.videoRef);
                this.container.appendChild(this.containerRef);
                this._bindEvents();
            }
            _bindEvents() {
                const v = this.videoRef;
                v.addEventListener('play', () => { this.state.playing = true; });
                v.addEventListener('pause', () => { this.state.playing = false; });
                v.addEventListener('timeupdate', () => { this.state.currentTime = v.currentTime;
                    this.state.duration = v.duration || 0; });
                v.addEventListener('waiting', () => { this.state.loading = true; });
                v.addEventListener('canplay', () => { this.state.loading = false; });
                v.addEventListener('error', () => { this.state.loading = false; });
                this.containerRef.addEventListener('click', e => { if (e.target.closest('.player-overlay-selectors'))
                        return;
                    this.togglePlay(); });
                this.containerRef.addEventListener('dblclick', e => { if (e.target.closest('.player-overlay-selectors'))
                        return;
                    this.toggleFullscreen(); });
                document.addEventListener('fullscreenchange', () => { this.state.fullscreen = !!document
                        .fullscreenElement; });
            }
            loadSource(src, animeTitle, episodeTitle) {
                // Перевірка на embed URL
                if (isEmbedUrl(src)) {
                    // Показуємо iframe замість відео
                    this.container.innerHTML = '';
                    const iframe = document.createElement('iframe');
                    iframe.src = src;
                    iframe.setAttribute('allowfullscreen', '');
                    iframe.setAttribute('allow', 'autoplay; fullscreen');
                    iframe.style.cssText =
                        'width:100%;height:100%;border:none;position:absolute;top:0;left:0;';
                    this.container.appendChild(iframe);
                    this.state.loading = false;
                    // скидаємо посилання на відео
                    if (this.hls) { this.hls.destroy();
                        this.hls = null; }
                    this.videoRef = null;
                    this.containerRef = null;
                    return;
                }
                // Якщо це звичайний URL, але плеєр був знищений (через embed), переініціалізуємо
                if (!this.videoRef) {
                    this._init();
                }
                this.state.src = src;
                const v = this.videoRef;
                this.state.loading = true;
                this.state.playing = false;
                if (this.hls) { this.hls.destroy();
                    this.hls = null; }
                v.pause();
                if (!src) { this.state.loading = false; return; }
                const proxyUrl = (typeof getProxyUrl === 'function' && !src.startsWith(PROXY_URL)) ? getProxyUrl(src) : src;
                if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                    const hls = new Hls({ enableWorker: true, lowLatencyMode: false, backBufferLength: 90 });
                    this.hls = hls;
                    hls.loadSource(proxyUrl);
                    hls.attachMedia(v);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => { this.state.loading = false; v.play().catch(()=>{}); });
                    hls.on(Hls.Events.ERROR, (ev, data) => { if (data && data.fatal) { this.state.loading = false;
                            v.src = proxyUrl; } });
                } else {
                    v.src = proxyUrl;
                    const onCanPlay = () => { this.state.loading = false;
                        v.removeEventListener('canplay', onCanPlay); };
                    v.addEventListener('canplay', onCanPlay);
                }
            }
            togglePlay() {
                if (!this.videoRef) return;
                const v = this.videoRef;
                if (v.paused) v.play().catch(() => {}); else v.pause();
            }
            toggleFullscreen() {
                if (this.containerRef) {
                    if (!document.fullscreenElement) this.containerRef.requestFullscreen().catch(() => {});
                    else document.exitFullscreen();
                }
            }
            destroy() { if (this.hls) { this.hls.destroy();
                    this.hls = null; } if (this.videoRef) { this.videoRef.pause();
                    this.videoRef.removeAttribute('src');
                    this.videoRef.load(); } if (this.container) this.container.innerHTML = ''; }
        }

        // ==================== HERO BANNER ====================

        let heroItems = [],
            heroCurrentIndex = 0,
            heroCurrentItem = null,
            heroRotationTimer = null,
            heroTransitionTimer = null;
        let heroMouseMoveTimer = null;
        const parallaxIntensity = 15;

        async function buildHeroBanner() {
            const hero = document.getElementById('heroBanner');
            if (!hero) return;
            try {
                let topAnime, ordinaryAnime;
                if (currentSource === 'animeua') {
                    topAnime = await fetchAnimeuaTop100();
                    ordinaryAnime = await fetchAnimeuaMain(1);
                } else {
                    // Для uaserials використовуємо головну (немає окремого топу)
                    topAnime = await fetchUASerialsMain(1);
                    ordinaryAnime = topAnime;
                }
                const getRandomItems = (arr, n) => {
                    const validItems = arr.filter(a => a.images?.jpg?.large_image_url);
                    const shuffled = [...validItems].sort(() => 0.5 - Math.random());
                    return shuffled.slice(0, n);
                };
                const selectedTop = getRandomItems(topAnime, 4);
                const selectedOrdinary = getRandomItems(ordinaryAnime, 4);
                heroItems = [...selectedTop, ...selectedOrdinary].sort(() => 0.5 - Math.random());
                if (heroItems.length === 0) { hero.style.display = 'none'; return; }
                hero.style.display = 'block';
                heroCurrentIndex = 0;
                renderHeroSlide(heroItems[0]);
                buildHeroIndicators();
                setupHeroParallax();
                startHeroRotation();
                document.body.classList.add('agnative-has-hero');
            } catch (err) {
                console.warn('Hero banner error:', err);
                hero.style.display = 'none';
            }
        }

        function renderHeroSlide(item) {
            const hero = document.getElementById('heroBanner');
            if (!hero || !item) return;
            heroCurrentItem = item;
            const bg = hero.querySelector('.agnative-hero__bg');
            if (bg) {
                bg.style.opacity = '0';
                setTimeout(() => {
                    bg.src = item.images?.jpg?.large_image_url || '';
                    bg.style.opacity = '1';
                }, 200);
            }
            const titleEl = hero.querySelector('.agnative-hero__title');
            if (titleEl) titleEl.textContent = item.title || '';
            const yearEl = hero.querySelector('.agnative-hero__year');
            if (yearEl) yearEl.textContent = item.year || '';
            const overviewEl = hero.querySelector('.agnative-hero__overview');
            if (overviewEl) overviewEl.textContent = '';
            const logoEl = hero.querySelector('.agnative-hero__logo');
            if (logoEl) logoEl.style.display = 'none';
            updateHeroIndicators();
        }

        function buildHeroIndicators() {
            const container = document.querySelector('.agnative-hero__indicators');
            if (!container) return;
            container.innerHTML = '';
            heroItems.forEach((item, idx) => {
                const dot = document.createElement('div');
                dot.className = 'agnative-hero__indicator' + (idx === heroCurrentIndex ?
                    ' agnative-hero__indicator--active' : '');
                dot.addEventListener('click', () => openHeroItemAt(idx));
                container.appendChild(dot);
            });
        }

        function updateHeroIndicators() {
            const container = document.querySelector('.agnative-hero__indicators');
            if (!container) return;
            const dots = container.querySelectorAll('.agnative-hero__indicator');
            dots.forEach((dot, i) => dot.classList.toggle('agnative-hero__indicator--active', i === heroCurrentIndex));
        }

        function transitionHeroToIndex(idx) {
            if (idx < 0 || idx >= heroItems.length || !heroItems[idx]) return;
            if (idx === heroCurrentIndex) return;
            const hero = document.getElementById('heroBanner');
            if (!hero) return;
            if (heroTransitionTimer) { clearTimeout(heroTransitionTimer);
                heroTransitionTimer = null; }
            heroCurrentIndex = idx;
            heroCurrentItem = heroItems[idx];
            hero.classList.add('agnative-hero--switching');
            heroTransitionTimer = setTimeout(() => {
                heroTransitionTimer = null;
                renderHeroSlide(heroItems[idx]);
                setTimeout(() => hero.classList.remove('agnative-hero--switching'), 200);
            }, 300);
        }

        function startHeroRotation() {
            stopHeroRotation();

        function setupHeroParallax() {
            const heroBanner = document.getElementById('heroBanner');
            if (!heroBanner) return;
            const contentEls = heroBanner.querySelectorAll('.agnative-hero__content > *');
            const depthMap = { 'agnative-hero__title': 20, 'agnative-hero__year': 10, 'agnative-hero__overview': 5 };
            contentEls.forEach(el => {
                for (const [cls, depth] of Object.entries(depthMap)) {
                    if (el.classList.contains(cls)) {
                        el.dataset.parallaxDepth = depth;
                        el.style.transform = `translateZ(${depth}px)`;
                        break;
                    }
                }
            });
            heroBanner.addEventListener('mouseenter', () => {
                const bg = heroBanner.querySelector('.agnative-hero__bg');
                if (bg) bg.style.animationPlayState = 'paused';
            });
            heroBanner.addEventListener('mousemove', (e) => {
                if (heroMouseMoveTimer) clearTimeout(heroMouseMoveTimer);
                heroMouseMoveTimer = setTimeout(() => {
                    const { clientX, clientY } = e;
                    const { left, top, width, height } = heroBanner.getBoundingClientRect();
                    const centerX = left + width / 2;
                    const centerY = top + height / 2;
                    const offsetX = (clientX - centerX) / (width / 2);
                    const offsetY = (clientY - centerY) / (height / 2);
                    const bg = heroBanner.querySelector('.agnative-hero__bg');
                    if (bg) {
                        bg.style.transform =
                            `scale(1.05) translate(${offsetX * parallaxIntensity * 0.5}px, ${offsetY * parallaxIntensity * 0.5}px)`;
                    }
                    const contentElements = heroBanner.querySelectorAll('.agnative-hero__content > *');
                    contentElements.forEach(el => {
                        const depth = parseFloat(el.dataset.parallaxDepth) || 0;
                        el.style.transform =
                            `translateZ(${depth}px) translateX(${offsetX * parallaxIntensity * (depth / 20)}px) translateY(${offsetY * parallaxIntensity * (depth / 20)}px)`;
                    });
                }, 10);
            });
            heroBanner.addEventListener('mouseleave', () => {
                const bg = heroBanner.querySelector('.agnative-hero__bg');
                if (bg) { bg.style.transform = '';
                    bg.style.animationPlayState = 'running'; }
                const contentElements = heroBanner.querySelectorAll('.agnative-hero__content > *');
                contentElements.forEach(el => {
                    const depth = parseFloat(el.dataset.parallaxDepth) || 0;
                    el.style.transform = `translateZ(${depth}px) translateX(0) translateY(0)`;
                });
            });
        }

            html += `</div><div class="agnative-leftdock__split"></div><div class="agnative-leftdock__case">`;

            try {
                const genres = await loadGenres();
                genres.forEach(g => {
                    html += `
                  <div class="agnative-leftdock__item selector genre-item-dock" data-action="genre-${g.slug}" data-selector="true" tabindex="0" data-genre="${g.slug}">
                    <div class="menu__ico">${iconCircleLetter(g.name.charAt(0))}</div><div class="menu__text">${g.name}</div>

            html += `</div><div class="agnative-leftdock__split"></div><div class="agnative-leftdock__case">`;

                const action = btn.dataset.action;
                btn.addEventListener('click', () => {

                btn.addEventListener('keydown', e => { if (e.key === 'Enter') { handleLeftdockAction(action);
                        hideLeftdock(true); } });

        function handleLeftdockAction(action) {
            if (!action) return;
            if (action === 'main') { closeSectionModal();
                showMainPage(); } else if (action === 'search') { openSearchSection(); } else if (action.startsWith(
                'category-')) {
                const slug = action.replace('category-', '');
                setCategory(slug);
            } else if (action.startsWith('genre-')) {
                // Жанри доступні тільки для animeua
                if (currentSource !== 'animeua') {
                    showToast('Жанри доступні тільки для animeua.club');

                const slug = action.replace('genre-', '');
                const name = fetchGenres().find(g => g.slug === slug)?.name || slug;
                openGenreSection(slug, name);

            // Завантажуємо категорію, якщо збережена
            currentCategory = Storage.getCategory() || '';
            // Якщо категорія збережена, але джерело не animeua – скидаємо (перевірка на мапінг)
            if (currentCategory && currentSource !== 'animeua' && !CATEGORY_TO_UASERIALS[currentCategory]) {
                currentCategory = '';
                Storage.setCategory('');
            }
            buildHeroBanner();
            startClock();
            loadContent();
            updateBackToTop();
        }

        document.addEventListener('DOMContentLoaded', init);
        console.log('🚀 VAKDAB v0.7.2 — повноцінна підтримка uaserials.com, embed iframe');
        console.log('⌨️ Клавіші: / пошук • M меню • T тема • R випадкове • Esc закрити');
    </script>
