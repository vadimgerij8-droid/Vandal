<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Класична змійка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1b4a2e 0%, #103d22 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        .game-container {
            background: #2a5a3a;
            padding: 25px 30px 30px;
            border-radius: 40px 40px 25px 25px;
            box-shadow: 0 20px 25px rgba(0,0,0,0.6), inset 0 2px 5px rgba(255,255,240,0.2);
            border: 3px solid #6d8f72;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: #f7e9b0;
            text-shadow: 3px 3px 0 #1d3b24;
            font-weight: bold;
            font-size: 26px;
            letter-spacing: 1px;
        }

        .score-box {
            background: #1e3d28;
            padding: 10px 25px;
            border-radius: 60px;
            border: 3px solid #b9b07e;
            box-shadow: inset 0 3px 5px #0a1f12;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background-color: #1f4d2b;
            border-radius: 24px;
            box-shadow: inset 0 0 0 3px #4f7a5b, 0 15px 12px #0f321b;
            image-rendering: pixelated;
            border: 4px solid #b9a063;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            gap: 15px;
        }

        button {
            background: #ecd678;
            border: none;
            padding: 12px 30px;
            font-size: 27px;
            font-weight: 800;
            border-radius: 50px;
            color: #233e29;
            box-shadow: 0 7px 0 #997f42, 0 10px 12px black;
            cursor: pointer;
            transition: 0.07s ease;
            text-transform: uppercase;
            border: 2px solid #ffefb0;
            flex: 1;
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #7b6236, 0 5px 10px black;
        }

        .hint {
            color: #d4cca1;
            font-size: 19px;
            font-weight: 600;
            background: #2b5938;
            padding: 8px 18px;
            border-radius: 40px;
            border: 2px solid #bdaf7a;
            white-space: nowrap;
        }

        .hint span {
            background: #182d1e;
            padding: 5px 12px;
            border-radius: 30px;
            margin: 0 3px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div>🐍 SNAKE</div>
        <div class="score-box">🍎 <span id="scoreDisplay">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">
        <button id="restartBtn">⟲ Нова гра</button>
        <div class="hint"><span>⬆️⬇️⬅️➡️</span> керуй</div>
    </div>
</div>

<script>
    (function() {
        // ---------- НАЛАШТУВАННЯ ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');

        const GRID_SIZE = 20;          // кількість клітинок по ширині/висоті
        const CELL_SIZE = canvas.width / GRID_SIZE; // 400/20 = 20px на клітинку

        // Початкові значення
        let snake = [
            {x: 10, y: 10}
        ];
        let food = {x: 15, y: 10};
        let direction = {dx: 1, dy: 0};   // рух праворуч
        let nextDirection = {dx: 1, dy: 0};
        let score = 0;
        let gameOver = false;
        let winFlag = false;               // чи перемога (заповнено все поле)
        let gameInterval = null;
        const MOVE_INTERVAL_MS = 150;      // швидкість (ms)

        // ---------- ДОПОМІЖНІ ФУНКЦІЇ ----------
        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Генерація нової їжі у вільній клітинці
        function generateFood() {
            const totalCells = GRID_SIZE * GRID_SIZE;

            // Якщо змійка зайняла все поле — перемога!
            if (snake.length >= totalCells) {
                winFlag = true;
                gameOver = true;
                stopGame();
                return false;
            }

            // Створюємо множину зайнятих клітинок
            const snakeSet = new Set(snake.map(cell => `${cell.x},${cell.y}`));

            // Якщо вільних клітинок немає (теоретично перевірка, але вже перевірили довжину)
            if (snakeSet.size === totalCells) {
                winFlag = true;
                gameOver = true;
                stopGame();
                return false;
            }

            let newFood;
            let attempts = 0;
            const maxAttempts = 5000;
            do {
                newFood = {
                    x: randomInt(0, GRID_SIZE - 1),
                    y: randomInt(0, GRID_SIZE - 1)
                };
                attempts++;
                if (attempts > maxAttempts) { // захист від безкінечного циклу
                    console.warn("Генерація їжі зайняла багато спроб, шукаємо в лоб:");
                    for (let y = 0; y < GRID_SIZE; y++) {
                        for (let x = 0; x < GRID_SIZE; x++) {
                            if (!snakeSet.has(`${x},${y}`)) {
                                food = {x, y};
                                return true;
                            }
                        }
                    }
                    return false; // немає місця
                }
            } while (snakeSet.has(`${newFood.x},${newFood.y}`));

            food = newFood;
            return true;
        }

        // Зупинка інтервалу
        function stopGame() {
            if (gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
        }

        // Скидання гри
        function resetGame() {
            stopGame();

            snake = [{x: 10, y: 10}];
            direction = {dx: 1, dy: 0};
            nextDirection = {dx: 1, dy: 0};
            score = 0;
            gameOver = false;
            winFlag = false;
            scoreSpan.innerText = '0';

            // Гарантовано генеруємо їжу не на змійці
            food = {x: 15, y: 10};
            // якщо їжа випадково співпала з головою (буде 10,10) — пересуваємо
            if (food.x === snake[0].x && food.y === snake[0].y) {
                food.x = 12; food.y = 12;
            }

            // Перевіримо, чи дійсно їжа не в змійці (на випадок, якщо змійка подовжилась)
            const snakeSet = new Set(snake.map(c => `${c.x},${c.y}`));
            if (snakeSet.has(`${food.x},${food.y}`)) {
                generateFood(); // знайти вільне місце
            }

            startGameLoop();
            draw();
        }

        // Основний рух змійки
        function moveSnake() {
            if (gameOver) return;

            // Оновлюємо напрямок (заборона різкого розвороту)
            if ((nextDirection.dx !== 0 || nextDirection.dy !== 0) &&
                (direction.dx !== -nextDirection.dx || direction.dy !== -nextDirection.dy)) {
                direction = {dx: nextDirection.dx, dy: nextDirection.dy};
            }

            const head = snake[0];
            const newHead = {
                x: head.x + direction.dx,
                y: head.y + direction.dy
            };

            // Перевірка на стіни (програш)
            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                gameOver = true;
                winFlag = false;
                stopGame();
                draw();
                return;
            }

            // Перевірка, чи з'їли їжу
            const isEating = (newHead.x === food.x && newHead.y === food.y);

            // Будуємо нову змійку
            let newSnake = [newHead, ...snake];

            if (!isEating) {
                // Якщо не їли — видаляємо останній елемент (хвіст)
                newSnake.pop();
            }

            // Перевірка на зіткнення з тілом (окрім голови)
            const headPos = newSnake[0];
            for (let i = 1; i < newSnake.length; i++) {
                if (newSnake[i].x === headPos.x && newSnake[i].y === headPos.y) {
                    gameOver = true;
                    winFlag = false;
                    stopGame();
                    draw();
                    return;
                }
            }

            snake = newSnake;

            // Якщо з'їли їжу — збільшуємо рахунок і створюємо нову
            if (isEating) {
                score++;
                scoreSpan.innerText = score;

                const success = generateFood();
                if (!success) {
                    // Якщо generateFood не зміг (немає місця) — перемога
                    if (!gameOver) {
                        winFlag = true;
                        gameOver = true;
                        stopGame();
                    }
                }

                // Додаткова перевірка на переповнення після generateFood
                if (snake.length >= GRID_SIZE * GRID_SIZE) {
                    winFlag = true;
                    gameOver = true;
                    stopGame();
                }
            }

            draw();
        }

        // Функція малювання
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Сітка (тонкі лінії)
            ctx.strokeStyle = '#3d6b49';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.strokeStyle = '#34673f';
                ctx.lineWidth = 0.8;
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // Малюємо їжу (яблучко)
            ctx.fillStyle = '#f34c4c';
            ctx.shadowColor = '#6b1f1f';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, 2 * Math.PI);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';

            // Малюємо змійку
            for (let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const isHead = (i === 0);
                const x = seg.x * CELL_SIZE;
                const y = seg.y * CELL_SIZE;
                const padding = isHead ? 2 : 3;
                const radius = 4;

                ctx.fillStyle = isHead ? '#f9d77e' : '#4dab5a';
                ctx.shadowColor = '#1d4f2b';
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.fill();

                // Очі для голови
                if (isHead) {
                    ctx.fillStyle = '#1e2c1b';
                    ctx.shadowBlur = 0;
                    const eyeOff = 5;
                    const eyeSize = 3;
                    ctx.beginPath();
                    ctx.arc(x + eyeOff, y + eyeOff, eyeSize, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - eyeOff, y + eyeOff, eyeSize, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;

            // Накладаємо повідомлення про програш/перемогу
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.font = 'bold 28px "Segoe UI", "Roboto", sans-serif';
                ctx.fillStyle = '#ffd78c';
                ctx.shadowColor = '#2b472b';
                ctx.shadowBlur = 12;
                ctx.textAlign = 'center';
                if (winFlag) {
                    ctx.fillText('🎉 ПЕРЕМОГА!', canvas.width/2, canvas.height/2 - 10);
                    ctx.font = 'bold 20px sans-serif';
                    ctx.fillText(`Рахунок: ${score}`, canvas.width/2, canvas.height/2 + 30);
                } else {
                    ctx.fillText('💀 ГРА ЗАВЕРШЕНА', canvas.width/2, canvas.height/2 - 10);
                    ctx.font = 'bold 20px sans-serif';
                    ctx.fillText(`Рахунок: ${score}`, canvas.width/2, canvas.height/2 + 30);
                }
                ctx.shadowBlur = 0;
            }
        }

        // Допоміжний метод для roundRect
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };

        // Запуск циклу гри
        function startGameLoop() {
            if (gameInterval) stopGame();
            gameInterval = setInterval(() => moveSnake(), MOVE_INTERVAL_MS);
        }

        // ---------- КЕРУВАННЯ ----------
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            // Запобігаємо скролу сторінки стрілками
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                e.preventDefault();
            }

            if (gameOver) return;

            switch (key) {
                case 'ArrowUp':
                    if (direction.dy !== 1)  // не можна йти вниз, якщо рухаємось вгору?
                        nextDirection = {dx: 0, dy: -1};
                    break;
                case 'ArrowDown':
                    if (direction.dy !== -1)
                        nextDirection = {dx: 0, dy: 1};
                    break;
                case 'ArrowLeft':
                    if (direction.dx !== 1)
                        nextDirection = {dx: -1, dy: 0};
                    break;
                case 'ArrowRight':
                    if (direction.dx !== -1)
                        nextDirection = {dx: 1, dy: 0};
                    break;
                default: return;
            }
        });

        // Кнопка рестарту
        document.getElementById('restartBtn').addEventListener('click', resetGame);

        // Старт при завантаженні
        window.addEventListener('load', () => {
            resetGame(); // запускає гру
        });

        // Додаткова безпека: якщо фокус не на canvas, кнопки все одно працюють
        canvas.setAttribute('tabindex', '0'); // дозволяємо фокус
        canvas.addEventListener('click', () => canvas.focus());
        // Фокусуємо canvas для клавіш
        canvas.focus();
    })();
</script>
</body>
</html>
