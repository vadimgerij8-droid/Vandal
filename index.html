<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VAKDAB • твій аніме каталог</title>
    <link rel="preconnect" href="https://monoanime.animegran8.workers.dev" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <meta property="og:title" content="VAKDAB - твій аніме каталог" />
    <meta property="og:description" content="Сучасна платформа для перегляду аніме" />
    <meta property="og:type" content="website" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" defer></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <meta name="theme-color" content="#0d0d0d" />

    <style>
        /* ============================================================
                   CSS ЗМІННІ (Mobile-First)
                   ============================================================ */
        :root {
            --accent: #0b0b0b;
            --accent-rgb: 11, 11, 11;
            --accent-hover: #1a1a1a;
            --accent-text: #ffffff;
            --accent-gradient: linear-gradient(135deg, #0b0b0b, #1a1a1a);
            --accent-light: rgba(11, 11, 11, 0.15);
            --accent-glow: rgba(11, 11, 11, 0.35);
            --bg: #ffffff;
            --surface: rgba(255, 255, 255, 0.98);
            --text: #0b0b0b;
            --text-secondary: #4a4a4a;
            --text-muted: #7a7a7a;
            --border: #e9e9e9;
            --border-light: #f3f3f3;
            --border-hover: #d0d0d0;
            --hover: rgba(0, 0, 0, 0.03);
            --tag-bg: #f6f6f6;
            --glass: rgba(255, 255, 255, 0.6);
            --glass-dark: rgba(20, 20, 20, 0.35);
            --blur-amount: 8px;
            --shadow-sm: 0 6px 18px rgba(11, 11, 11, 0.06);
            --shadow-md: 0 14px 32px rgba(11, 11, 11, 0.10);
            --shadow-lg: 0 30px 60px rgba(11, 11, 11, 0.14);
            --radius-sm: 12px;
            --radius: 16px;
            --radius-md: 14px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --transition: 280ms cubic-bezier(.2, .9, .2, 1);
            --transition-smooth: 360ms cubic-bezier(.2, .9, .2, 1);
            --agnative-scale: 1;
            /* HeroBar ширина +1.3см */
            --hero-extra-width: 1.3cm;
        }

        .dark-mode {
            --accent: #f7f7f7;
            --accent-rgb: 247, 247, 247;
            --accent-hover: #cfcfcf;
            --accent-text: #0a0a0a;
            --accent-gradient: linear-gradient(135deg, #f7f7f7, #cfcfcf);
            --accent-light: rgba(247, 247, 247, 0.15);
            --accent-glow: rgba(247, 247, 247, 0.35);
            --bg: #0a0a0a;
            --surface: rgba(20, 20, 20, 0.95);
            --text: #f7f7f7;
            --text-secondary: #cfcfcf;
            --text-muted: #9a9a9a;
            --border: #222222;
            --border-light: #151515;
            --border-hover: #3a3a3a;
            --hover: rgba(255, 255, 255, 0.02);
            --tag-bg: #141414;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-dark: rgba(0, 0, 0, 0.45);
            --shadow-sm: 0 6px 18px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 14px 32px rgba(0, 0, 0, 0.55);
            --shadow-lg: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            height: 100%;
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background var(--transition-smooth), color var(--transition-smooth);
            line-height: 1.5;
            overflow-x: hidden;
            font-size: 16px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 0.75rem 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: clip;
        }
        @media (min-width:480px) {
            .app-container { padding: 0 1rem 2.5rem; }
            .hero-wrapper { width: calc(100% + 2rem); margin-left: -1rem; margin-right: -1rem; }
        }
        @media (min-width:768px) {
            .app-container { padding: 0 1.5rem 2.5rem; }
            .hero-wrapper { width: calc(100% + 3rem); margin-left: -1.5rem; margin-right: -1.5rem; }
        }
        @media (min-width:1024px) {
            .app-container { padding: 0 2rem 3rem; }
            .hero-wrapper { width: calc(100% + 4rem); margin-left: -2rem; margin-right: -2rem; }
        }

        /* Анімації */
        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(16px); }
            to { opacity:1; transform:translateY(0); }
        }
        @keyframes subtlePulse {
            0%,100% { transform:scale(1); }
            50% { transform:scale(1.02); }
        }
        @keyframes scaleIn {
            from { opacity:0; transform:scale(0.92); }
            to { opacity:1; transform:scale(1); }
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes skeletonShimmer {
            0% { background-position:-200px 0; }
            100% { background-position:calc(200px + 100%) 0; }
        }
        @keyframes kenBurns {
            0% { transform:scale(1) translateX(0); object-position:center center; }
            50% { transform:scale(1.08) translateX(2%); object-position:center top; }
            100% { transform:scale(1) translateX(0); object-position:center center; }
        }
        @keyframes fadeIn {
            from { opacity:0; transform:scale(1.03); }
            to { opacity:1; transform:scale(1); }
        }
        @keyframes heroFadeIn {
            from { opacity:0; transform:scale(1.04) rotate(0.5deg); }
            to { opacity:1; transform:scale(1) rotate(0); }
        }

        /* ===== ХЕДЕР — ПРОЗОРИЙ, ПЛАВАЮЧИЙ ===== */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.8rem 0.4rem;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 30;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            transition: all var(--transition);
            pointer-events: none;
        }
        .header>* {
            pointer-events: auto;
        }

        @media (min-width:480px) {
            .header { padding: 0.8rem 1rem 0.5rem; gap: 0.8rem; }
        }
        @media (min-width:768px) {
            .header { padding: 1rem 1.2rem 0.6rem; gap: 1rem; }
        }
        @media (min-width:1024px) {
            .header { padding: 1.2rem 1.5rem 0.8rem; gap: 1.2rem; }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex: 1 1 auto;
            min-width: 0;
        }
        @media (min-width:480px) {
            .header-left { gap: 0.8rem; }
        }
        @media (min-width:768px) {
            .header-left { gap: 1rem; }
        }

        .burger-btn {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            border-radius: 50%;
            width: 44px;
            min-width: 44px;
            height: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 30;
            flex-shrink: 0;
            pointer-events: auto;
        }
        .burger-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.08);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3);
        }
        .burger-btn.active {
            background: rgba(255, 255, 255, 0.25);
        }

        .dark-mode .burger-btn {
            background: rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .dark-mode .burger-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* (existing styles omitted here for brevity in commit message) */

    </style>

    <!-- HERO FIX: додаємо окремий блок стилів, що перекриває проблемні правила -->
    <style>
    /* Fixes for Hero controls positioning, safe-area, z-index and spacing */
    .hero-nav {
      position: absolute;
      bottom: 48px; /* трохи вище дотів */
      width: 44px;
      height: 44px;
      background: rgba(0,0,0,0.30);
      z-index: 35; /* вище за header (30) */
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: transform 0.25s ease, background 0.25s ease;
      transform-origin: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    }
    .hero-nav-prev { left: clamp(12px, 3vw, 32px); }
    .hero-nav-next { right: clamp(12px, 3vw, 32px); }

    @media (max-width: 480px) {
      .hero-nav { bottom: 42px; width: 38px; height: 38px; font-size: 1rem; }
      .hero-nav-prev { left: 12px; }
      .hero-nav-next { right: 12px; }
    }

    @media (min-width: 1400px) {
      .hero-nav-prev { left: clamp(24px, 2vw, 48px); }
      .hero-nav-next { right: clamp(24px, 2vw, 48px); }
    }

    .hero-dots {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 35;
      align-items: center;
      pointer-events: auto;
    }

    .hero-slide-content {
      padding-bottom: calc(110px + env(safe-area-inset-bottom, 0px)) !important;
      height: 100%;
      z-index: 30;
      box-sizing: border-box;
      pointer-events: auto;
    }

    .hero-wrapper,
    .hero-slide { padding-bottom: env(safe-area-inset-bottom, 0px); }

    .hero-nav:hover { transform: scale(1.12); box-shadow: 0 10px 30px rgba(0,0,0,0.25); }
    </style>

</head>
