<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MONOANIME</title>
    <link rel="preconnect" href="https://monoanime.animegran8.workers.dev">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Basic Open Graph -->
    <meta property="og:title" content="MONOANIME - Pro версія">
    <meta property="og:description" content="Сучасна платформа для перегляду аніме з розширеними функціями">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/og-image.png">

    <!-- HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" defer></script>

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="android-chrome-192x192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#0d0d0d">

    <style>
        /* ===== variables.css ===== */
        :root {
            --bg: #ffffff;
            --surface: rgba(255,255,255,0.98);
            --text: #0b0b0b;
            --text-secondary: #4a4a4a;
            --text-muted: #7a7a7a;
            --border: #e9e9e9;
            --border-light: #f3f3f3;
            --hover: rgba(0,0,0,0.03);
            --active: #0b0b0b;
            --active-text: #ffffff;
            --tag-bg: #f6f6f6;
            --glass: rgba(255,255,255,0.6);
            --glass-dark: rgba(20,20,20,0.35);
            --blur-amount: 8px;
            --shadow-sm: 0 6px 18px rgba(11,11,11,0.06);
            --shadow-md: 0 14px 32px rgba(11,11,11,0.10);
            --shadow-lg: 0 30px 60px rgba(11,11,11,0.14);
            --radius-sm: 12px;
            --radius: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --transition: 280ms cubic-bezier(.2,.9,.2,1);
            --transition-smooth: 360ms cubic-bezier(.2,.9,.2,1);
        }
        .dark-mode {
            --bg: #0a0a0a;
            --surface: rgba(20,20,20,0.95);
            --text: #f7f7f7;
            --text-secondary: #cfcfcf;
            --text-muted: #9a9a9a;
            --border: #222222;
            --border-light: #151515;
            --hover: rgba(255,255,255,0.02);
            --active: #f7f7f7;
            --active-text: #0a0a0a;
            --tag-bg: #141414;
            --glass: rgba(255,255,255,0.04);
            --glass-dark: rgba(0,0,0,0.45);
            --blur-amount: 8px;
            --shadow-sm: 0 6px 18px rgba(0,0,0,0.4);
            --shadow-md: 0 14px 32px rgba(0,0,0,0.55);
            --shadow-lg: 0 30px 60px rgba(0,0,0,0.6);
        }
        * { box-sizing: border-box; margin:0; padding:0; }
        html,body { height:100%; }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
            transition: background var(--transition-smooth), color var(--transition-smooth);
        }
        @media (prefers-reduced-motion: reduce) {
            :root { --transition: 0ms; --transition-smooth: 0ms; }
            * { animation: none !important; transition: none !important; }
        }
        @keyframes fadeInUp {
            from { opacity:0; transform: translateY(12px); }
            to { opacity:1; transform: translateY(0); }
        }
        @keyframes subtlePulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .glass {
            background: linear-gradient(180deg, var(--glass), rgba(255,255,255,0.03));
            backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .img--blur { filter: blur(10px) scale(1.02); transform-origin:center; transition: filter 600ms ease, transform 600ms ease; }
        .img--loaded { filter: blur(0) scale(1); }
        .small { font-size: 0.85rem; }

        /* ===== header.css ===== */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 2rem;
            padding-bottom: 1.4rem;
            border-bottom: 1px solid var(--border);
            transition: all var(--transition);
        }
        .header:hover { border-bottom-color: var(--border-hover); }
        .logo { display: flex; align-items: center; gap: 0.8rem; cursor: pointer; user-select: none; text-decoration: none; }
        .logo-icon {
            font-size: 3.6rem; font-weight: 900;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }
        .logo:hover .logo-icon { transform: rotate(-8deg) scale(1.12); filter: brightness(1.1); }
        .logo-text h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.04em; color: var(--text); margin: 0; transition: color var(--transition); }
        .logo-text span { font-size: 0.82rem; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.5px; display: block; margin-top: -4px; }
        .header-actions { display: flex; align-items: center; gap: 0.9rem; flex-wrap: wrap; }
        .search-wrapper {
            display: flex; align-items: center; background: var(--surface); border: 2px solid var(--border);
            border-radius: var(--radius-xl); padding: 0.55rem 1.1rem; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm); min-width: 260px;
        }
        .search-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(var(--primary-rgb), 0.15); transform: translateY(-1px); }
        .search-wrapper i { color: var(--text-secondary); font-size: 1.1rem; margin-right: 0.65rem; transition: color var(--transition); }
        .search-wrapper:focus-within i { color: var(--primary); }
        #searchInput { border: none; outline: none; font-size: 0.97rem; background: transparent; width: 100%; font-weight: 500; color: var(--text); }
        #searchInput::placeholder { color: var(--text-muted); font-weight: 400; }
        .btn-icon {
            background: var(--surface); border: 2px solid var(--border); color: var(--text); border-radius: 50%;
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 1.15rem;
            position: relative; box-shadow: var(--shadow-sm);
        }
        .btn-icon:hover { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.1) rotate(5deg); box-shadow: var(--shadow-md); }
        .btn-icon .badge {
            position: absolute; top: -3px; right: -3px; background: #ef4444; color: white; border-radius: 50%;
            width: 19px; height: 19px; font-size: 0.68rem; font-weight: 700; display: flex;
            align-items: center; justify-content: center; border: 2px solid var(--surface);
        }
        @media (max-width: 640px) {
            .header { margin-bottom: 1.5rem; padding-bottom: 1.2rem; }
            .logo-icon { font-size: 3.2rem; }
            .logo-text h1 { font-size: 1.55rem; }
            .search-wrapper { min-width: 220px; }
        }
        @media (max-width: 480px) {
            .header { gap: 0.8rem; }
            .search-wrapper { min-width: 180px; padding: 0.5rem 0.9rem; }
        }

        /* ===== navigation.css ===== */
        .category-section { margin-bottom: 2.2rem; }
        .category-scroll { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
        .category-label { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); margin-right: 0.6rem; white-space: nowrap; }
        .category-pill {
            background: var(--surface); border: 1.5px solid var(--border); color: var(--text);
            border-radius: var(--radius-xl); padding: 0.55rem 1.25rem; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap;
            box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
        }
        .category-pill:hover { background: var(--hover); transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--border-hover); }
        .category-pill.active-pill { background: linear-gradient(135deg, var(--primary), #a855f7); color: white; border-color: transparent; transform: scale(1.06); box-shadow: 0 8px 20px rgba(var(--primary-rgb), 0.25); }
        .tabs-row { display: flex; gap: 0.4rem; margin-bottom: 1.8rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); padding-bottom: 1px; }
        .tab-btn {
            background: transparent; border: none; color: var(--text-secondary); padding: 0.65rem 1.35rem;
            font-weight: 600; font-size: 0.93rem; cursor: pointer; border-radius: var(--radius-lg);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;
        }
        .tab-btn:hover { color: var(--text); background: var(--hover); }
        .tab-btn.active-tab { color: var(--text); background: var(--surface); box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        .tab-btn.active-tab::after {
            content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
            width: 40%; height: 3px; background: linear-gradient(to right, var(--primary), #c026d3); border-radius: 3px;
        }
        @media (max-width: 640px) {
            .category-pill { padding: 0.5rem 1.1rem; font-size: 0.82rem; }
            .tab-btn { padding: 0.6rem 1.1rem; font-size: 0.9rem; }
        }
        @media (max-width: 480px) {
            .tabs-row { gap: 0.3rem; }
            .category-scroll { gap: 0.6rem; }
        }

        /* ===== cards.css ===== */
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 1.6rem; margin-top: 0.5rem; }
        .anime-card {
            background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
            box-shadow: var(--shadow-sm); transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            cursor: pointer; position: relative; display: flex; flex-direction: column; height: 100%; animation: fadeInUp 0.5s ease both;
        }
        .anime-card:nth-child(1) { animation-delay: 0.05s; }
        .anime-card:nth-child(2) { animation-delay: 0.10s; }
        .anime-card:nth-child(3) { animation-delay: 0.15s; }
        .anime-card:nth-child(4) { animation-delay: 0.20s; }
        .anime-card:nth-child(5) { animation-delay: 0.25s; }
        .anime-card:nth-child(6) { animation-delay: 0.30s; }
        .anime-card:nth-child(7) { animation-delay: 0.35s; }
        .anime-card:nth-child(8) { animation-delay: 0.40s; }
        .anime-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-md); border-color: var(--text); }
        .anime-poster { position: relative; padding-top: 140%; background: #e0e0e0; overflow: hidden; border-radius: var(--radius) var(--radius) 0 0; }
        .dark-mode .anime-poster { background: #2a2a2a; }
        .anime-poster img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.35s ease; }
        .anime-card:hover .anime-poster img { transform: scale(1.06); }
        .anime-info { padding: 0.9rem 1rem 1rem; display: flex; flex-direction: column; flex: 1; }
        .anime-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: color var(--transition); }
        .anime-card:hover .anime-title { color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
        .anime-meta { display: flex; gap: 0.5rem; font-size: 0.7rem; color: var(--text-secondary); font-weight: 500; flex-wrap: wrap; }
        .skeleton-card .anime-poster { background: linear-gradient(90deg, var(--hover) 25%, var(--border-light) 50%, var(--hover) 75%); background-size: 200% 100%; animation: skeletonShimmer 1.8s infinite; }
        .skeleton-card .anime-title,
        .skeleton-card .anime-meta { background: var(--hover); height: 0.9rem; border-radius: 6px; margin-top: 0.4rem; animation: skeletonShimmer 1.8s infinite; background-size: 200% 100%; }

        /* ===== modal-player.css ===== */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); z-index: 1000;
            justify-content: center; align-items: center; padding: 1rem;
        }
        .modal-content {
            background: var(--surface); max-width: 1000px; width: 100%; max-height: 90vh;
            border-radius: var(--radius-lg); overflow-y: auto; box-shadow: var(--shadow-lg);
            border: 1px solid var(--border); animation: fadeUp 0.25s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: scale(0.97); }
            to   { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center; padding: 1.3rem 1.8rem;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface);
            z-index: 5; border-radius: var(--radius-lg) var(--radius-lg) 0 0; transition: background var(--transition), border-color var(--transition);
        }
        .modal-header h2 { font-size: 1.4rem; font-weight: 700; color: var(--text); }
        .close-modal { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: var(--text-secondary); transition: color var(--transition), transform 0.2s ease; padding: 0.3rem; line-height: 1; }
        .close-modal:hover { color: var(--text); transform: rotate(90deg); }
        .modal-body { padding: 1.8rem; }
        .anime-detail-grid { display: flex; flex-wrap: wrap; gap: 2rem; }
        .detail-poster { flex: 0 0 170px; }
        .detail-poster img { width: 100%; border-radius: var(--radius-sm); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); border: 1px solid var(--border); }
        .detail-info { flex: 1; min-width: 250px; }
        .synopsis { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; transition: all 0.3s ease; }
        .synopsis.expanded { display: block; -webkit-line-clamp: unset; }
        .more-btn { background: none; border: none; color: var(--text); cursor: pointer; font-weight: bold; padding: 0; margin-top: 5px; text-decoration: underline; display: none; }
        .player-container { position: relative; width: 100%; background: #000; border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 1rem; }
        .player-container video { width: 100%; display: block; max-height: 60vh; background: #000; }
        .voice-selector { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.8rem; }
        .voice-btn {
            background: var(--surface); border: 1.5px solid var(--border); color: var(--text); border-radius: var(--radius-xl);
            padding: 0.4rem 1rem; font-weight: 600; font-size: 0.78rem; cursor: pointer; transition: all var(--transition);
            white-space: nowrap; box-shadow: var(--shadow-sm);
        }
        .voice-btn:hover { background: var(--hover); transform: translateY(-1px); }
        .voice-btn.active { background: var(--active); color: var(--active-text); border-color: var(--active); }

        /* ===== profile.css ===== */
        .profile-section { text-align: center; margin-bottom: 2rem; padding: 2rem 1.5rem; background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: all var(--transition); }
        .profile-section:hover { box-shadow: var(--shadow-md); }
        .profile-avatar {
            width: 96px; height: 96px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #7c3aed);
            display: flex; align-items: center; justify-content: center; margin: 0 auto 1.2rem; font-size: 2.8rem;
            color: white; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 4px solid var(--background);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15); position: relative;
        }
        .profile-avatar::after { content: ''; position: absolute; inset: -6px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #a855f7); z-index: -1; opacity: 0.25; filter: blur(8px); }
        .profile-avatar:hover { transform: scale(1.08) rotate(3deg); box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2); }
        .profile-stats { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; margin: 1.5rem 0 2rem; }
        .profile-stat { text-align: center; min-width: 80px; }
        .profile-stat .stat-num { font-size: 1.75rem; font-weight: 800; background: linear-gradient(90deg, var(--text), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 0.3rem; }
        .profile-stat .stat-label { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .bookmark-list { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; margin-top: 1.5rem; }
        .bookmark-item {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
            padding: 0.65rem; display: flex; align-items: center; gap: 0.75rem; font-size: 0.85rem;
            font-weight: 500; cursor: pointer; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm); min-width: 180px; max-width: 220px;
        }
        .bookmark-item:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
        .bookmark-item img { width: 42px; height: 58px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border-light); transition: transform 0.4s ease; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); }
        .bookmark-item:hover img { transform: scale(1.05); }
        .bookmark-item .bookmark-info { flex: 1; text-align: left; overflow: hidden; }
        .bookmark-item .bookmark-title { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .bookmark-item .bookmark-author { font-size: 0.7rem; color: var(--text-muted); }
        @media (max-width: 480px) {
            .profile-avatar { width: 82px; height: 82px; font-size: 2.4rem; }
            .bookmark-item { min-width: 160px; }
        }

        /* ===== components.css ===== */
        .btn-outline {
            background: transparent; border: 1.5px solid var(--border); color: var(--text); border-radius: var(--radius-xl);
            padding: 0.5rem 1.3rem; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all var(--transition);
            white-space: nowrap; box-shadow: var(--shadow-sm);
        }
        .btn-outline:hover { background: var(--active); color: var(--active-text); border-color: var(--active); transform: translateY(-1px); }
        .pagination-row { display: flex; justify-content: center; align-items: center; gap: 0.6rem; margin-top: 2.5rem; flex-wrap: wrap; }
        .page-btn {
            background: var(--surface); border: 1.5px solid var(--border); color: var(--text); border-radius: 50%;
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all var(--transition); box-shadow: var(--shadow-sm);
        }
        .page-btn:hover { background: var(--hover); transform: scale(1.07); }
        .page-btn.active-page { background: var(--active); color: var(--active-text); border-color: var(--active); }
        .page-btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
        .tag {
            background: var(--tag-bg); display: inline-block; padding: 0.25rem 0.8rem; border-radius: 40px;
            font-size: 0.73rem; font-weight: 500; margin-right: 0.4rem; margin-bottom: 0.4rem; color: var(--text);
            transition: all var(--transition);
        }
        .tag.rating-tag { background: var(--active); color: var(--active-text); font-weight: 700; }
        .btn-watch {
            display: inline-flex; align-items: center; gap: 0.5rem; background: var(--active); color: var(--active-text);
            border: none; border-radius: var(--radius-xl); padding: 0.7rem 1.6rem; font-weight: 700; font-size: 0.9rem;
            cursor: pointer; transition: all var(--transition); margin-top: 0.5rem; text-decoration: none;
        }
        .btn-watch:hover { opacity: 0.85; transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--active); color: var(--active-text); padding: 0.7rem 1.5rem; border-radius: var(--radius-xl);
            font-weight: 600; font-size: 0.85rem; z-index: 2000; transition: transform 0.3s ease, opacity 0.3s ease;
            box-shadow: var(--shadow-lg); pointer-events: none; opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .loader { text-align: center; padding: 3rem; color: var(--text-secondary); font-weight: 500; grid-column: 1 / -1; }
        .loader i { font-size: 2rem; margin-bottom: 0.5rem; display: block; animation: subtlePulse 2s infinite; }
        footer { margin-top: 3rem; text-align: center; font-size: 0.7rem; border-top: 1px solid var(--border); padding-top: 1.8rem; color: var(--text-muted); transition: all var(--transition); letter-spacing: 0.03em; }
        .modal-overlay {
            position: fixed; inset: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(6px); z-index: 999999;
        }
        .modal-box {
            background: var(--surface); color: var(--text); width: calc(100% - 2rem); max-width: 420px;
            border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-lg);
            max-height: 90vh; overflow-y: auto; animation: fadeInUp 0.3s ease;
        }

        /* ===== responsive.css ===== */
        @media (max-width: 1024px) {
            .app-container { padding: 1.5rem; }
            .anime-grid { gap: 1.5rem; }
            .detail-poster { flex-basis: 150px; }
        }
        @media (max-width: 768px) {
            .app-container { padding: 1rem; }

<script>
  // This script will be executed after the module script because the module is deferred.
  // We'll wait for the 'firebase-ready' event or just use the functions if already defined.
  // But to be safe, we'll wrap the initialization in a function and call it when ready.
  function initApp() {
    // ===== utils.js =====
    String.prototype.hashCode = function () {
        let hash = 0;
        for (let i = 0; i < this.length; i++) {
            hash = ((hash << 5) - hash) + this.charCodeAt(i);
            hash |= 0;
        }
        return Math.abs(hash);
    };

    function safeQuery(selector, parent = document) {
        try { return parent.querySelector(selector); } catch (e) { return null; }
    }

    function safeQueryAll(selector, parent = document) {
        try { return Array.from(parent.querySelectorAll(selector)); } catch (e) { return []; }
    }

    function debounce(fn, delay) {
        let timer;
        return function (...args) {
            clearTimeout(timer);
            timer = setTimeout(() => fn.apply(this, args), delay);
        };
    }

    // ===== config.js =====
    const PROXY_URL = 'https://monoanime.animegran8.workers.dev';
    const ANIMEUA_BASE = 'https://animeua.club';

    const GENRE_MAP = {
        "Бойові мистецтва": "boivie",
        "Бойовики": "boyovik",
        "Воєнні": "voenne",
        "Гарем": "garems",
        "Драми": "drama",
        "Детектив": "detektiv",
        "Демони": "demons",
        "Комедії": "komik",
        "Роботи": "meha",
        "Повсякденність": "posyardnevnist",
        "Пригоди": "adventures",
        "Психологічні": "psih",
        "Романтика": "romantik",
        "Надприродні": "weird",
        "Фантастика": "fantastika",
        "Фентезі": "fentezi",
        "Школа": "classes",
        "Еччі": "echhi"
    };

    function getProxyUrl(url) {
        if (!url) { console.warn('getProxyUrl empty'); return null; }
        return PROXY_URL + '?url=' + encodeURIComponent(url);
    }

    // ===== storage.js =====
    const Storage = {
        getBookmarks() { try { return JSON.parse(localStorage.getItem('mono_anime_bookmarks') || '[]'); } catch { return []; } },
        saveBookmarks(arr) { localStorage.setItem('mono_anime_bookmarks', JSON.stringify(arr)); },
        getHistory() { try { return JSON.parse(localStorage.getItem('mono_anime_history') || '[]'); } catch { return []; } },
        addHistory(anime) {
            if (!anime || !anime.mal_id) return;
            const hist = this.getHistory().filter(h => h.mal_id !== anime.mal_id);
            hist.unshift({
                mal_id: anime.mal_id, title: anime.title,
                image_url: anime.images?.jpg?.large_image_url || '',
                url: anime.url || '', score: anime.score, year: anime.year, timestamp: Date.now()
            });
            localStorage.setItem('mono_anime_history', JSON.stringify(hist.slice(0, 50)));
        },
        clearHistory() { localStorage.setItem('mono_anime_history', '[]'); },
        getTheme() { return localStorage.getItem('mono_anime_theme') || 'light'; },
        setTheme(theme) { localStorage.setItem('mono_anime_theme', theme); }
    };

    window.updateBadge = function() {
        const badge = document.getElementById('bookmarkBadge');
        if (!badge) return;
        const count = window.currentUser ? (async () => { try { return (await window.cloudGetBookmarks()).length; } catch { return 0; } })() : Storage.getBookmarks().length;
        // Since async is tricky for badge, we'll use a simpler approach: update badge after auth state changes and after bookmark toggles.
        // We'll just call a dedicated updateBadgeAsync later.
        // For now, we'll define a synchronous version based on local state (but we need async). We'll handle it separately.
    };

    // Better async badge update
    async function updateBadgeAsync() {
        const badge = document.getElementById('bookmarkBadge');
        if (!badge) return;
        let count = 0;
        if (window.currentUser) {
            try { count = (await window.cloudGetBookmarks()).length; } catch (e) { console.error(e); }
        } else {
            count = Storage.getBookmarks().length;
        }
        badge.textContent = count;
        badge.style.display = count > 0 ? 'flex' : 'none';
    }
    window.updateBadge = updateBadgeAsync;

    window.showToast = function(msg) {
        const toast = document.getElementById('toast');
        if (!toast) return;
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 2200);
    };

    function applyTheme(theme) {
        const btn = document.getElementById('themeToggleBtn');
        if (theme === 'dark') {
            document.body.classList.add('dark-mode');
            if (btn) btn.innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            document.body.classList.remove('dark-mode');
            if (btn) btn.innerHTML = '<i class="fas fa-moon"></i>';
        }
    }

    window.toggleTheme = function() {
        const next = Storage.getTheme() === 'dark' ? 'light' : 'dark';
        Storage.setTheme(next);
        applyTheme(next);
    };

    // ===== api.js =====
    async function fetchUA(url) {
        if (!url) throw new Error('empty url');
        const proxyUrl = getProxyUrl(url);
        const resp = await fetch(proxyUrl);
        if (!resp.ok) throw new Error(`status ${resp.status}`);
        const html = await resp.text();
        return new DOMParser().parseFromString(html, 'text/html');
    }

    function parseCards(doc) {
        const cards = safeQueryAll('.poster', doc);
        if (cards.length) {
            return cards.map(card => {
                const linkEl = card.tagName === 'A' ? card : safeQuery('a', card);
                const href = linkEl?.getAttribute('href') || '';
                const img = safeQuery('img', card);
                const posterSrc = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
                const titleEl = safeQuery('.poster__title', card) || safeQuery('h3', card);
                const title = (titleEl?.textContent || '').trim() || 'Без назви';
                return {
                    mal_id: href.hashCode(),
                    title,
                    url: href.startsWith('http') ? href : ANIMEUA_BASE + href,
                    images: { jpg: { large_image_url: posterSrc.startsWith('http') ? posterSrc : (posterSrc ? ANIMEUA_BASE + posterSrc : '') } },
                    score: null, year: null, from: 'animeua'
                };
            });
        }
        const links = safeQueryAll('a[href*="/anime/"]', doc);
        const unique = new Map();
        links.forEach(a => { if (!unique.has(a.href)) unique.set(a.href, a); });
        return Array.from(unique.values()).map(a => {
            const img = safeQuery('img', a);
            const src = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
            const title = (safeQuery('.poster__title', a)?.textContent || a.textContent || '').trim();
            return {
                mal_id: a.href.hashCode(),
                title: title || 'Без назви',
                url: a.href,
                images: { jpg: { large_image_url: src.startsWith('http') ? src : ANIMEUA_BASE + src } },
                score: null, year: null, from: 'animeua'
            };
        });
    }

    async function fetchMainPage(page = 1) {
        const doc = await fetchUA(`${ANIMEUA_BASE}/page/${page}/`);
        return parseCards(doc);
    }

    async function searchAnimeUA(query, page = 1) {
        const doc = await fetchUA(`${ANIMEUA_BASE}/index.php?do=search&subaction=search&story=${encodeURIComponent(query)}&page=${page}`);
        return parseCards(doc);
    }

    async function fetchByGenre(genreSlug, page = 1) {
        const doc = await fetchUA(`${ANIMEUA_BASE}/genre/${genreSlug}/page/${page}/`);
        return parseCards(doc);
    }

    async function fetchTop100() {
        const doc = await fetchUA(`${ANIMEUA_BASE}/top.html`);
        return parseCards(doc);
    }

    function fetchGenres() {
        return Object.entries(GENRE_MAP)
            .map(([name, slug]) => ({ slug, name }))
            .sort((a, b) => a.name.localeCompare(b.name, 'uk'));
    }

    function extractSourcesFromText(text, providerName = '') {
        const sources = [];
        const jsonMatch = text.match(/file\s*:\s*(\[[\s\S]+?\]|\'[\s\S]+?\'|\"[\s\S]+?\"|\{[\s\S]+?\})/i) ||
            text.match(/playlist\s*:\s*(\[[\s\S]+?\])/i);
        if (jsonMatch) {
            try {
                let rawData = jsonMatch[1].trim();
                if ((rawData.startsWith("'") && rawData.endsWith("'")) || (rawData.startsWith('"') && rawData.endsWith('"'))) {
                    rawData = rawData.slice(1, -1);
                }
                if (rawData.startsWith('{') && rawData.endsWith('}')) rawData = `[${rawData}]`;
                const cleanJson = rawData.replace(/,\s*\]/g, ']').replace(/,\s*\}/g, '}');
                const arr = JSON.parse(cleanJson);
                const walk = (items, currentDub = '', currentSeason = '1') => {
                    items.forEach(item => {
                        if (item.folder || item.playlist) {
                            let nextDub = currentDub, nextSeason = currentSeason;
                            const folderTitle = item.title || '';
                            const seasonMatch = folderTitle.match(/[Сс]езон\s*(\d+)/);
                            if (seasonMatch) {
                                nextSeason = seasonMatch[1];
                                if (folderTitle.trim().toLowerCase() !== `сезон ${nextSeason}`.toLowerCase()) {
                                    nextDub = folderTitle.replace(/[Сс]езон\s*\d+/g, '').replace(/\//g, '').trim() || currentDub;
                                }
                            } else if (folderTitle) {
                                nextDub = folderTitle;
                            }
                            walk(item.folder || item.playlist, nextDub, nextSeason);
                        } else if (item.file) {
                            const episodeTitle = item.title || 'Серія';
                            let finalDub = currentDub || providerName || 'UA';
                            let finalSeason = currentSeason;
                            const epSeasonMatch = episodeTitle.match(/[Сс]езон\s*(\d+)/);
                            if (epSeasonMatch) finalSeason = epSeasonMatch[1];
                            const epNumMatch = episodeTitle.match(/(\d+)\s*[Сс]ері[яіяа]|[Сс]ері[яіяа]\s*(\d+)|[Ее]п\.?\s*(\d+)/);
                            const episodeNumber = epNumMatch ? (epNumMatch[1] || epNumMatch[2] || epNumMatch[3]) : '1';
                            sources.push({ label: episodeTitle, file: item.file, provider: providerName, dub: finalDub.trim(), season: finalSeason, episode: episodeNumber });
                        }
                    });
                };
                if (Array.isArray(arr)) walk(arr);
                else if (arr.file) sources.push({ label: arr.title || 'Озвучка', file: arr.file, provider: providerName, dub: providerName || 'UA', season: '1', episode: '1' });
            } catch (e) { console.warn('Помилка парсингу JSON озвучок', e); }
        }
        if (sources.length === 0) {
            const urlMatches = [...text.matchAll(/https?:\/\/[^\s\'"<>]+\.m3u8[^\s\'"<>]*/g)];
            urlMatches.forEach((m, idx) => {
                if (!sources.some(s => s.file === m[0])) {
                    sources.push({ label: `Потік ${idx + 1}`, file: m[0], provider: providerName, dub: providerName || 'UA', season: '1', episode: String(idx + 1) });
                }
            });
        }
        return sources;
    }

    function extractPlayerIframeUrls(doc) {
        const selectors = ['.video-responsive iframe', '.player-responsive iframe', '#player iframe', '.pmovie__player iframe', 'iframe[src]', 'iframe[data-src]'];
        const urls = [];
        for (const sel of selectors) {
            safeQueryAll(sel, doc).forEach(el => {
                let src = el.getAttribute('src') || el.getAttribute('data-src');
                if (!src || src === 'about:blank') return;
                if (src.startsWith('//')) src = 'https:' + src;
                if (!src.startsWith('http')) src = ANIMEUA_BASE + src;
                urls.push(src);
            });
        }
        const scripts = safeQueryAll('script:not([src])', doc);
        for (const s of scripts) {
            const matches = s.textContent.matchAll(/(?:playerUrl|iframeUrl|src)\s*[:=]\s*['"]([^'"]+)['"]/g);
            for (const match of matches) {
                let url = match[1];
                if (url.includes('ashdi.vip') || url.includes('vidmoly') || url.includes('player')) {
                    if (url.startsWith('//')) url = 'https:' + url;
                    if (!url.startsWith('http')) url = ANIMEUA_BASE + url;
                    urls.push(url);
                }
            }
        }
        return [...new Set(urls)];
    }

    async function loadAnimeDetails(animeUrl) {
        const doc = await fetchUA(animeUrl);
        let title = '';
        for (const sel of ['.page__subcol-main h1', '.pmovie__title', 'h1.title', 'h1']) {
            const el = safeQuery(sel, doc);
            if (el?.textContent.trim()) { title = el.textContent.trim(); break; }
        }
        let poster = '';
        for (const sel of ['div.page__subcol-side .img-fit-cover img', '.pmovie__poster img', '.anime__poster img']) {
            const el = safeQuery(sel, doc);
            if (el) {
                const src = el.getAttribute('data-src') || el.getAttribute('src') || '';
                if (src) { poster = src.startsWith('http') ? src : ANIMEUA_BASE + src; break; }
            }
        }
        const genres = safeQueryAll('.pmovie__genres a, .genres a', doc).map(a => a.textContent.trim()).filter(Boolean);
        const yearEl = safeQuery('.pmovie__year, .release-year', doc);
        const yearMatch = (yearEl?.textContent || '').match(/\d{4}/);
        const year = yearMatch ? parseInt(yearMatch[0]) : null;
        let synopsis = '';
        for (const sel of ['.full-text', '.pmovie__description', '.anime__description']) {
            const el = safeQuery(sel, doc);
            if (el?.textContent.trim()) { synopsis = el.textContent.trim(); break; }
        }
        let rating = '';
        const ratingEl = doc.querySelector('.pmovie__age p, .pmovie__age');
        if (ratingEl) rating = ratingEl.textContent.replace('Рейтинг:', '').trim();

        const playerUrls = extractPlayerIframeUrls(doc);
        const allRawSources = [];
        for (const playerUrl of playerUrls) {
            try {
                let provider = 'Джерело';
                if (playerUrl.includes('ashdi')) provider = 'Ashdi';
                else if (playerUrl.includes('vidmoly')) provider = 'Vidmoly';
                else if (playerUrl.includes('player')) provider = 'Player';
                const playerHtml = await fetchUA(playerUrl);
                const text = playerHtml.body?.innerHTML || '';
                allRawSources.push(...extractSourcesFromText(text, provider));
                const nestedIframes = safeQueryAll('iframe', playerHtml);
                for (const nested of nestedIframes) {
                    let nestedUrl = nested.getAttribute('src') || nested.getAttribute('data-src');
                    if (nestedUrl && nestedUrl !== 'about:blank') {
                        if (nestedUrl.startsWith('//')) nestedUrl = 'https:' + nestedUrl;
                        if (!nestedUrl.startsWith('http')) nestedUrl = ANIMEUA_BASE + nestedUrl;
                        const nestedHtml = await fetchUA(nestedUrl);
                        allRawSources.push(...extractSourcesFromText(nestedHtml.body?.innerHTML || '', provider));
                    }
                }
            } catch (e) { console.warn('Player fetch failed', playerUrl, e); }
        }

        const seasons = {};
        const seenKeys = new Set();
        allRawSources.forEach(s => {
            const seasonNum = s.season || '1';
            const dubName = s.dub || 'UA';
            const episodeNum = s.episode || '1';
            const uniqueKey = `${seasonNum}-${dubName}-${episodeNum}-${s.file}`;
            if (!seenKeys.has(uniqueKey)) {
                seenKeys.add(uniqueKey);
                if (!seasons[seasonNum]) seasons[seasonNum] = {};
                if (!seasons[seasonNum][dubName]) seasons[seasonNum][dubName] = [];
                seasons[seasonNum][dubName].push({ title: s.label, season: seasonNum, episode: episodeNum, file: s.file, dub: dubName, provider: s.provider });
            }
        });
        for (const s in seasons) {
            for (const d in seasons[s]) {
                seasons[s][d].sort((a, b) => parseInt(a.episode) - parseInt(b.episode));
            }
        }

        return {
            mal_id: animeUrl.hashCode(),
            title,
            images: { jpg: { large_image_url: poster, image_url: poster } },
            genres, year, synopsis, seasons,
            url: animeUrl, from: 'animeua', rating
        };
    }

    // ===== player.js =====
    const hlsInstances = new Map();

    function destroyHlsForVideo(videoEl) {
        if (hlsInstances.has(videoEl)) {
            try { hlsInstances.get(videoEl).destroy(); } catch(e) {}
            hlsInstances.delete(videoEl);
        }
    }

    async function loadVideo(url, videoElement, options = {}) {
        if (!videoElement) return;
        destroyHlsForVideo(videoElement);
        videoElement.pause();
        videoElement.removeAttribute('src');
        videoElement.load();
        const playerLoading = document.getElementById('playerLoading');
        if (playerLoading) playerLoading.style.display = 'block';

        if (!url) { showToast('❌ Немає URL відео'); if (playerLoading) playerLoading.style.display = 'none'; return; }
        const proxyUrl = getProxyUrl(url);

        const maxRetries = options.maxRetries || 3;
        const autoplay = options.autoplay === true;
        let attempt = 0;

        function attachHls() {
            if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                const hls = new Hls({ enableWorker: true, lowLatencyMode: false, backBufferLength: 90 });
                hlsInstances.set(videoElement, hls);
                hls.loadSource(proxyUrl);
                hls.attachMedia(videoElement);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    if (playerLoading) playerLoading.style.display = 'none';
                    if (autoplay) videoElement.play().catch(() => {});
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (!data) return;
                    if (data.fatal) {
                        attempt++;
                        if (attempt <= maxRetries) {
                            const backoff = 800 * Math.pow(2, attempt);
                            setTimeout(() => {
                                try { hls.startLoad(); } catch (e) { attachFallback(); }
                            }, backoff);
                        } else {
                            destroyHlsForVideo(videoElement);
                            attachFallback();
                            showToast('Помилка відтворення. Спробувати ще');
                        }
                    }
                });
            } else {
                attachFallback();
            }
        }

        function attachFallback() {
            if (playerLoading) playerLoading.style.display = 'none';
            videoElement.src = proxyUrl;
            if (autoplay) videoElement.play().catch(() => {});
        }

        try { attachHls(); } catch (err) { attachFallback(); }
    }

            modalBody.innerHTML = `
                <div class="anime-detail-grid">
                    <div class="detail-poster"><img src="${anime.images.jpg.large_image_url}" alt="${anime.title}"></div>
                    <div class="detail-info">
                        <div>
                            <span class="tag"><i class="fas fa-calendar"></i> ${anime.year || '—'}</span>
                            <span class="tag"><i class="fas fa-film"></i> ${totalEpisodes} еп.</span>
                        </div>
                        <div style="margin:0.5rem 0">${anime.genres.map(g => `<span class="tag">${g}</span>`).join('')} ${ratingTag}</div>
                        <div class="synopsis-container">
                            <div class="synopsis" id="synopsisText">${anime.synopsis || 'Опис відсутній.'}</div>
                            <button class="more-btn" id="moreBtn" style="display:none;">більше</button>
                        </div>
                        <button class="btn-outline" id="toggleBookmarkBtn" style="margin-top:1.5rem;">
                            <i class="fas fa-star"></i> ${isBookmarked ? 'В обраному' : 'Додати в обране'}
                        </button>
                    </div>
                </div>
                <div style="margin-top:1.5rem;">
                    <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem;background:rgba(0,0,0,0.05);padding:1rem;border-radius:8px;">
                        <div style="display:flex;flex-direction:column;gap:0.3rem;">
                            <label style="font-size:0.8rem;font-weight:600;color:#666;">СЕЗОН</label>
                            <select id="seasonSelect" class="btn-outline" style="padding:0.5rem;min-width:120px;">
                                ${seasons.map(s => `<option value="${s}" ${s === firstSeason ? 'selected' : ''}>Сезон ${s}</option>`).join('')}
                            </select>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:0.3rem;">
                            <label style="font-size:0.8rem;font-weight:600;color:#666;">ОЗВУЧКА</label>
                            <select id="dubSelect" class="btn-outline" style="padding:0.5rem;min-width:200px;">
                                ${dubs.map(d => `<option value="${d}" ${d === firstDub ? 'selected' : ''}>${d}</option>`).join('')}
                            </select>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:0.3rem;">
                            <label style="font-size:0.8rem;font-weight:600;color:#666;">СЕРІЯ</label>
                            <select id="episodeSelect" class="btn-outline" style="padding:0.5rem;min-width:100px;">
                                ${episodes.map((ep, i) => `<option value="${ep.file}" ${i === startEpIndex ? 'selected' : ''}>Еп. ${ep.episode}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <div class="player-container" style="margin-top:1rem;background:#000;border-radius:8px;overflow:hidden;aspect-ratio:16/9;">
                        <video id="detailVideoPlayer" controls crossorigin="anonymous" style="width:100%;height:100%;"></video>
                    </div>
                </div>
            `;

            const detailVideoEl = document.getElementById('detailVideoPlayer');
            const seasonSelect = document.getElementById('seasonSelect');
            const dubSelect = document.getElementById('dubSelect');
            const episodeSelect = document.getElementById('episodeSelect');

            function updateDubs() {
                const s = seasonSelect.value;
                const avail = Object.keys(anime.seasons[s] || {}).sort();
                dubSelect.innerHTML = avail.map(d => `<option value="${d}">${d}</option>`).join('');
                updateEpisodes();
            }

            function updateEpisodes() {
                const s = seasonSelect.value, d = dubSelect.value;
                const eps = anime.seasons[s]?.[d] || [];
                episodeSelect.innerHTML = eps.map(ep => `<option value="${ep.file}">Еп. ${ep.episode}</option>`).join('');
            }

            async function playEpisode(file) {
                if (!file) { showToast('❌ Немає файлу'); return; }
                loadVideo(file, detailVideoEl, { autoplay: false });
                if (window.currentUser) {
                    try {
                        const s = seasonSelect.value, d = dubSelect.value;
                        const ep = (anime.seasons[s]?.[d] || []).find(e => e.file === file);
                        if (ep) await window.cloudSaveProgress(anime.mal_id, s, d, ep.episode);
                    } catch (err) { console.error('Cloud progress save error:', err); }
                }
            }

            seasonSelect.addEventListener('change', () => { updateDubs(); playEpisode(episodeSelect.value); });
            dubSelect.addEventListener('change', () => { updateEpisodes(); playEpisode(episodeSelect.value); });
            episodeSelect.addEventListener('change', () => playEpisode(episodeSelect.value));

            if (startFile) loadVideo(startFile, detailVideoEl, { autoplay: false });

            document.getElementById('toggleBookmarkBtn').addEventListener('click', async () => {
                await window.toggleBookmark(anime);
                let nowBm = false;
                if (window.currentUser) {
                    try { nowBm = (await window.cloudGetBookmarks()).some(b => b.mal_id === anime.mal_id); } catch (err) { console.error(err); }
                } else {
                    nowBm = Storage.getBookmarks().some(b => b.mal_id === anime.mal_id);
                }
                document.getElementById('toggleBookmarkBtn').innerHTML = `<i class="fas fa-star"></i> ${nowBm ? 'В обраному' : 'Додати в обране'}`;
            });

            const synopsisText = document.getElementById('synopsisText');
            const moreBtn = document.getElementById('moreBtn');
            if (synopsisText && moreBtn) {
                if (synopsisText.scrollHeight > synopsisText.clientHeight) moreBtn.style.display = 'block';
                moreBtn.addEventListener('click', () => {
                    const expanded = synopsisText.classList.toggle('expanded');
                    moreBtn.textContent = expanded ? 'менше' : 'більше';
                });
            }
        } catch (err) {
            modalBody.innerHTML = `<div class="loader"><i class="fas fa-exclamation-circle"></i> Помилка: ${err.message}</div>`;
        }
    };

    // ===== app.js =====
    let currentTab = 'main';
    let currentPage = 1;
    let currentSearchQuery = '';
    let currentGenreSlug = null;
    let currentList = [];

    window.changePage = (p) => {
        currentPage = p;
        window.scrollTo(0, 0);
        loadContent();
    };

    async function loadContent() {
        const container = document.getElementById('animeContainer');
        if (!container) return;
        container.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-pulse"></i> Завантаження...</div>';
        try {
            if (currentTab === 'top100') {
                currentList = await fetchTop100();
            } else if (currentSearchQuery) {
                currentList = await searchAnimeUA(currentSearchQuery, currentPage);
            } else if (currentGenreSlug) {
                currentList = await fetchByGenre(currentGenreSlug, currentPage);
            } else {
                currentList = await fetchMainPage(currentPage);
            }
            renderCards(currentList);
        } catch (err) {
            container.innerHTML = `<div class="loader"><i class="fas fa-exclamation-triangle"></i> Помилка: ${err.message}</div>`;
        }
    }

    async function showTop100() {
        currentTab = 'top100';
        currentPage = 1;
        currentSearchQuery = '';
        currentGenreSlug = null;
        const container = document.getElementById('animeContainer');
        if (container) container.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-pulse"></i> Завантаження ТОП 100...</div>';
        try {
            currentList = await fetchTop100();
            renderCards(currentList);
        } catch (err) {
            if (container) container.innerHTML = `<div class="loader"><i class="fas fa-exclamation-triangle"></i> Помилка: ${err.message}</div>`;
        }
    }

    function openRandomAnime() {
        openDetailModal(`${ANIMEUA_BASE}/index.php?do=rand`);
    }

    async function initGenres() {
        const categoryScroll = document.getElementById('categoryScroll');
        if (!categoryScroll) return;
        const genres = fetchGenres();
        categoryScroll.querySelectorAll('.category-pill').forEach(p => p.remove());

        const allBtn = document.createElement('button');
        allBtn.className = 'category-pill active-pill';
        allBtn.textContent = 'Усі';
        allBtn.addEventListener('click', () => {
            currentGenreSlug = null;
            currentPage = 1;
            currentTab = 'main';
            document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active-pill'));
            allBtn.classList.add('active-pill');
            loadContent();
        });
        categoryScroll.appendChild(allBtn);

        genres.forEach(genre => {
            const btn = document.createElement('button');
            btn.className = 'category-pill';
            btn.textContent = genre.name;
            btn.addEventListener('click', () => {
                currentGenreSlug = genre.slug;
                currentPage = 1;
                currentTab = 'main';
                document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active-pill'));
                btn.classList.add('active-pill');
                loadContent();
            });
            categoryScroll.appendChild(btn);
        });
    }

    // Init
    applyTheme(Storage.getTheme());
    updateBadge();

    const themeBtn = document.getElementById('themeToggleBtn');
    const profileBtn = document.getElementById('profileBtn');
    const searchInput = document.getElementById('searchInput');
    const topBtn = document.getElementById('top100Btn');
    const randBtn = document.getElementById('randomBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const closePlayerBtn = document.getElementById('closePlayerBtn');
    const closeProfileBtn = document.getElementById('closeProfileBtn');
    const playerModal = document.getElementById('playerModal');
    const profileModal = document.getElementById('profileModal');
    const mainVideoPlayer = document.getElementById('mainVideoPlayer');

    if (themeBtn) themeBtn.addEventListener('click', window.toggleTheme);
    if (profileBtn) profileBtn.addEventListener('click', window.openProfileModal);
    if (searchInput) searchInput.addEventListener('input', debounce(() => {
        currentSearchQuery = searchInput.value.trim();
        currentPage = 1;
        currentTab = 'main';
        loadContent();
    }, 500));
    if (topBtn) topBtn.addEventListener('click', showTop100);
    if (randBtn) randBtn.addEventListener('click', openRandomAnime);
    if (closeModalBtn) closeModalBtn.addEventListener('click', closeDetailModal);
    if (closePlayerBtn) closePlayerBtn.addEventListener('click', () => {
        playerModal.style.display = 'none';
        document.body.style.overflow = '';
        destroyHlsForVideo(mainVideoPlayer);
    });
    if (closeProfileBtn) closeProfileBtn.addEventListener('click', () => {
        profileModal.style.display = 'none';
        document.body.style.overflow = '';
    });

    window.addEventListener('click', (e) => {
        const animeModal = document.getElementById('animeModal');
        if (e.target === animeModal) closeDetailModal();
        if (e.target === playerModal) { playerModal.style.display = 'none'; document.body.style.overflow = ''; destroyHlsForVideo(mainVideoPlayer); }
        if (e.target === profileModal) { profileModal.style.display = 'none'; document.body.style.overflow = ''; }
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeDetailModal();
            if (playerModal) { playerModal.style.display = 'none'; destroyHlsForVideo(mainVideoPlayer); }
            document.body.style.overflow = '';
            if (profileModal) profileModal.style.display = 'none';
            window.closeAuthModal?.();
        }
    });

    // Start app
    initGenres().then(() => loadContent());
  }

  // Wait for Firebase to be ready before running the app
  if (window.firebaseApp || document.readyState === 'complete') {
    initApp();
  } else {
    window.addEventListener('firebase-ready', initApp);
  }
</script>
</body>
</html>
