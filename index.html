        document.getElementById('avatarFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const dataUrl = ev.target.result;
                const profile = getProfile();
                profile.avatar = dataUrl;
                saveProfile(profile);
                if (Router.currentRoute === 'profile') renderProfilePage();
                showToast('Аватарку оновлено');
                e.target.value = '';
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('bannerFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const dataUrl = ev.target.result;
                const profile = getProfile();
                profile.banner = dataUrl;
                saveProfile(profile);
                if (Router.currentRoute === 'profile') renderProfilePage();
                showToast('Банер оновлено');
                e.target.value = '';
            };
            reader.readAsDataURL(file);
        });

        // ====================================================================
        //  СТОРІНКА ЖАНРУ
        // ====================================================================
        let genrePageState = { slug: '', name: '', page: 1, list: [] };

        async function renderGenrePage(slug, name) {
            const container = document.getElementById('genrePageContainer');
            if (!container) return;
            genrePageState.slug = slug;
            genrePageState.name = name || slug;
            genrePageState.page = 1;

            container.innerHTML = `
            <div class="genre-page-header">
              <button class="genre-page-back" onclick="Router.goTo('main')"><i class="fas fa-arrow-left"></i> На головну</button>
              <h2>${genrePageState.name}</h2>
            </div>
            <div id="genrePageContent" class="grid-3cols">
              <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Завантаження...</div>
            </div>
            <div class="pagination-row" id="genrePagePagination"></div>
          `;

            await loadGenrePageContent();
        }

        async function loadGenrePageContent() {
            const content = document.getElementById('genrePageContent');
            const pagination = document.getElementById('genrePagePagination');
            if (!content) return;

            content.innerHTML = '<div class="loader" style="grid-column:1/-1;"><i class="fas fa-spinner fa-pulse"></i> Завантаження...</div>';
            try {
                const list = await fetchAnimeuaByGenre(genrePageState.slug, genrePageState.page);
                genrePageState.list = list;
                if (!list.length) {
                    content.innerHTML =
                        '<div class="loader" style="grid-column:1/-1;">Нічого не знайдено в цьому жанрі</div>';
                    pagination.innerHTML = '';
                    return;
                }
                content.innerHTML = list.map((a, idx) => {
                    const poster = a.images?.jpg?.large_image_url || '';
                    const title = a.title || 'Без назви';
                    return `
                <div class="anime-card" data-url="${a.url}" tabindex="0" role="button" aria-label="${title}" style="animation-delay:${idx*0.03}s">
                  <div class="anime-poster">
                    <img src="${poster}" alt="${title}" loading="lazy" class="img--blur" onload="this.classList.add('img--loaded')" onerror="this.src='data:image/svg+xml,...'">
                  </div>
                  <div class="anime-title-under">${title}</div>
                </div>
              `;
                }).join('');

                content.querySelectorAll('.anime-card').forEach(card => {
                    card.addEventListener('click', () => openPlayerPage(card.dataset.url));
                    card.addEventListener('keydown', e => { if (e.key === 'Enter') openPlayerPage(card.dataset
                            .url); });
                });

                const prevDisabled = genrePageState.page <= 1 ? 'disabled' : '';
                pagination.innerHTML = `
              <button class="btn-outline" onclick="changeGenrePage(${genrePageState.page-1})" ${prevDisabled}><i class="fas fa-chevron-left"></i> Назад</button>
              <span class="page-indicator">Сторінка ${genrePageState.page}</span>
              <button class="btn-outline" onclick="changeGenrePage(${genrePageState.page+1})">Вперед <i class="fas fa-chevron-right"></i></button>
            `;
            } catch (err) {
                content.innerHTML =
                    `<div class="loader" style="grid-column:1/-1;"><i class="fas fa-exclamation-triangle"></i> Помилка: ${err.message}<br><button class="btn-outline" style="margin-top:1rem;" onclick="loadGenrePageContent()">Спробувати знову</button></div>`;
                pagination.innerHTML = '';
            }
        }

        window.changeGenrePage = (p) => {
            if (p < 1) return;
            genrePageState.page = p;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            loadGenrePageContent();
        };

        // ====================================================================
        //  НОВИЙ ПЛЕЄР (інтеграція)
        // ====================================================================
        let playerPageAnime = null;
        let playerPagePlayer = null;
        let playerPageCurrentSeason = '1';
        let playerPageCurrentDub = '';
        let playerPageCurrentQuality = '720p';
        let playerPageActiveEpisodeFile = null;
        let playerPageCurrentAnimeUrl = null;
        let playerPageCurrentView = 'grid';
        let playerPageEpisodes = [];

        // відкрити плеєр
        async function openPlayerPage(url) {
            const modal = document.getElementById('playerPageModal');
            if (!modal) return;
            if (playerPagePlayer) { playerPagePlayer.destroy();
                playerPagePlayer = null; }

            // скидаємо стан
            document.getElementById('playerVideoWrap').classList.remove('active');
            document.getElementById('playerVideoInner').innerHTML = '';
            document.getElementById('playerViewGrid').innerHTML = '';
            document.getElementById('playerViewCompact').innerHTML = '';
            document.getElementById('playerViewClassic').innerHTML = '';
            document.getElementById('playerSeasonRow').innerHTML =
                '<span class="player-season-label">Сезон</span>';
            document.getElementById('playerFilterChip').textContent = 'Сезон: 1';
            document.getElementById('playerSourceLabel').textContent = 'Джерело';

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            try {
                const anime = await loadAnimeuaDetail(url);
                playerPageAnime = anime;
                playerPageCurrentAnimeUrl = url;

                // заголовок
                document.getElementById('playerPageTitle').textContent = anime.title || 'Без назви';

                // фон
                const poster = anime.images?.jpg?.large_image_url || '';
                document.getElementById('playerAmbientBg').style.backgroundImage = `url(${poster})`;

                // сезони та озвучки
                const seasons = Object.keys(anime.seasons || {}).sort((a, b) => parseInt(a) - parseInt(b));
                if (seasons.length === 0) {
                    document.getElementById('playerViewGrid').innerHTML =
                        '<div class="loader" style="grid-column:1/-1;color:rgba(255,255,255,0.5);">Немає серій</div>';
                    return;
                }
                playerPageCurrentSeason = seasons[0];
                const dubs = Object.keys((anime.seasons[playerPageCurrentSeason]) || {}).sort();
                playerPageCurrentDub = dubs[0] || '';

                // будуємо список сезонів
                buildSeasonButtons(seasons);
                // будуємо серії
                buildEpisodes();

                // оновлюємо фільтр-чіп
                document.getElementById('playerFilterChip').textContent =
                    `Сезон: ${playerPageCurrentSeason} · ${playerPageCurrentDub}`;

                // джерело за замовчуванням
                const sourceLabel = document.getElementById('playerSourceLabel');
                const allSources = getAllSources();
                if (allSources.length) {
                    sourceLabel.textContent = allSources[0].provider || 'Джерело';
                } else {
                    sourceLabel.textContent = 'Джерело';
                }

                // додати до історії
                addToHistory(anime);

            } catch (err) {
                document.getElementById('playerViewGrid').innerHTML =
                    `<div class="loader" style="grid-column:1/-1;color:rgba(255,255,255,0.5);">Помилка: ${err.message}</div>`;
                console.error(err);
            }
        }

        function buildSeasonButtons(seasons) {
            const row = document.getElementById('playerSeasonRow');
            row.innerHTML = `<span class="player-season-label">Сезон</span>`;
            seasons.forEach(s => {
                const btn = document.createElement('div');
                btn.className = 'player-season-btn' + (s === playerPageCurrentSeason ? ' active' : '');
                btn.dataset.season = s;
                btn.textContent = s;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.player-season-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    playerPageCurrentSeason = s;
                    const dubs = Object.keys((playerPageAnime.seasons[s]) || {}).sort();
                    playerPageCurrentDub = dubs[0] || '';
                    document.getElementById('playerFilterChip').textContent =
                        `Сезон: ${s} · ${playerPageCurrentDub}`;
                    buildEpisodes();
                });
                row.appendChild(btn);
            });
        }

        function buildEpisodes() {
            const anime = playerPageAnime;
            if (!anime) return;
            const episodes = anime.seasons?.[playerPageCurrentSeason]?.[playerPageCurrentDub] || [];
            playerPageEpisodes = episodes.map((ep, idx) => ({
                num: idx + 1,
                title: ep.title || `Серія ${idx+1}`,
                duration: '00:23',
                rating: '8.0',
                dub: playerPageCurrentDub,
                watched: false,
                progress: 0,
                watchedText: '',
                thumb: anime.images?.jpg?.large_image_url || '',
                file: ep.file,
                episode: ep.episode
            }));

            // оновлюємо всі види
            renderPlayerView('grid');
            renderPlayerView('compact');
            renderPlayerView('classic');
            // показати активний
            setPlayerView(playerPageCurrentView);
        }

        function renderPlayerView(view) {
            const container = document.getElementById('playerView' + view.charAt(0).toUpperCase() + view.slice(1));
            if (!container) return;
            const episodes = playerPageEpisodes;
            if (!episodes.length) {
                container.innerHTML = '<div class="loader" style="grid-column:1/-1;color:rgba(255,255,255,0.5);">Немає серій</div>';
                return;
            }

            let html = '';
            episodes.forEach((ep, idx) => {
                const num = ep.num;
                const title = ep.title || `Серія ${num}`;
                const duration = ep.duration || '00:23';
                const rating = ep.rating || '8.0';
                const dub = ep.dub || playerPageCurrentDub;
                const watched = ep.watched || false;
                const progress = ep.progress || 0;
                const watchedText = ep.watchedText || '';
                const thumb = ep.thumb || '';

                if (view === 'grid') {
                    html += `
                <div class="player-grid-card" data-file="${ep.file || ''}" data-episode="${ep.episode || num}">
                  <img class="player-grid-thumb" src="${thumb}" alt="${title}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22%3E%3Crect fill=%22%23333%22 width=%22320%22 height=%22180%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 fill=%22%23666%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2220%22%3E${title}%3C/text%3E%3C/svg%3E'">
                  <div class="player-ep-badge">${String(num).padStart(2,'0')}</div>
                  ${watched ? `<div class="player-watched-icon">✓</div>` : ''}
                  <div class="player-grid-info">
                    <div class="player-grid-ep-title">${title}</div>
                    ${watchedText ? `<div style="font-size:.63rem;color:rgba(255,255,255,0.42);margin-bottom:.2rem;">Переглянуто - ${watchedText}</div>` : ''}
                    <div class="player-grid-progress"><div class="player-grid-progress-fill" style="width:${progress}%"></div></div>
                    <div class="player-grid-meta"><span class="rating">♦ ${rating}</span><span>•</span><span>${dub}</span></div>
                  </div>
                </div>
              `;
                } else if (view === 'compact') {
                    html += `
                <div class="player-compact-card" data-file="${ep.file || ''}" data-episode="${ep.episode || num}">
                  <div class="player-compact-thumb-wrap">
                    <img class="player-compact-thumb" src="${thumb}" alt="${title}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2290%22 height=%2268%22%3E%3Crect fill=%22%23333%22 width=%2290%22 height=%2268%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 fill=%22%23666%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22%3E${title}%3C/text%3E%3C/svg%3E'">
                    <div class="player-compact-badge">${String(num).padStart(2,'0')}</div>
                    ${watched ? `<div class="player-compact-watched"><svg viewBox="0 0 16 16" fill="rgba(255,255,255,0.8)"><circle cx="8" cy="8" r="7" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="rgba(255,255,255,0.15)"/><path d="M5 8l2 2 4-4" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg></div>` : ''}
                  </div>
                  <div class="player-compact-info">
                    <div class="player-compact-title-row">
                      <div class="player-compact-ep-title">${title}</div>
                      <div class="player-compact-duration">${duration}</div>
                    </div>
                    ${watchedText ? `<div class="player-compact-watched-text">Переглянуто - ${watchedText}</div>` : ''}
                    <div class="player-compact-progress"><div class="player-compact-progress-fill" style="width:${progress}%"></div></div>
                    <div class="player-compact-meta"><span class="rating">♦ ${rating}</span><span>•</span><span>${dub}</span></div>
                  </div>
                </div>
              `;
                } else if (view === 'classic') {
                    html += `
                <div class="player-classic-card" data-file="${ep.file || ''}" data-episode="${ep.episode || num}">
                  <div class="player-classic-thumb-wrap">
                    <img class="player-classic-thumb" src="${thumb}" alt="${title}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22110%22 height=%2280%22%3E%3Crect fill=%22%23333%22 width=%22110%22 height=%2280%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 fill=%22%23666%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2216%22%3E${title}%3C/text%3E%3C/svg%3E'">
                    <div class="player-classic-badge">${String(num).padStart(2,'0')}</div>
                    ${watched ? `<div class="player-classic-watched-icon"><svg viewBox="0 0 16 16" fill="rgba(255,255,255,0.8)"><circle cx="8" cy="8" r="7" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="rgba(255,255,255,0.15)"/><path d="M5 8l2 2 4-4" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg></div>` : ''}
                  </div>
                  <div class="player-classic-info">
                    <div class="player-classic-title-row">
                      <div class="player-classic-ep-title">${title}</div>
                      <div class="player-classic-duration">${duration}</div>
                    </div>
                    ${watchedText ? `<div class="player-classic-watched-text">Переглянуто - ${watchedText}</div>` : ''}
                    <div class="player-classic-progress"><div class="player-classic-progress-fill" style="width:${progress}%"></div></div>
                    <div class="player-classic-meta"><span class="rating">♦ ${rating}</span><span>•</span><span>${dub}</span></div>
                  </div>
                </div>
              `;
                }
            });

            container.innerHTML = html;

            // кліки на серії
            container.querySelectorAll('[data-file]').forEach(el => {
                el.addEventListener('click', () => {
                    const file = el.dataset.file;
                    const episode = el.dataset.episode;
                    if (file) {
                        playEpisode(file);
                        // оновлюємо історію
                        if (playerPageAnime) {
                            const history = Storage.getHistory();
                            const idx = history.findIndex(h => h.url === playerPageAnime.url);
                            if (idx >= 0) {
                                history[idx].episode = episode || '1';
                                history[idx].timestamp = Date.now();
                                Storage.setHistory(history);
                            }
                        }
                    }
                });
            });
        }

        function setPlayerView(view) {
            playerPageCurrentView = view;
            ['grid', 'compact', 'classic'].forEach(v => {
                const el = document.getElementById('playerView' + v.charAt(0).toUpperCase() + v.slice(1));
                if (el) {
                    if (v === view) el.classList.remove('player-hidden');
                    else el.classList.add('player-hidden');
                }
            });
            document.querySelectorAll('.player-view-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.view === view);
            });
        }

        // обробка вкладок перегляду
        document.querySelectorAll('.player-view-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                setPlayerView(tab.dataset.view);
            });
        });

        function playEpisode(file) {
            if (!file) { showToast('Немає файлу для відтворення'); return; }
            playerPageActiveEpisodeFile = file;
            const wrap = document.getElementById('playerVideoWrap');
            const inner = document.getElementById('playerVideoInner');
            wrap.classList.add('active');
            inner.innerHTML = '';
            if (playerPagePlayer) { playerPagePlayer.destroy();
                playerPagePlayer = null; }
            playerPagePlayer = new LampaPlayer(inner, {});
            playerPagePlayer.loadSource(file, playerPageAnime?.title || '', '');
            setTimeout(() => { wrap.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 150);
        }

        function closePlayerPage() {
            const modal = document.getElementById('playerPageModal');
            if (!modal) return;
            modal.style.display = 'none';
            document.body.style.overflow = '';
            if (playerPagePlayer) { playerPagePlayer.destroy();
                playerPagePlayer = null; }
            document.getElementById('playerVideoWrap').classList.remove('active');
            document.getElementById('playerVideoInner').innerHTML = '';
        }

        // ===== Фільтри =====
        function getAllSources() {
            const all = [];
            if (playerPageAnime) {
                for (const s in playerPageAnime.seasons) {
                    for (const d in playerPageAnime.seasons[s]) {
                        for (const ep of playerPageAnime.seasons[s][d]) {
                            if (ep.provider && !all.find(p => p.provider === ep.provider)) {
                                all.push({ provider: ep.provider, file: ep.file });
                            }
                        }
                    }
                }
            }
            return all;
        }

        function getQualities() {
            // заглушка — можна розширити
            return ['1080p', '720p', '480p'];
        }

        function getDubs() {
            if (!playerPageAnime) return [];
            const dubs = new Set();
            for (const s in playerPageAnime.seasons) {
                for (const d in playerPageAnime.seasons[s]) {
                    dubs.add(d);
                }
            }
            return Array.from(dubs).sort();
        }

        function getSeasons() {
            if (!playerPageAnime) return [];
            return Object.keys(playerPageAnime.seasons || {}).sort((a, b) => parseInt(a) - parseInt(b));
        }

        // ===== Bottom Sheets =====
        function openPlayerSheet(type) {
            const overlay = document.getElementById('playerSheetOverlay');
            const title = document.getElementById('playerSheetTitle');
            const list = document.getElementById('playerSheetList');

            if (type === 'source') {
                title.textContent = 'Онлайн джерела';
                const sources = getAllSources();
                if (!sources.length) {
                    list.innerHTML = '<div class="player-sheet-item">Немає джерел</div>';
                } else {
                    list.innerHTML = sources.map(s => `
                <div class="player-sheet-item selected" onclick="selectSource('${s.provider}')">
                  <span class="player-sheet-item-label">${s.provider}</span>
                  <span class="player-sheet-item-check">✓</span>
                </div>
              `).join('');
                }
            } else if (type === 'filter') {
                title.textContent = 'Фільтри';
                const seasons = getSeasons();
                const dubs = getDubs();
                const qualities = getQualities();
                let html = `
              <div class="player-filter-section">
                <div class="player-filter-section-title">Якість відео</div>
                ${qualities.map(q => `
                  <div class="player-sheet-item ${q === playerPageCurrentQuality ? 'selected' : ''}" onclick="selectQuality('${q}')">
                    <span class="player-sheet-item-label">${q}</span>
                    ${q === playerPageCurrentQuality ? '<span class="player-sheet-item-check">✓</span>' : ''}
                  </div>
                `).join('')}
              </div>
              <div class="player-filter-section">
                <div class="player-filter-section-title">Переклад</div>
                ${dubs.map(d => `
                  <div class="player-sheet-item ${d === playerPageCurrentDub ? 'selected' : ''}" onclick="selectDub('${d}')">
                    <span class="player-sheet-item-label">${d}</span>
                    ${d === playerPageCurrentDub ? '<span class="player-sheet-item-check">✓</span>' : ''}
                  </div>
                `).join('')}
              </div>
              <div class="player-filter-section">
                <div class="player-filter-section-title">Сезон</div>
                ${seasons.map(s => `
                  <div class="player-sheet-item ${s === playerPageCurrentSeason ? 'selected' : ''}" onclick="selectSeason('${s}')">
                    <span class="player-sheet-item-label">Сезон ${s}</span>
                    ${s === playerPageCurrentSeason ? '<span class="player-sheet-item-check">✓</span>' : ''}
                  </div>
                `).join('')}
              </div>
            `;
                list.innerHTML = html;
            }

            overlay.classList.add('open');
        }

        function closePlayerSheet() {
            document.getElementById('playerSheetOverlay').classList.remove('open');
        }

        window.selectSource = function(provider) {
            // знаходимо перший файл з цим провайдером і відтворюємо
            for (const s in playerPageAnime.seasons) {
                for (const d in playerPageAnime.seasons[s]) {
                    for (const ep of playerPageAnime.seasons[s][d]) {
                        if (ep.provider === provider && ep.file) {
                            playEpisode(ep.file);
                            document.getElementById('playerSourceLabel').textContent = provider;
                            closePlayerSheet();
                            return;
                        }
                    }
                }
            }
            showToast('Джерело не знайдено');
            closePlayerSheet();
        };

        window.selectQuality = function(q) {
            playerPageCurrentQuality = q;
            closePlayerSheet();
            buildEpisodes();
            showToast(`Якість: ${q}`);
        };

        window.selectDub = function(d) {
            playerPageCurrentDub = d;
            document.getElementById('playerFilterChip').textContent =
                `Сезон: ${playerPageCurrentSeason} · ${d}`;
            closePlayerSheet();
            buildEpisodes();
            showToast(`Озвучка: ${d}`);
        };

        window.selectSeason = function(s) {
            playerPageCurrentSeason = s;
            document.getElementById('playerFilterChip').textContent =
                `Сезон: ${s} · ${playerPageCurrentDub}`;
            // оновлюємо кнопки сезонів
            document.querySelectorAll('.player-season-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.season === s);
            });
            closePlayerSheet();
            buildEpisodes();
            showToast(`Сезон ${s}`);
        };

        // Додати до історії
        function addToHistory(anime) {
            const history = Storage.getHistory();
            const existing = history.findIndex(h => h.url === anime.url);
            const entry = {
                animeId: anime.mal_id || anime.url.hashCode(),
                title: anime.title,
                poster: anime.images?.jpg?.large_image_url || '',
                url: anime.url,
                episode: '1',
                timestamp: Date.now(),
                progress: 0,
                duration: 0
            };
            if (existing >= 0) {
                history[existing].timestamp = Date.now();
                history[existing].progress = Math.min((history[existing].progress || 0) + 5, 100);
                Storage.setHistory(history);
                return;
            }
            history.unshift(entry);
            if (history.length > 200) history.length = 200;
            Storage.setHistory(history);
        }

        // Кнопка закриття плеєра
        document.getElementById('closePlayerPageBtn').addEventListener('click', closePlayerPage);

        // ====================================================================
        //  ОБРОБНИКИ ПОДІЙ
        // ====================================================================
        document.getElementById('burgerBtn').addEventListener('click', (e) => { e.stopPropagation();
            toggleLeftdock(); });

        document.getElementById('searchCircleBtn').addEventListener('click', () => {
            Router.goTo('search');
            setTimeout(() => {
                const inp = document.getElementById('searchPageInput');
                if (inp) inp.focus();
            }, 200);
        });

        document.getElementById('top100Btn').addEventListener('click', showTop100);
        document.getElementById('randomBtn').addEventListener('click', openRandomAnime);
        document.getElementById('logoHome').addEventListener('click', () => Router.goTo('main'));

        window.openSearchPage = function() {
            Router.goTo('search');
            setTimeout(() => {
                const inp = document.getElementById('searchPageInput');
                if (inp) inp.focus();
            }, 200);
        };

        // Клавіатура
        document.addEventListener('keydown', (e) => {
            const tag = document.activeElement?.tagName?.toLowerCase();
            const isInput = tag === 'input' || tag === 'textarea' || tag === 'select' || document.activeElement
                ?.isContentEditable;
            if (e.key === 'Escape') {
                closePlayerPage();
                if (leftdockOpen) hideLeftdock(true);
                if (document.getElementById('playerSheetOverlay').classList.contains('open')) closePlayerSheet();
                return;
            }
            if (isInput) return;
            if (e.key === '/' || (e.key === 'k' && (e.ctrlKey || e.metaKey))) {
                e.preventDefault();
                if (Router.currentRoute === 'search') {
                    document.getElementById('searchPageInput')?.focus();
                } else {
                    Router.goTo('search');
                    setTimeout(() => { document.getElementById('searchPageInput')?.focus(); }, 200);
                }
                return;
            }
            if (e.key === 'm' || e.key === 'M') { e.preventDefault();
                toggleLeftdock(); return; }
            if (e.key === 't' || e.key === 'T') { e.preventDefault();
                toggleTheme(); return; }
            if (e.key === 'r' || e.key === 'R') { e.preventDefault();
                openRandomAnime(); return; }
        });

        // Кнопка вгору
        const backToTopBtn = document.getElementById('backToTopBtn');

        function updateBackToTop() { if (window.scrollY > 500) backToTopBtn.classList.add('visible');
            else backToTopBtn.classList.remove('visible'); }
        backToTopBtn.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });
        window.addEventListener('scroll', updateBackToTop, { passive: true });

        // ====================================================================
        //  ІНІЦІАЛІЗАЦІЯ
        // ====================================================================
        async function init() {
            applyTheme(Storage.getTheme());
            await buildLeftdock();
            buildHeroBanner();
            startClock();
            updateBackToTop();

            Router.init();

            if (Router.currentRoute === 'main') {
                loadAndDisplayGenreSections();
            }

            if (window.location.hash === '#profile') {
                Router.goTo('profile');
            }

            const hash = window.location.hash.slice(1);
            if (hash.startsWith('genre')) {
                const parts = hash.split('?');
                if (parts.length > 1) {
                    const params = Object.fromEntries(new URLSearchParams(parts[1]));
                    if (params.slug) {
                        const name = params.name || params.slug;
                        Router.goTo('genre', { slug: params.slug, name });
                    }
                }
            }

            if (hash === 'search') {
                Router.goTo('search');
            }

            if (hash === 'settings') {
                Router.goTo('settings');
            }

            console.log('VAKDAB v5.0 — Новий плеєр інтегровано');
            console.log('Клавіші: / пошук • M меню • T тема • R випадкове • Esc закрити');
        }

        document.addEventListener('DOMContentLoaded', init);

        // Глобальні функції
        window.Router = Router;
        window.clearSearch = clearSearch;
        window.showTop100 = showTop100;
        window.openRandomAnime = openRandomAnime;
        window.openPlayerPage = openPlayerPage;
        window.closePlayerPage = closePlayerPage;
        window.toggleTheme = toggleTheme;
        window.toggleLeftdock = toggleLeftdock;
        window.profileEditNick = profileEditNick;
        window.profileEditBio = profileEditBio;
        window.changeGenrePage = changeGenrePage;
        window.loadGenrePageContent = loadGenrePageContent;
        window.renderProfilePage = renderProfilePage;
        window.performSearchPage = performSearchPage;
        window.changeSearchPage = changeSearchPage;
        window.renderSettingsPage = renderSettingsPage;
        window.openSearchPage = openSearchPage;
        window.openPlayerSheet = openPlayerSheet;
        window.closePlayerSheet = closePlayerSheet;
        window.selectSource = selectSource;
        window.selectQuality = selectQuality;
        window.selectDub = selectDub;
        window.selectSeason = selectSeason;
    </script>
</body>
</html>
