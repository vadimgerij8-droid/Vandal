<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VAKDAB • твій аніме каталог</title>
    <link rel="preconnect" href="https://monoanime.animegran8.workers.dev" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <meta property="og:title" content="VAKDAB - твій аніме каталог" />
    <meta property="og:description" content="Сучасна платформа для перегляду аніме" />
    <meta property="og:type" content="website" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" defer></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <meta name="theme-color" content="#0d0d0d" />

    <style>
        /* ============================================================
                   CSS ЗМІННІ (Mobile-First)
                   ============================================================ */
        :root {
            --accent: #0b0b0b;
            --accent-rgb: 11, 11, 11;
            --accent-hover: #1a1a1a;
            --accent-text: #ffffff;
            --accent-gradient: linear-gradient(135deg, #0b0b0b, #1a1a1a);
            --accent-light: rgba(11, 11, 11, 0.15);
            --accent-glow: rgba(11, 11, 11, 0.35);
            --bg: #ffffff;
            --surface: rgba(255, 255, 255, 0.98);
            --text: #0b0b0b;
            --text-secondary: #4a4a4a;
            --text-muted: #7a7a7a;
            --border: #e9e9e9;
            --border-light: #f3f3f3;
            --border-hover: #d0d0d0;
            --hover: rgba(0, 0, 0, 0.03);
            --tag-bg: #f6f6f6;
            --glass: rgba(255, 255, 255, 0.6);
            --glass-dark: rgba(20, 20, 20, 0.35);
            --blur-amount: 8px;
            --shadow-sm: 0 6px 18px rgba(11, 11, 11, 0.06);
            --shadow-md: 0 14px 32px rgba(11, 11, 11, 0.10);
            --shadow-lg: 0 30px 60px rgba(11, 11, 11, 0.14);
            --radius-sm: 12px;
            --radius: 16px;
            --radius-md: 14px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --transition: 280ms cubic-bezier(.2, .9, .2, 1);
            --transition-smooth: 360ms cubic-bezier(.2, .9, .2, 1);
            --agnative-scale: 1;
        }

        .dark-mode {
            --accent: #f7f7f7;
            --accent-rgb: 247, 247, 247;
            --accent-hover: #cfcfcf;
            --accent-text: #0a0a0a;
            --accent-gradient: linear-gradient(135deg, #f7f7f7, #cfcfcf);
            --accent-light: rgba(247, 247, 247, 0.15);
            --accent-glow: rgba(247, 247, 247, 0.35);
            --bg: #0a0a0a;
            --surface: rgba(20, 20, 20, 0.95);
            --text: #f7f7f7;
            --text-secondary: #cfcfcf;
            --text-muted: #9a9a9a;
            --border: #222222;
            --border-light: #151515;
            --border-hover: #3a3a3a;
            --hover: rgba(255, 255, 255, 0.02);
            --tag-bg: #141414;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-dark: rgba(0, 0, 0, 0.45);
            --shadow-sm: 0 6px 18px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 14px 32px rgba(0, 0, 0, 0.55);
            --shadow-lg: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            height: 100%;
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background var(--transition-smooth), color var(--transition-smooth);
            line-height: 1.5;
            overflow-x: hidden;
            font-size: 16px;
        }

        .app-container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 0.75rem 0.75rem 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        @media (min-width:480px) { .app-container { padding: 1rem 1rem 2.5rem; } }
        @media (min-width:768px) { .app-container { padding: 1.25rem 1.5rem 2.5rem; } }
        @media (min-width:1024px) { .app-container { padding: 1.5rem 2rem 3rem; } }

        /* Анімації */
        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(16px); }
            to { opacity:1; transform:translateY(0); }
        }
        @keyframes subtlePulse {
            0%,100% { transform:scale(1); }
            50% { transform:scale(1.02); }
        }
        @keyframes scaleIn {
            from { opacity:0; transform:scale(0.92); }
            to { opacity:1; transform:scale(1); }
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes skeletonShimmer {
            0% { background-position:-200px 0; }
            100% { background-position:calc(200px + 100%) 0; }
        }
        @keyframes kenBurns {
            0% { transform:scale(1) translateX(0); object-position:center center; }
            50% { transform:scale(1.08) translateX(2%); object-position:center top; }
            100% { transform:scale(1) translateX(0); object-position:center center; }
        }

        /* ===== ХЕРО-БАНЕР ===== */
        .agnative-hero {
            position:relative;
            width:auto;
            margin:0.75rem 0.5rem 1.25rem;
            height:38vh;
            min-height:220px;
            max-height:400px;
            overflow:hidden;
            border-radius:clamp(0.75rem,2vw,1.5rem);
            display:block;
            z-index:8;
            box-shadow:0 12px 32px rgba(0,0,0,.28),0 4px 12px rgba(0,0,0,.14);
            transition:box-shadow 0.4s ease,transform 0.4s ease;
            perspective:800px;
        }
        @media (min-width:480px) { .agnative-hero { height:42vh; min-height:260px; max-height:460px; margin:0.9rem 0.6rem 1.5rem; } }
        @media (min-width:768px) { .agnative-hero { height:48vh; min-height:300px; max-height:520px; margin:1.2rem 1rem 2rem; } }
        @media (min-width:1024px) { .agnative-hero { height:52vh; min-height:340px; max-height:580px; margin:1.5rem 2rem 2.5rem; } }

        .agnative-hero__bg {
            position:absolute;
            top:0;left:0;right:0;bottom:0;
            width:100%;height:100%;
            object-fit:cover;
            object-position:center top;
            border-radius:inherit;
            transition:opacity 0.8s ease;
            pointer-events:none;
            will-change:opacity,transform;
            backface-visibility:hidden;
            animation:kenBurns 22s ease-in-out infinite alternate;
            transform-origin:center center;
        }
        .agnative-hero--switching .agnative-hero__bg { animation-play-state:paused; }
        .agnative-hero::before {
            content:"";
            position:absolute;
            inset:0;
            background:linear-gradient(90deg, rgba(0,0,0,.65) 0%, rgba(0,0,0,.30) 30%, rgba(0,0,0,.05) 60%, transparent 80%);
            pointer-events:none;
            z-index:1;
            border-radius:inherit;
        }
        .agnative-hero__content {
            position:absolute;
            left:clamp(0.8rem,2.5vw,2.4rem);
            top:clamp(0.8rem,2vw,2rem);
            max-width:55%;
            display:flex;
            flex-direction:column;
            align-items:flex-start;
            z-index:2;
            pointer-events:none;
        }
        @media (min-width:480px) { .agnative-hero__content { max-width:50%; } }
        @media (min-width:768px) { .agnative-hero__content { max-width:45%; } }

        .agnative-hero__content>* { transform-style:preserve-3d; transition:opacity 0.5s ease,transform 0.5s ease; }
        .agnative-hero__title {
            font-size:clamp(1.2rem,3.5vw,2.8rem);
            font-weight:900;
            color:#fff;
            text-shadow:0 2px 18px rgba(0,0,0,.85);
            line-height:1.1;
            margin:0 0 0.1em;
            letter-spacing:.005em;
            transform:translateZ(20px);
            display:-webkit-box;
            -webkit-line-clamp:2;
            -webkit-box-orient:vertical;
            overflow:hidden;
        }
        @media (min-width:480px) { .agnative-hero__title { font-size:clamp(1.6rem,4vw,2.8rem); -webkit-line-clamp:2; } }
        @media (min-width:768px) { .agnative-hero__title { font-size:clamp(2rem,4.5vw,3.2rem); -webkit-line-clamp:3; } }

        .agnative-hero__year {
            font-size:clamp(0.7rem,1.2vw,1.1rem);
            font-weight:700;
            color:rgba(255,255,255,.85);
            margin-bottom:0.2em;
            text-shadow:0 1px 8px rgba(0,0,0,.6);
            transform:translateZ(10px);
        }
        .agnative-hero__overview {
            font-size:clamp(0.7rem,1.1vw,1rem);
            line-height:1.3;
            color:rgba(255,255,255,.94);
            text-shadow:0 1px 8px rgba(0,0,0,.6);
            display:-webkit-box;
            -webkit-line-clamp:2;
            -webkit-box-orient:vertical;
            overflow:hidden;
            max-width:100%;
            font-weight:500;
            transform:translateZ(5px);
        }
        @media (min-width:480px) { .agnative-hero__overview { font-size:clamp(0.75rem,1.2vw,1rem); -webkit-line-clamp:2; } }
        @media (min-width:768px) { .agnative-hero__overview { -webkit-line-clamp:3; } }

        .agnative-hero__play.selector {
            position:absolute;
            inset:0;
            display:block;
            padding:0;
            background:transparent !important;
            border:0 !important;
            color:transparent !important;
            font-size:0 !important;
            cursor:pointer;
            outline:none;
            z-index:3;
            min-height:44px;
            min-width:44px;
        }
        .agnative-hero:has(.agnative-hero__play:hover) {
            transform:scale(1.012);
            box-shadow:0 0 0 2px rgba(255,255,255,.9),0 24px 60px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.3);
        }

        .agnative-hero__indicators {
            position:absolute;
            left:50%;
            bottom:0.8rem;
            transform:translateX(-50%);
            display:inline-flex;
            gap:0.4rem;
            align-items:center;
            z-index:3;
            padding:0.35rem 0.5rem;
            border-radius:999px;
            background:rgba(18,18,20,.5);
            box-shadow:0 2px 12px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.08);
            backdrop-filter:blur(14px) saturate(140%);
            -webkit-backdrop-filter:blur(14px) saturate(140%);
        }
        @media (min-width:480px) { .agnative-hero__indicators { bottom:1rem; gap:0.42rem; padding:0.4rem 0.6rem; } }
        @media (min-width:768px) { .agnative-hero__indicators { bottom:1.4rem; gap:0.5rem; padding:0.46rem 0.7rem; } }

        .agnative-hero__indicator {
            display:inline-block;
            width:0.5rem;
            height:0.5rem;
            border-radius:999px;
            background:rgba(255,255,255,.42);
            border:0;
            padding:0;
            cursor:pointer;
            outline:none;
            transition:background .25s ease,width .3s cubic-bezier(.22,.61,.36,1),box-shadow .25s ease;
            min-width:0.5rem;
            min-height:0.5rem;
        }
        .agnative-hero__indicator--active {
            background:#fff;
            width:1.25rem;
            box-shadow:0 1px 4px rgba(0,0,0,.4);
        }
        .agnative-hero--switching .agnative-hero__bg { opacity:0; }
        .agnative-hero--switching .agnative-hero__title,
        .agnative-hero--switching .agnative-hero__year,
        .agnative-hero--switching .agnative-hero__overview {
            opacity:0;
            transform:translateY(10px) translateZ(0);
        }

        /* Годинник */
        .appletv-agnative-topnav .agnative-topnav-clock { display:none; }
        @media (min-width:768px) {
            .appletv-agnative-topnav .agnative-topnav-clock {
                display:inline-flex;
                position:absolute;
                right:1.15em;
                top:.7em;
                z-index:20;
                align-items:center;
                justify-content:center;
                min-width:5em;
                height:3em;
                padding:0 1.1em;
                border-radius:999px;
                background:rgba(22,24,30,.26);
                border:1px solid rgba(255,255,255,.10);
                box-shadow:inset 0 1px 0 rgba(255,255,255,.10),0 8px 18px rgba(0,0,0,.12);
                backdrop-filter:blur(18px) saturate(140%);
                -webkit-backdrop-filter:blur(18px) saturate(140%);
                color:rgba(255,255,255,.95);
                font-size:1.05em;
                font-weight:700;
                letter-spacing:.01em;
                cursor:default;
                user-select:none;
            }
        }

        /* Картка аніме */
        .anime-card {
            background:var(--surface);
            border-radius:var(--radius-sm);
            border:1px solid var(--border);
            box-shadow:var(--shadow-sm);
            transition:transform var(--transition),box-shadow var(--transition),border-color var(--transition);
            cursor:pointer;
            overflow:hidden;
            position:relative;
            animation:fadeInUp 0.5s ease both;
            display:flex;
            flex-direction:column;
            width:100%;
            min-height:160px;
        }
        .anime-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-md); border-color:var(--accent); }
        @media (min-width:480px) { .anime-card { border-radius:var(--radius); min-height:180px; } .anime-card:hover { transform:translateY(-6px); } }

        .anime-poster {
            width:100%;
            aspect-ratio:2/3;
            background:#e0e0e0;
            border-radius:var(--radius-sm) var(--radius-sm) 0 0;
            overflow:hidden;
            flex-shrink:0;
            position:relative;
        }
        .dark-mode .anime-poster { background:#2a2a2a; }
        .anime-poster img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s ease; }
        .anime-card:hover .anime-poster img { transform:scale(1.05); }

        .anime-title-under {
            padding:0.4rem 0.3rem 0.35rem;
            font-weight:700;
            font-size:0.75rem;
            line-height:1.2;
            color:var(--text);
            text-align:center;
            background:transparent;
            flex:1 1 auto;
            display:flex;
            align-items:center;
            justify-content:center;
            word-break:break-word;
            min-height:2.2em;
        }
        @media (min-width:480px) { .anime-title-under { font-size:0.8rem; padding:0.45rem 0.35rem 0.4rem; min-height:2.4em; } }
        @media (min-width:768px) { .anime-title-under { font-size:0.85rem; padding:0.5rem 0.4rem 0.4rem; min-height:2.6em; } }

        /* Сітка 3 колонки для сторінок жанрів та профілю — ТЕПЕР ЗАВЖДИ 3 КОЛОНКИ */
        .grid-3cols {
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:0.8rem;
            margin-top:0.5rem;
            flex:1;
        }
        @media (min-width:480px) { .grid-3cols { gap:1rem; } }
        @media (min-width:1024px) { .grid-3cols { gap:1.6rem; } }

        /* Сітка для головної (2,3,4 колонки) */
        .anime-grid {
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:0.8rem;
            margin-top:0.5rem;
            flex:1;
        }
        @media (min-width:480px) { .anime-grid { gap:1rem; } }
        @media (min-width:768px) { .anime-grid { grid-template-columns:repeat(3,1fr); gap:1.4rem; } }
        @media (min-width:1024px) { .anime-grid { grid-template-columns:repeat(4,1fr); gap:1.6rem; } }
        .anime-grid .anime-card { animation:fadeInUp 0.5s ease both; }

        /* Жанрові каруселі */
        .genre-carousel .anime-card { flex:0 0 110px; scroll-snap-align:start; animation:none; min-height:140px; }
        .genre-carousel .anime-title-under { font-size:0.65rem; padding:0.25rem 0.15rem 0.2rem; min-height:2rem; }
        @media (min-width:480px) { .genre-carousel .anime-card { flex:0 0 130px; min-height:160px; } .genre-carousel .anime-title-under { font-size:0.7rem; min-height:2.2em; } }
        @media (min-width:768px) { .genre-carousel .anime-card { flex:0 0 150px; } .genre-carousel .anime-title-under { font-size:0.75rem; min-height:2.4em; } }

        /* ===== ХЕДЕР — з круглою кнопкою пошуку ===== */
        .header {
            display:flex;
            flex-wrap:wrap;
            justify-content:space-between;
            align-items:center;
            gap:0.6rem;
            margin-bottom:0.8rem;
            padding-bottom:0.8rem;
            border-bottom:1px solid var(--border);
            transition:all var(--transition);
            position:relative;
        }
        @media (min-width:480px) { .header { gap:0.8rem; margin-bottom:1rem; padding-bottom:1rem; } }
        @media (min-width:768px) { .header { gap:1.2rem; margin-bottom:1.4rem; padding-bottom:1.4rem; } }
        @media (min-width:1024px) { .header { gap:1.5rem; margin-bottom:1.8rem; padding-bottom:1.8rem; } }

        .header-left { display:flex; align-items:center; gap:0.6rem; flex:1 1 auto; min-width:0; }
        @media (min-width:480px) { .header-left { gap:0.8rem; } }
        @media (min-width:768px) { .header-left { gap:1rem; } }

        .burger-btn {
            background:var(--surface);
            border:2px solid var(--border);
            color:var(--text);
            border-radius:50%;
            width:44px;
            min-width:44px;
            height:44px;
            min-height:44px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
            font-size:1.2rem;
            box-shadow:var(--shadow-sm);
            position:relative;
            z-index:30;
            flex-shrink:0;
        }
        .burger-btn:hover { background:var(--accent); color:var(--accent-text); border-color:var(--accent); transform:scale(1.08); box-shadow:0 8px 24px var(--accent-glow); }
        .burger-btn.active { background:var(--accent); color:var(--accent-text); border-color:var(--accent); }

        .logo { display:flex; align-items:center; gap:0.4rem; cursor:pointer; user-select:none; text-decoration:none; transition:transform var(--transition); flex-shrink:0; }
        .logo:hover { transform:translateY(-2px); }
        .logo-title-row { display:flex; align-items:center; gap:0.2rem; line-height:1; }
        .logo-text h1 { font-size:1.2rem; font-weight:800; letter-spacing:-0.04em; color:var(--text); margin:0; transition:color var(--transition); line-height:1; }
        @media (min-width:480px) { .logo-text h1 { font-size:1.4rem; } }
        @media (min-width:768px) { .logo-text h1 { font-size:1.6rem; } }
        @media (min-width:1024px) { .logo-text h1 { font-size:1.75rem; } }

        .logo-icon { font-size:1.4rem; font-weight:900; background:var(--accent-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; transition:all 0.4s cubic-bezier(0.4,0,0.2,1); position:relative; transform:translateY(-0.1em); }
        @media (min-width:480px) { .logo-icon { font-size:1.7rem; } }
        @media (min-width:768px) { .logo-icon { font-size:2rem; } }
        @media (min-width:1024px) { .logo-icon { font-size:2.2rem; } }
        .logo:hover .logo-icon { transform:rotate(-8deg) scale(1.12) translateY(-0.1em); filter:brightness(1.1); }

        .logo-text span { font-size:0.55rem; font-weight:500; color:var(--text-secondary); letter-spacing:0.3px; display:block; margin-top:1px; }
        @media (min-width:480px) { .logo-text span { font-size:0.6rem; } }
        @media (min-width:768px) { .logo-text span { font-size:0.72rem; margin-top:2px; } }
        @media (min-width:1024px) { .logo-text span { font-size:0.82rem; } }

        .header-actions {
            display:flex;
            align-items:center;
            gap:0.5rem;
            flex-wrap:wrap;
            flex:0 0 auto;
            min-width:0;
        }
        @media (min-width:480px) { .header-actions { gap:0.7rem; } }
        @media (min-width:768px) { .header-actions { gap:0.9rem; } }

        /* Кругла кнопка пошуку замість рядка */
        .search-circle-btn {
            background:var(--surface);
            border:2px solid var(--border);
            color:var(--text);
            border-radius:50%;
            width:44px;
            min-width:44px;
            height:44px;
            min-height:44px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
            font-size:1.1rem;
            box-shadow:var(--shadow-sm);
            flex-shrink:0;
            position:relative;
        }
        .search-circle-btn:hover {
            background:var(--accent);
            color:var(--accent-text);
            border-color:var(--accent);
            transform:scale(1.08) rotate(5deg);
            box-shadow:0 8px 24px var(--accent-glow);
        }
        .search-circle-btn .search-shortcut-badge {
            position:absolute;
            bottom:-4px;
            right:-4px;
            font-size:0.5rem;
            background:var(--accent);
            color:var(--accent-text);
            border-radius:4px;
            padding:0 4px;
            font-weight:700;
            line-height:1.4;
            border:1px solid var(--bg);
        }

        /* ===== СТОРІНКА ПОШУКУ ===== */
        #searchPageContainer {
            display:none;
            animation:fadeInUp 0.5s ease;
            margin-top:0.5rem;

        const PROXY_URL = 'https://monoanime.animegran8.workers.dev';
        const ANIMEUA_BASE = 'https://animeua.club';

        const GENRE_MAP = {
            "Аніфільми": "film",
            "Бойові мистецтва": "boivie",
            "Бойовики": "boyovik",
            "Воєнні": "voenne",
            "Гарем": "garems",
            "Драми": "drama",
            "Детектив": "detektiv",
            "Демони": "demons",

            "Повсякденність": "posyardnevnist",
            "Пригоди": "adventures",

            "Романтика": "romantik",
            "Надприродні": "weird",
            "Фантастика": "fantastika",
            "Фентезі": "fentezi",
            "Школа": "classes",
            "Еччі": "echhi"
        };
        const GENRE_NAMES = Object.keys(GENRE_MAP);

        String.prototype.hashCode = function() {
            let h = 0;
            for (let i = 0; i < this.length; i++) { h = ((h << 5) - h) + this.charCodeAt(i);
                h |= 0; }
            return Math.abs(h);
        };

        function safeQuery(sel, parent) { try { return (parent || document).querySelector(sel); } catch { return null; } }

        function safeQueryAll(sel, parent) { try { return Array.from((parent || document).querySelectorAll(sel)); } catch {
                return []; } }

        function getProxyUrl(url) { if (!url) return null; return PROXY_URL + '?url=' + encodeURIComponent(url); }

        function isEmbedUrl(url) {
            if (!url) return false;
            return url.includes('tortuga.tw/embed') || url.includes('/embed/');
        }

        // ====================================================================
        //  РОУТЕР
        // ====================================================================
        const Router = {
            currentRoute: 'main',
            params: {},

            init() {
                window.addEventListener('hashchange', () => this.handleRoute());
                this.handleRoute();
            },

            handleRoute() {
                const hash = window.location.hash.slice(1) || 'main';
                const parts = hash.split('?');
                const route = parts[0];
                const query = parts[1] || '';
                const params = Object.fromEntries(new URLSearchParams(query));

                this.currentRoute = route;
                this.params = params;
                this.navigate(route, params);
            },

            navigate(route, params) {
                document.getElementById('genreSectionsContainer').style.display = 'none';
                document.getElementById('animeContainer').style.display = 'none';
                document.getElementById('paginationRow').innerHTML = '';
                document.getElementById('profilePageContainer').classList.remove('active');

        async function fetchUA(url) {
            const proxyUrl = getProxyUrl(url);
            const resp = await fetch(proxyUrl);
            if (!resp.ok) throw new Error(`Помилка ${resp.status}`);
            const html = await resp.text();
            return new DOMParser().parseFromString(html, 'text/html');
        }

        function parseAnimeuaCards(doc) {
            const cards = safeQueryAll('.poster', doc);
            if (cards.length) return cards.map(card => {
                const linkEl = card.tagName === 'A' ? card : safeQuery('a', card);
                const href = linkEl?.getAttribute('href') || '';
                const img = safeQuery('img', card);
                const posterSrc = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
                const titleEl = safeQuery('.poster__title', card) || safeQuery('h3', card);
                const title = (titleEl?.textContent || '').trim() || 'Без назви';
                return {
                    mal_id: href.hashCode(),
                    title,
                    url: href.startsWith('http') ? href : ANIMEUA_BASE + href,
                    images: { jpg: { large_image_url: posterSrc.startsWith('http') ? posterSrc : (posterSrc ?
                                ANIMEUA_BASE + posterSrc : '') } },
                    score: null,
                    year: null,
                    from: 'animeua'
                };
            });
            const links = safeQueryAll('a[href*="/anime/"]', doc);
            const unique = new Map();
            links.forEach(a => { if (!unique.has(a.href)) unique.set(a.href, a); });
            return Array.from(unique.values()).map(a => {
                const img = safeQuery('img', a);
                const src = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
                const title = (safeQuery('.poster__title', a)?.textContent || a.textContent || '').trim();
                return {
                    mal_id: a.href.hashCode(),
                    title: title || 'Без назви',
                    url: a.href,
                    images: { jpg: { large_image_url: src.startsWith('http') ? src : ANIMEUA_BASE + src } },
                    score: null,
                    year: null,
                    from: 'animeua'
                };
            });
        }

        async function loadAnimeuaDetail(animeUrl) {
            const doc = await fetchUA(animeUrl);
            let title = '';
            for (const sel of ['.page__subcol-main h1', '.pmovie__title', 'h1.title', 'h1']) {
                const el = safeQuery(sel, doc);
                if (el?.textContent.trim()) { title = el.textContent.trim(); break; }
            }
            let poster = '';
            for (const sel of ['div.page__subcol-side .img-fit-cover img', '.pmovie__poster img', '.anime__poster img']) {
                const el = safeQuery(sel, doc);
                if (el) { const src = el.getAttribute('data-src') || el.getAttribute('src') || '';
                    if (src) { poster = src.startsWith('http') ? src : ANIMEUA_BASE + src; break; } }
            }
            const genres = safeQueryAll('.pmovie__genres a, .genres a', doc).map(a => a.textContent.trim()).filter(Boolean);
            const yearEl = safeQuery('.pmovie__year, .release-year', doc);
            const yearMatch = (yearEl?.textContent || '').match(/\d{4}/);
            const year = yearMatch ? parseInt(yearMatch[0]) : null;
            let synopsis = '';
            for (const sel of ['.full-text', '.pmovie__description', '.anime__description']) {
                const el = safeQuery(sel, doc);
                if (el?.textContent.trim()) { synopsis = el.textContent.trim(); break; }
            }
            let rating = '';
            const ratingEl = doc.querySelector('.pmovie__age p, .pmovie__age');
            if (ratingEl) rating = ratingEl.textContent.replace('Рейтинг:', '').trim();

            const playerUrls = extractPlayerIframeUrls(doc);
            const allRawSources = [];
            for (const playerUrl of playerUrls) {
                try {
                    let provider = 'Джерело';
                    if (playerUrl.includes('ashdi')) provider = 'Ashdi';
                    else if (playerUrl.includes('vidmoly')) provider = 'Vidmoly';
                    else if (playerUrl.includes('player')) provider = 'Player';
                    const playerHtml = await fetchUA(playerUrl);
                    const text = playerHtml.body?.innerHTML || '';
                    allRawSources.push(...extractSourcesFromText(text, provider));
                    const nestedIframes = safeQueryAll('iframe', playerHtml);
                    for (const nested of nestedIframes) {
                        let nestedUrl = nested.getAttribute('src') || nested.getAttribute('data-src');
                        if (nestedUrl && nestedUrl !== 'about:blank') {
                            if (nestedUrl.startsWith('//')) nestedUrl = 'https:' + nestedUrl;
                            if (!nestedUrl.startsWith('http')) nestedUrl = ANIMEUA_BASE + nestedUrl;
                            const nestedHtml = await fetchUA(nestedUrl);
                            allRawSources.push(...extractSourcesFromText(nestedHtml.body?.innerHTML || '',
                            provider));
                        }
                    }
                } catch (e) { console.warn('Player fetch failed', playerUrl, e); }
            }

            const seasons = {};
            const seenKeys = new Set();
            allRawSources.forEach(s => {
                const sn = s.season || '1',
                    dn = s.dub || 'UA',
                    en = s.episode || '1';
                const uk = `${sn}-${dn}-${en}-${s.file}`;
                if (!seenKeys.has(uk)) {
                    seenKeys.add(uk);
                    if (!seasons[sn]) seasons[sn] = {};
                    if (!seasons[sn][dn]) seasons[sn][dn] = [];
                    seasons[sn][dn].push({ title: s.label, season: sn, episode: en, file: s.file, dub: dn,
                        provider: s.provider });
                }
            });
            for (const s in seasons)
                for (const d in seasons[s]) seasons[s][d].sort((a, b) => parseInt(a.episode) - parseInt(b.episode));

            return {
                mal_id: animeUrl.hashCode(),
                title,
                images: { jpg: { large_image_url: poster, image_url: poster } },
                genres,
                year,
                synopsis,
                seasons,
                url: animeUrl,
                from: 'animeua',
                score: rating
            };
        }

        function extractPlayerIframeUrls(doc) {
            const selectors = ['.video-responsive iframe', '.player-responsive iframe', '#player iframe',
                '.pmovie__player iframe', 'iframe[src]', 'iframe[data-src]'
            ];
            const urls = [];
            for (const sel of selectors) {
                safeQueryAll(sel, doc).forEach(el => {
                    let src = el.getAttribute('src') || el.getAttribute('data-src');
                    if (!src || src === 'about:blank') return;
                    if (src.startsWith('//')) src = 'https:' + src;
                    if (!src.startsWith('http')) src = ANIMEUA_BASE + src;
                    urls.push(src);
                });
            }
            const scripts = safeQueryAll('script:not([src])', doc);
            for (const s of scripts) {
                const matches = s.textContent.matchAll(/(?:playerUrl|iframeUrl|src)\s*[:=]\s*['"]([^'"]+)['"]/g);
                for (const match of matches) {
                    let url = match[1];
                    if (url.includes('ashdi.vip') || url.includes('vidmoly') || url.includes('player')) {
                        if (url.startsWith('//')) url = 'https:' + url;
                        if (!url.startsWith('http')) url = ANIMEUA_BASE + url;
                        urls.push(url);
                    }
                }
            }
            return [...new Set(urls)];
        }

        function extractSourcesFromText(text, providerName) {
            let sources = [];
            const jsonMatch = text.match(/file\s*:\s*(\[[\s\S]+?\]|\'[\s\S]+?\'|\"[\s\S]+?\"|\{[\s\S]+?\})/i) || text
                .match(/playlist\s*:\s*(\[[\s\S]+?\])/i);
            if (jsonMatch) {
                try {
                    let raw = jsonMatch[1].trim();
                    if ((raw.startsWith("'") && raw.endsWith("'")) || (raw.startsWith('"') && raw.endsWith('"'))) raw = raw
                        .slice(1, -1);
                    if (raw.startsWith('{') && raw.endsWith('}')) raw = `[${raw}]`;
                    const clean = raw.replace(/,\s*\]/g, ']').replace(/,\s*\}/g, '}');
                    const arr = JSON.parse(clean);
                    const walk = (items, dub, season) => {
                        dub = dub || '';
                        season = season || '1';
                        items.forEach(item => {
                            if (item.folder || item.playlist) {
                                let nd = dub,
                                    ns = season;
                                const ft = item.title || '';
                                const sm = ft.match(/[Сс]езон\s*(\d+)/);
                                if (sm) { ns = sm[1]; if (ft.trim().toLowerCase() !== `сезон ${ns}`.toLowerCase()) nd =
                                        ft.replace(/[Сс]езон\s*\d+/g, '').replace(/\//g, '').trim() || dub; } else if (
                                    ft) nd = ft;
                                walk(item.folder || item.playlist, nd, ns);
                            } else if (item.file) {
                                const epT = item.title || 'Серія';
                                let fd = dub || providerName || 'UA',
                                    fs = season;
                                const esm = epT.match(/[Сс]езон\s*(\d+)/);
                                if (esm) fs = esm[1];
                                const epm = epT.match(/(\d+)\s*[Сс]ері[яіяа]|[Сс]ері[яіяа]\s*(\d+)|[Ее]п\.?\s*(\d+)/);
                                sources.push({ label: epT, file: item.file, provider: providerName, dub: fd.trim(),
                                    season: fs, episode: epm ? (epm[1] || epm[2] || epm[3]) : '1' });
                            }
                        });
                    };
                    if (Array.isArray(arr)) walk(arr);
                    else if (arr.file) sources.push({ label: arr.title || 'Озвучка', file: arr.file,
                        provider: providerName, dub: providerName || 'UA', season: '1', episode: '1' });
                } catch (e) { console.warn('JSON parse error', e); }
            }
            if (sources.length === 0) {
                const urlMatches = [...text.matchAll(/https?:\/\/[^\s\'"<>]+\.m3u8[^\s\'"<>]*/g)];
                urlMatches.forEach((m, idx) => {
                    if (!sources.some(s => s.file === m[0])) sources.push({ label: `Потік ${idx+1}`, file: m[0],
                        provider: providerName, dub: providerName || 'UA', season: '1', episode: String(idx +
                            1) });
                });
            }
            return sources;
        }

        // ====================================================================
        //  ПЛЕЄР LampaPlayer (для відтворення)
        // ====================================================================
        class LampaPlayer {
            constructor(container, options) {
                this.container = container;
                this.options = options || {};
                this.hls = null;
                this.state = { playing: false, currentTime: 0, duration: 0, volume: 0.8, muted: false, fullscreen: false,
                    loading: true, src: null };
                this.videoRef = null;
                this.containerRef = null;
                this._init();
            }
            _init() {
                this.container.innerHTML = '';
                this.containerRef = document.createElement('div');
                this.containerRef.className = 'lampa-player-container';
                this.containerRef.style.cssText =
                    'width:100%;aspect-ratio:16/9;background:#000;position:relative;border-radius:12px;overflow:hidden;';
                this.videoRef = document.createElement('video');
                this.videoRef.setAttribute('crossorigin', 'anonymous');
                this.videoRef.setAttribute('playsinline', '');
                this.videoRef.controls = true;
                this.videoRef.style.cssText = 'width:100%;height:100%;object-fit:contain;';
                this.containerRef.appendChild(this.videoRef);
                this.container.appendChild(this.containerRef);
                this._bindEvents();
            }
            _bindEvents() {
                const v = this.videoRef;
                v.addEventListener('play', () => { this.state.playing = true; });
                v.addEventListener('pause', () => { this.state.playing = false; });
                v.addEventListener('timeupdate', () => { this.state.currentTime = v.currentTime;
                    this.state.duration = v.duration || 0; });
                v.addEventListener('waiting', () => { this.state.loading = true; });
                v.addEventListener('canplay', () => { this.state.loading = false; });
                v.addEventListener('error', () => { this.state.loading = false; });
                this.containerRef.addEventListener('dblclick', () => { this.toggleFullscreen(); });
                document.addEventListener('fullscreenchange', () => { this.state.fullscreen = !!document
                        .fullscreenElement; });
            }
            loadSource(src, animeTitle, episodeTitle) {
                if (isEmbedUrl(src)) {
                    this.container.innerHTML = '';
                    const iframe = document.createElement('iframe');
                    iframe.src = src;
                    iframe.setAttribute('allowfullscreen', '');
                    iframe.setAttribute('allow', 'autoplay; fullscreen');
                    iframe.style.cssText =
                        'width:100%;height:100%;border:none;position:absolute;top:0;left:0;';
                    this.container.appendChild(iframe);
                    this.state.loading = false;
                    if (this.hls) { this.hls.destroy();
                        this.hls = null; }
                    this.videoRef = null;
                    this.containerRef = null;
                    return;
                }
                if (!this.videoRef) { this._init(); }
                this.state.src = src;
                const v = this.videoRef;
                this.state.loading = true;
                this.state.playing = false;
                if (this.hls) { this.hls.destroy();
                    this.hls = null; }
                v.pause();
                if (!src) { this.state.loading = false; return; }
                const proxyUrl = (typeof getProxyUrl === 'function' && !src.startsWith(PROXY_URL)) ? getProxyUrl(src) : src;
                if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                    const hls = new Hls({ enableWorker: true, lowLatencyMode: false, backBufferLength: 90 });
                    this.hls = hls;
                    hls.loadSource(proxyUrl);
                    hls.attachMedia(v);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => { this.state.loading = false; v.play().catch(()=>{}); });
                    hls.on(Hls.Events.ERROR, (ev, data) => { if (data && data.fatal) { this.state.loading = false;
                            v.src = proxyUrl; } });
                } else {
                    v.src = proxyUrl;
                    const onCanPlay = () => { this.state.loading = false;
                        v.removeEventListener('canplay', onCanPlay); };
                    v.addEventListener('canplay', onCanPlay);
                }
            }
            togglePlay() {
                if (!this.videoRef) return;
                const v = this.videoRef;
                if (v.paused) v.play().catch(() => {}); else v.pause();
            }
            toggleFullscreen() {
                if (this.containerRef) {
                    if (!document.fullscreenElement) this.containerRef.requestFullscreen().catch(() => {});
                    else document.exitFullscreen();
                }
            }
            destroy() { if (this.hls) { this.hls.destroy();
                    this.hls = null; } if (this.videoRef) { this.videoRef.pause();
                    this.videoRef.removeAttribute('src');
                    this.videoRef.load(); } if (this.container) this.container.innerHTML = ''; }
        }

        async function buildHeroBanner() {
            const hero = document.getElementById('heroBanner');
            if (!hero) return;
            try {
                const topAnime = await fetchAnimeuaTop100();
                const ordinaryAnime = await fetchAnimeuaMain(1);
                const getRandomItems = (arr, n) => {
                    const validItems = arr.filter(a => a.images?.jpg?.large_image_url);
                    const shuffled = [...validItems].sort(() => 0.5 - Math.random());
                    return shuffled.slice(0, n);
                };
                const selectedTop = getRandomItems(topAnime, 4);
                const selectedOrdinary = getRandomItems(ordinaryAnime, 4);
                heroItems = [...selectedTop, ...selectedOrdinary].sort(() => 0.5 - Math.random());
                if (heroItems.length === 0) { hero.style.display = 'none'; return; }
                hero.style.display = 'block';
                heroCurrentIndex = 0;
                renderHeroSlide(heroItems[0]);
                buildHeroIndicators();
                setupHeroParallax();
                startHeroRotation();
            } catch (err) {
                console.warn('Hero banner error:', err);
                hero.style.display = 'none';
            }
        }

        function renderHeroSlide(item) {
            const hero = document.getElementById('heroBanner');
            if (!hero || !item) return;
            heroCurrentItem = item;
            const bg = hero.querySelector('.agnative-hero__bg');
            if (bg) {
                bg.style.opacity = '0';
                setTimeout(() => {
                    bg.src = item.images?.jpg?.large_image_url || '';
                    bg.style.opacity = '1';
                }, 200);
            }
            const titleEl = hero.querySelector('.agnative-hero__title');
            if (titleEl) titleEl.textContent = item.title || '';
            const yearEl = hero.querySelector('.agnative-hero__year');
            if (yearEl) yearEl.textContent = item.year || '';
            const overviewEl = hero.querySelector('.agnative-hero__overview');
            if (overviewEl) overviewEl.textContent = '';
            updateHeroIndicators();
        }

        function buildHeroIndicators() {
            const container = document.querySelector('.agnative-hero__indicators');
            if (!container) return;
            container.innerHTML = '';
            heroItems.forEach((item, idx) => {
                const dot = document.createElement('div');
                dot.className = 'agnative-hero__indicator' + (idx === heroCurrentIndex ?
                    ' agnative-hero__indicator--active' : '');
                dot.addEventListener('click', () => openHeroItemAt(idx));
                container.appendChild(dot);
            });
        }

        function updateHeroIndicators() {
            const container = document.querySelector('.agnative-hero__indicators');
            if (!container) return;
            const dots = container.querySelectorAll('.agnative-hero__indicator');
            dots.forEach((dot, i) => dot.classList.toggle('agnative-hero__indicator--active', i === heroCurrentIndex));
        }

        function transitionHeroToIndex(idx) {
            if (idx < 0 || idx >= heroItems.length || !heroItems[idx]) return;
            if (idx === heroCurrentIndex) return;
            const hero = document.getElementById('heroBanner');
            if (!hero) return;
            if (heroTransitionTimer) { clearTimeout(heroTransitionTimer);
                heroTransitionTimer = null; }
            heroCurrentIndex = idx;
            heroCurrentItem = heroItems[idx];
            hero.classList.add('agnative-hero--switching');
            heroTransitionTimer = setTimeout(() => {
                heroTransitionTimer = null;
                renderHeroSlide(heroItems[idx]);
                setTimeout(() => hero.classList.remove('agnative-hero--switching'), 200);
            }, 300);
        }

        function startHeroRotation() {
            stopHeroRotation();
            if (heroItems.length < 2) return;
            heroRotationTimer = setInterval(() => {
                const hero = document.getElementById('heroBanner');
                if (!hero || hero.style.display === 'none') { stopHeroRotation(); return; }
                const nextIdx = (heroCurrentIndex + 1) % heroItems.length;
                transitionHeroToIndex(nextIdx);
            }, 5000);
        }

        function stopHeroRotation() {
            if (heroRotationTimer) { clearInterval(heroRotationTimer);
                heroRotationTimer = null; }
        }

        function openHeroItemAt(idx) {
            if (idx < 0 || idx >= heroItems.length) return;
            transitionHeroToIndex(idx);
            if (heroItems[idx]?.url) openPlayerPage(heroItems[idx].url);
        }

        function setupHeroParallax() {
            const heroBanner = document.getElementById('heroBanner');
            if (!heroBanner) return;
            const contentEls = heroBanner.querySelectorAll('.agnative-hero__content > *');
            const depthMap = { 'agnative-hero__title': 20, 'agnative-hero__year': 10, 'agnative-hero__overview': 5 };
            contentEls.forEach(el => {
                for (const [cls, depth] of Object.entries(depthMap)) {
                    if (el.classList.contains(cls)) {
                        el.dataset.parallaxDepth = depth;
                        el.style.transform = `translateZ(${depth}px)`;
                        break;
                    }
                }
            });
            heroBanner.addEventListener('mouseenter', () => {
                const bg = heroBanner.querySelector('.agnative-hero__bg');
                if (bg) bg.style.animationPlayState = 'paused';
            });
            heroBanner.addEventListener('mousemove', (e) => {
                if (heroMouseMoveTimer) clearTimeout(heroMouseMoveTimer);
                heroMouseMoveTimer = setTimeout(() => {
                    const { clientX, clientY } = e;
                    const { left, top, width, height } = heroBanner.getBoundingClientRect();
                    const centerX = left + width / 2;
                    const centerY = top + height / 2;
                    const offsetX = (clientX - centerX) / (width / 2);
                    const offsetY = (clientY - centerY) / (height / 2);
                    const bg = heroBanner.querySelector('.agnative-hero__bg');
                    if (bg) {
                        bg.style.transform =
                            `scale(1.05) translate(${offsetX * parallaxIntensity * 0.5}px, ${offsetY * parallaxIntensity * 0.5}px)`;
                    }
                    const contentElements = heroBanner.querySelectorAll('.agnative-hero__content > *');
                    contentElements.forEach(el => {
                        const depth = parseFloat(el.dataset.parallaxDepth) || 0;
                        el.style.transform =
                            `translateZ(${depth}px) translateX(${offsetX * parallaxIntensity * (depth / 20)}px) translateY(${offsetY * parallaxIntensity * (depth / 20)}px)`;
                    });
                }, 10);
            });
            heroBanner.addEventListener('mouseleave', () => {
                const bg = heroBanner.querySelector('.agnative-hero__bg');
                if (bg) { bg.style.transform = '';
                    bg.style.animationPlayState = 'running'; }
                const contentElements = heroBanner.querySelectorAll('.agnative-hero__content > *');
                contentElements.forEach(el => {
                    const depth = parseFloat(el.dataset.parallaxDepth) || 0;
                    el.style.transform = `translateZ(${depth}px) translateX(0) translateY(0)`;
                });
            });
        }

        function iconProfileSvg() { return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`; }

        function iconHomeSvg() { return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 0 0 1 1h3m10-11l2 2m-2-2v10a1 1 0 0 1-1 1h-3m-6 0a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1m-6 0h6"/></svg>`; }

        async function buildLeftdock() {
            const inner = document.getElementById('leftdockInner');
            if (!inner) return;

            let html = '';
            html += `<div class="agnative-leftdock__case">`;
            html += `
            <div class="agnative-leftdock__item selector" data-action="profile" data-selector="true" tabindex="0">
              <div class="menu__ico">${iconProfileSvg()}</div><div class="menu__text">Профіль</div>
            </div>
            <div class="agnative-leftdock__item selector" data-action="main" data-selector="true" tabindex="0">
              <div class="menu__ico">${iconHomeSvg()}</div><div class="menu__text">Головна</div>
            </div>`;
            html += `</div><div class="agnative-leftdock__split"></div><div class="agnative-leftdock__case">`;

            try {
                const genres = loadGenres();
                genres.forEach(g => {
                    html += `
                  <div class="agnative-leftdock__item selector genre-item-dock" data-action="genre-${g.slug}" data-selector="true" tabindex="0" data-genre="${g.slug}" data-name="${g.name}">
                    <div class="menu__ico">${iconCircleLetter(g.name.charAt(0))}</div><div class="menu__text">${g.name}</div>
                  </div>`;
                });
            } catch (e) { console.warn('Помилка рендеру жанрів у меню:', e); }

            html += `</div><div class="agnative-leftdock__split"></div><div class="agnative-leftdock__case">`;
            html += `
            <div class="agnative-leftdock__item selector" data-action="settings" data-selector="true" tabindex="0">
              <div class="menu__ico">${iconSettingsSvg()}</div><div class="menu__text">Налаштування</div>
            </div>`;
            html += `</div>`;
            inner.innerHTML = html;
            inner.querySelectorAll('.agnative-leftdock__item.selector').forEach(btn => {
                const action = btn.dataset.action;
                btn.addEventListener('click', () => {
                    handleLeftdockAction(action);
                    hideLeftdock(true);
                });
                btn.addEventListener('keydown', e => { if (e.key === 'Enter') { handleLeftdockAction(action);
                        hideLeftdock(true); } });
            });
            syncLeftdockActive();
        }

        function handleLeftdockAction(action) {
            if (!action) return;
            if (action === 'profile') {
                Router.goTo('profile');
            } else if (action === 'main') {
                Router.goTo('main');
            } else if (action.startsWith('genre-')) {
                const slug = action.replace('genre-', '');
                const name = loadGenres().find(g => g.slug === slug)?.name || slug;
                Router.goTo('genre', { slug, name });
            } else if (action === 'settings') {
                Router.goTo('settings');
            }
        }

        function syncLeftdockActive() {
            const dock = document.getElementById('leftdock');
            if (!dock) return;
            const route = Router.currentRoute;
            const params = Router.params;
            dock.querySelectorAll('.agnative-leftdock__item.selector').forEach(btn => {
                btn.classList.remove('is-active');
                const action = btn.dataset.action;
                if (!action) return;
                if (action === 'profile' && route === 'profile') {
                    btn.classList.add('is-active');
                } else if (action === 'main' && (route === 'main' || route === 'search')) {
                    btn.classList.add('is-active');
                } else if (action.startsWith('genre-') && route === 'genre') {
                    const slug = action.replace('genre-', '');
                    if (slug === params.slug) btn.classList.add('is-active');
                } else if (action === 'settings' && route === 'settings') {
                    btn.classList.add('is-active');
                }
            });
        }

                      `;
                        }
                        document.getElementById('searchPagePagination').innerHTML = '';
                    }
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const q = input.value.trim();
                        if (q.length >= 2) {
                            searchPageState.query = q;
                            searchPageState.page = 1;
                            performSearchPage();
                        }
                    }
                });
                if (initialQuery.length >= 2) {
                    performSearchPage();
                }
            }

            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    const inp = document.getElementById('searchPageInput');
                    if (inp) {
                        inp.value = '';
                        inp.focus();
                        searchPageState.query = '';
                        searchPageState.list = [];
                        const results = document.getElementById('searchResultsContainer');
                        if (results) {
                            results.innerHTML = `
                        <div class="search-empty">
                          <i class="fas fa-search"></i>
                          <p>Введіть назву аніме для пошуку</p>
                          <p class="sub">Наприклад: "Атака титанів", "Наруто", "Сяючі"</p>
                        </div>
                      `;
                        }
                        document.getElementById('searchPagePagination').innerHTML = '';
                        clearBtn.classList.remove('visible');
                    }
                });
            }

            syncLeftdockActive();
        }

        async function performSearchPage() {
            const results = document.getElementById('searchResultsContainer');
            const pagination = document.getElementById('searchPagePagination');
            if (!results) return;

            const query = searchPageState.query.trim();
            if (!query || query.length < 2) return;

            searchPageState.loading = true;
            results.innerHTML = '<div class="loader" style="grid-column:1/-1;"><i class="fas fa-spinner fa-pulse"></i> Пошук...</div>';
            pagination.innerHTML = '';

            try {
                const list = await searchAnimeua(query, searchPageState.page);
                searchPageState.list = list;
                searchPageState.loading = false;

                if (!list.length) {
                    results.innerHTML = `
                <div class="search-empty" style="grid-column:1/-1;">
                  <i class="fas fa-search" style="font-size:2rem;"></i>
                  <p>Нічого не знайдено за запитом "${query}"</p>
                  <p class="sub">Спробуйте змінити пошуковий запит</p>
                </div>
              `;
                    pagination.innerHTML = '';
                    return;
                }

                results.innerHTML = list.map((a, idx) => {
                    const poster = a.images?.jpg?.large_image_url || '';
                    const title = a.title || 'Без назви';
                    return `
                <div class="anime-card" data-url="${a.url}" tabindex="0" role="button" aria-label="${title}" style="animation-delay:${idx*0.03}s">
                  <div class="anime-poster">
                    <img src="${poster}" alt="${title}" loading="lazy" class="img--blur" onload="this.classList.add('img--loaded')" onerror="this.src='data:image/svg+xml,...'">
                  </div>
                  <div class="anime-title-under">${title}</div>
                </div>
              `;
                }).join('');

                results.querySelectorAll('.anime-card').forEach(card => {
                    card.addEventListener('click', () => openPlayerPage(card.dataset.url));
                    card.addEventListener('keydown', e => { if (e.key === 'Enter') openPlayerPage(card.dataset
                            .url); });
                });

                const prevDisabled = searchPageState.page <= 1 ? 'disabled' : '';
                pagination.innerHTML = `
              <button class="btn-outline" onclick="changeSearchPage(${searchPageState.page-1})" ${prevDisabled}><i class="fas fa-chevron-left"></i> Назад</button>
              <span class="page-indicator">Сторінка ${searchPageState.page}</span>
              <button class="btn-outline" onclick="changeSearchPage(${searchPageState.page+1})">Вперед <i class="fas fa-chevron-right"></i></button>
            `;

            } catch (err) {
                searchPageState.loading = false;
                results.innerHTML = `
              <div class="loader" style="grid-column:1/-1;">
                <i class="fas fa-exclamation-triangle"></i> Помилка: ${err.message}
                <br><button class="btn-outline" style="margin-top:1rem;" onclick="performSearchPage()">Спробувати знову</button>
              </div>
            `;
                pagination.innerHTML = '';
            }
        }

        window.changeSearchPage = (p) => {
            if (p < 1) return;
            searchPageState.page = p;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            performSearchPage();
        };

        function getProfileStats() {
            const history = Storage.getHistory();
            const bookmarks = Storage.getBookmarks();
            const uniqueAnime = new Set(history.map(h => h.animeId || h.title));
            const totalEpisodes = history.length;
            const totalWatchTime = history.reduce((sum, h) => sum + (h.duration || 0), 0);
            const hours = Math.floor(totalWatchTime / 3600);
            const minutes = Math.floor((totalWatchTime % 3600) / 60);

            const achievements = getAchievements(history, bookmarks, uniqueAnime.size, totalEpisodes, totalWatchTime);

            return {
                viewed: totalEpisodes,
                bookmarks: bookmarks.length,
                achievements: achievements.filter(a => a.unlocked).length,
                totalAchievements: achievements.length,
                watchHours: hours,
                watchMinutes: minutes,
                totalWatchTime: totalWatchTime,
                uniqueAnime: uniqueAnime.size,
                achievementsList: achievements,
                history: history.slice(0, 50),
                bookmarksList: bookmarks
            };
        }

                <div class="profile-ach-badge">${unlocked ? 'Виконано' : (progress < 100 ? Math.round(progress)+'%' : 'Заблоковано')}</div>
              </div>
            `;
            });
            html += `</div>`;
            return html;
        }

        function profileEditNick() {
            const nickEl = document.getElementById('profileNickText');
            if (!nickEl) return;
            const current = nickEl.textContent;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = current;
            input.style.cssText =
                'font-size:20px;font-weight:700;letter-spacing:-0.5px;color:var(--text);background:var(--tag-bg);border:1px solid var(--border);border-radius:8px;padding:2px 8px;outline:none;width:180px;font-family:inherit;';
            if (document.body.classList.contains('dark-mode')) {
                input.style.background = '#1a1a1a';
                input.style.color = '#f7f7f7';
                input.style.borderColor = '#333';
            }
            nickEl.replaceWith(input);
            input.focus();
            input.select();
            const save = () => {
                const val = input.value.trim() || current;
                const span = document.createElement('span');
                span.className = 'profile-nick';
                span.id = 'profileNickText';
                span.textContent = val;
                input.replaceWith(span);
                const profile = getProfile();
                profile.nickname = val;
                saveProfile(profile);
                const meta = document.querySelector('.profile-meta');
                if (meta) {
                    const first = meta.querySelector('span:first-child');
                    if (first) first.textContent = '@' + val.toLowerCase().replace(/\s/g, '_');
                }
                if (Router.currentRoute === 'profile') renderProfilePage();
            };
            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { input.blur(); }
                if (e.key === 'Escape') { input.value = current;
                    input.blur(); }
            });
        }

        function profileEditBio() {
            const bioEl = document.getElementById('profileBioText');
            if (!bioEl) return;
            const current = bioEl.textContent;
            const textarea = document.createElement('textarea');
            textarea.value = current;
            textarea.style.cssText =
                'font-size:13px;line-height:1.6;color:var(--text-secondary);background:var(--tag-bg);border:1px solid var(--border);border-radius:8px;padding:6px 8px;outline:none;width:100%;font-family:inherit;resize:vertical;min-height:60px;';
            if (document.body.classList.contains('dark-mode')) {
                textarea.style.background = '#1a1a1a';
                textarea.style.color = '#cfcfcf';
                textarea.style.borderColor = '#333';
            }
            bioEl.replaceWith(textarea);
            textarea.focus();
            textarea.select();
            const save = () => {
                const val = textarea.value.trim() || current;
                const div = document.createElement('div');
                div.className = 'profile-bio';
                div.id = 'profileBioText';
                div.textContent = val;
                textarea.replaceWith(div);
                const profile = getProfile();
                profile.bio = val;
                saveProfile(profile);
                if (Router.currentRoute === 'profile') renderProfilePage();
            };
            textarea.addEventListener('blur', save);
            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') { textarea.value = current;
                    textarea.blur(); }
