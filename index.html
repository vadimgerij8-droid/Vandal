<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Перукарня ВПУ-19 | Стиль та майстерність</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* === (весь CSS залишаємо без змін, як у вашому початковому коді) === */
    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --gray-light: #e8e8e3;
      --gray-mid: #b0b0a8;
      --gray-dark: #2a2a2a;
      --accent: #1a1a1a;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Montserrat', sans-serif;
      --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --shadow: 0 8px 40px rgba(0,0,0,0.12);
      --shadow-hover: 0 16px 60px rgba(0,0,0,0.22);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--white);
      color: var(--black);
      overflow-x: hidden;
      cursor: none;
    }
    /* кастомний курсор (як у вашому коді) */
    .cursor, .cursor-ring { display: none; } /* для простоти, бо на мобільному вже приховано */
    @media (min-width: 1025px) {
      .cursor, .cursor-ring { display: block; }
      .cursor {
        position: fixed;
        width: 10px; height: 10px;
        background: var(--black);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: width 0.3s, height 0.3s, background 0.3s;
      }
      .cursor-ring {
        position: fixed;
        width: 36px; height: 36px;
        border: 1px solid var(--black);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
        transition: width 0.4s, height 0.4s, border-color 0.3s, opacity 0.3s;
        opacity: 0.5;
      }
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(245,245,240,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
      transition: var(--transition);
    }
    nav.scrolled { border-bottom-color: var(--gray-light); padding: 16px 48px; }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--black);
      cursor: pointer;
      z-index: 101;
    }
    .nav-links {
      display: flex;
      gap: 40px;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray-dark);
      text-decoration: none;
      position: relative;
      transition: var(--transition);
      cursor: pointer;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: var(--black);
      transition: width 0.3s ease;
    }
    .nav-links a:hover { color: var(--black); }
    .nav-links a:hover::after { width: 100%; }
    .nav-auth-btn {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 20px;
      border: 1px solid var(--black);
      background: transparent;
      color: var(--black);
      cursor: pointer;
      transition: var(--transition);
    }
    .nav-auth-btn:hover { background: var(--black); color: var(--white); }
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: space-between;
      width: 28px;
      height: 20px;
      cursor: pointer;
      z-index: 101;
      background: transparent;
      border: none;
    }
    .hamburger span {
      width: 100%;
      height: 2px;
      background: var(--black);
      transition: var(--transition);
    }
    .mobile-menu {
      position: fixed;
      top: 0;
      right: -100%;
      width: 80%;
      max-width: 320px;
      height: 100vh;
      background: var(--white);
      z-index: 99;
      padding: 100px 32px 40px;
      transition: right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: -5px 0 25px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .mobile-menu.open { right: 0; }
    .mobile-menu a {
      font-size: 1.2rem;
      font-family: var(--font-display);
      text-decoration: none;
      color: var(--black);
      letter-spacing: 0.05em;
      padding: 12px 0;
      border-bottom: 1px solid var(--gray-light);
      transition: var(--transition);
      cursor: pointer;
    }
    .mobile-menu a:hover { color: var(--gray-mid); padding-left: 8px; }
    .mobile-auth-btn {
      margin-top: 20px;
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 14px;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition);
    }
    .mobile-auth-btn:hover { background: var(--gray-dark); }
    .menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 98;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .menu-overlay.open { opacity: 1; pointer-events: all; }
    .page {
      display: none;
      min-height: 100vh;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .page.active { display: block; opacity: 1; transform: translateY(0); }
    /* Головна (стрічка) */
    .feed {
      padding: 120px 64px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .feed-header {
      margin-bottom: 64px;
      text-align: center;
    }
    .feed-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 300;
      margin-bottom: 12px;
    }
    .feed-header p {
      color: var(--gray-mid);
      font-size: 0.85rem;
      letter-spacing: 0.06em;
    }
    .create-post-btn {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 16px 24px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      z-index: 90;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow);
      transition: var(--transition);
    }
    .create-post-btn:hover { transform: scale(1.02); background: var(--gray-dark); }
    .post-card {
      background: white;
      margin-bottom: 48px;
      border: 1px solid var(--gray-light);
      transition: var(--transition);
    }
    .post-card:hover { box-shadow: var(--shadow); }
    .post-header {
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--gray-light);
    }
    .post-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--gray-light);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .post-author {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 500;
      cursor: pointer;
    }
    .post-date {
      font-size: 0.65rem;
      color: var(--gray-mid);
      margin-top: 4px;
    }
    .post-image {
      width: 100%;
      max-height: 500px;
      object-fit: cover;
      display: block;
    }
    .post-caption {
      padding: 20px 24px;
      font-size: 0.9rem;
      line-height: 1.6;
      border-bottom: 1px solid var(--gray-light);
    }
    .post-actions {
      padding: 16px 24px;
      display: flex;
      gap: 24px;
      border-bottom: 1px solid var(--gray-light);
    }
    .action-btn {
      background: none;
      border: none;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gray-dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: var(--transition);
    }
    .action-btn.liked { color: var(--black); font-weight: 600; }
    .action-btn:hover { color: var(--black); }
    .comments-section {
      padding: 20px 24px;
      background: var(--gray-light);
    }
    .comment {
      margin-bottom: 16px;
      font-size: 0.8rem;
      display: flex;
      gap: 10px;
    }
    .comment-strong { font-weight: 600; }
    .comment-form {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    .comment-input {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--gray-mid);
      background: var(--white);
      font-family: var(--font-body);
      font-size: 0.8rem;
    }
    .comment-submit {
      background: var(--black);
      color: white;
      border: none;
      padding: 0 20px;
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
    }
    /* Майстри (список) */
    .masters-list {
      padding: 120px 64px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 40px;
    }
    .master-card {
      background: white;
      border: 1px solid var(--gray-light);
      cursor: pointer;
      transition: var(--transition);
      overflow: hidden;
    }
    .master-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
    .master-card-photo {
      aspect-ratio: 1;
      background: var(--gray-light);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .master-card-photo img { width: 100%; height: 100%; object-fit: cover; }
    .master-card-info { padding: 24px; }
    .master-card-name {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 400;
    }
    .master-card-role {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-mid);
      margin: 8px 0;
    }
    .master-card-rating { margin-top: 12px; display: flex; gap: 4px; }
    /* Профіль */
    .profile-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
      padding-top: 100px;
    }
    .profile-sidebar {
      background: var(--black);
      color: white;
      padding: 48px 32px;
      position: sticky;
      top: 100px;
      height: calc(100vh - 100px);
      overflow-y: auto;
    }
    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--gray-dark);
      margin-bottom: 32px;
      overflow: hidden;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 300;
      margin-bottom: 8px;
    }
    .profile-role {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray-mid);
      margin-bottom: 24px;
    }
    .profile-stats {
      display: flex;
      gap: 24px;
      margin: 32px 0;
    }
    .profile-stat { text-align: center; }
    .profile-stat-value { font-size: 1.5rem; font-weight: 600; }
    .profile-main { padding: 48px; }
    .profile-posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
      margin-top: 32px;
    }
    .profile-post {
      aspect-ratio: 1;
      background: var(--gray-light);
      overflow: hidden;
      cursor: pointer;
    }
    .profile-post img { width: 100%; height: 100%; object-fit: cover; }
    /* Модалки, форми, тости як у вашому коді (зберігаємо стилі) */
    .modal-overlay { /* ... */ position: fixed; inset:0; background: rgba(0,0,0,0.7); z-index:200; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition: opacity 0.3s; backdrop-filter: blur(4px); }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background: var(--white); width:100%; max-width:560px; max-height:90vh; overflow-y:auto; transform: translateY(30px); transition: transform 0.4s; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { padding: 32px 40px 24px; border-bottom:1px solid var(--gray-light); display:flex; justify-content:space-between; }
    .modal-title { font-family: var(--font-display); font-size:1.8rem; font-weight:300; }
    .modal-close { background:none; border:1px solid var(--gray-light); width:36px; height:36px; cursor:pointer; }
    .modal-body { padding: 32px 40px; }
    .form-group { margin-bottom:28px; }
    .form-label { font-size:0.62rem; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; margin-bottom:10px; display:block; }
    .form-input, .form-textarea, .form-select { width:100%; padding:14px 16px; border:1px solid var(--gray-light); background:white; font-size:0.85rem; }
    .form-photo-upload { border:1px dashed var(--gray-mid); padding:40px; text-align:center; cursor:pointer; position:relative; background-size:cover; background-position:center; }
    .form-photo-upload input { position:absolute; inset:0; opacity:0; cursor:pointer; }
    .btn-primary, .btn-secondary { padding:12px 24px; font-size:0.68rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; border:none; cursor:pointer; transition:var(--transition); }
    .btn-primary { background:var(--black); color:white; }
    .btn-primary:hover { background:var(--gray-dark); }
    .btn-secondary { background:transparent; border:1px solid var(--black); color:var(--black); }
    .btn-secondary:hover { background:var(--black); color:white; }
    .toast { position:fixed; bottom:32px; right:32px; background:var(--black); color:white; padding:12px 24px; font-size:0.7rem; z-index:500; transform:translateY(80px); opacity:0; transition:all 0.4s; }
    .toast.show { transform:translateY(0); opacity:1; }
    @media (max-width: 768px) {
      .feed { padding: 100px 24px 60px; }
      .profile-layout { grid-template-columns: 1fr; }
      .profile-sidebar { position: static; height: auto; }
      .masters-list { padding: 100px 24px; }
      .create-post-btn { bottom: 20px; right: 20px; padding: 12px 20px; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .cursor, .cursor-ring { display: none; }
    }
  </style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="navbar">
  <div class="nav-logo" onclick="navigate('feed')">ПЕРУКАРНЯ ВПУ-19</div>
  <ul class="nav-links">
    <li><a onclick="navigate('feed')">Стрічка</a></li>
    <li><a onclick="navigate('masters')">Майстри</a></li>
    <li><a id="profileNavLink" onclick="navigate('profile')">Профіль</a></li>
  </ul>
  <button class="nav-auth-btn" id="authBtn">Увійти</button>
  <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a onclick="navigate('feed'); closeMobileMenu()">Стрічка</a>
  <a onclick="navigate('masters'); closeMobileMenu()">Майстри</a>
  <a onclick="navigate('profile'); closeMobileMenu()">Профіль</a>
  <button class="mobile-auth-btn" id="mobileAuthBtn">Увійти</button>
</div>
<div class="menu-overlay" id="menuOverlay"></div>

<!-- Стрічка -->
<div id="page-feed" class="page active">
  <div class="feed">
    <div class="feed-header">
      <h1>Стрічка <em>робіт</em></h1>
      <p>Роботи наших майстрів та натхнення</p>
    </div>
    <div id="feedContainer"></div>
  </div>
  <button id="createPostFAB" class="create-post-btn" style="display:none">+ Нова робота</button>
</div>

<!-- Список майстрів (користувачі з роллю master) -->
<div id="page-masters" class="page">
  <div class="masters-list" id="mastersList"></div>
</div>

<!-- Профіль користувача (динамічний) -->
<div id="page-profile" class="page">
  <div class="profile-layout" id="profileContainer"></div>
</div>

<!-- Модалка входу/реєстрації -->
<div id="modal-auth" class="modal-overlay">
  <div class="modal">
    <div class="modal-header"><h2 class="modal-title" id="authModalTitle">Вхід</h2><button class="modal-close" onclick="closeModal('modal-auth')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><input class="form-input" id="authEmail" placeholder="Email"></div>
      <div class="form-group"><input class="form-input" type="password" id="authPassword" placeholder="Пароль"></div>
      <div class="form-group" id="roleSelectGroup" style="display:none">
        <label class="form-label">Роль</label>
        <select id="authRole" class="form-select"><option value="user">Користувач</option><option value="master">Майстер</option></select>
      </div>
    </div>
    <div class="modal-footer"><button class="btn-secondary" id="toggleAuthBtn">Зареєструватися</button><button class="btn-primary" id="submitAuthBtn">Увійти</button></div>
  </div>
</div>

<!-- Модалка створення поста -->
<div id="modal-post" class="modal-overlay">
  <div class="modal"><div class="modal-header"><h2 class="modal-title">Нова робота</h2><button class="modal-close" onclick="closeModal('modal-post')">✕</button></div>
  <div class="modal-body">
    <div class="form-group"><label class="form-label">Фото</label><div class="form-photo-upload" id="postPhotoArea"><input type="file" id="postPhotoInput" accept="image/*"><div>Завантажити фото</div></div></div>
    <div class="form-group"><label class="form-label">Опис</label><textarea class="form-textarea" id="postCaption" rows="2" placeholder="Розкажіть про роботу..."></textarea></div>
  </div>
  <div class="modal-footer"><button class="btn-secondary" onclick="closeModal('modal-post')">Скасувати</button><button class="btn-primary" id="submitPostBtn">Опублікувати</button></div></div>
</div>

<div class="toast" id="toast"><span id="toastText"></span></div>

<script type="importmap">
  { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js", "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.2/firebase-auth.js", "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore.js", "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.2/firebase-storage.js" } }
</script>
<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "firebase/auth";
  import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, query, orderBy, where, Timestamp, arrayUnion, arrayRemove, increment } from "firebase/firestore";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "firebase/storage";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAoYoOeKo3zbpQxrP-6DjP94uMfMRsXxGo",
    authDomain: "vpu-19.firebaseapp.com",
    projectId: "vpu-19",
    storageBucket: "vpu-19.firebasestorage.app",
    messagingSenderId: "1021666755140",
    appId: "1:1021666755140:web:a9ad8540f1de8ea0527211",
    measurementId: "G-8XNV2QHFQK"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // Глобальні змінні
  let currentUser = null;
  let currentUserRole = null;

  // DOM елементи
  const feedContainer = document.getElementById('feedContainer');
  const mastersList = document.getElementById('mastersList');
  const profileContainer = document.getElementById('profileContainer');
  const authBtn = document.getElementById('authBtn');
  const mobileAuthBtn = document.getElementById('mobileAuthBtn');
  const createPostFAB = document.getElementById('createPostFAB');
  const toast = document.getElementById('toast');
  function showToast(msg) { toastText.innerText = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000); }

  // === Функції навігації ===
  window.navigate = function(page, userId = null) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${page}`).classList.add('active');
    if (page === 'feed') renderFeed();
    else if (page === 'masters') renderMastersList();
    else if (page === 'profile') renderProfile(userId || currentUser?.uid);
    window.scrollTo(0,0);
    closeMobileMenu();
  };

  // === Рендер стрічки ===
  async function renderFeed() {
    feedContainer.innerHTML = '<div style="text-align:center;padding:60px;">Завантаження...</div>';
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    if (snap.empty) { feedContainer.innerHTML = '<div style="text-align:center;padding:60px;">Поки що немає постів. Станьте майстром і додайте першу роботу!</div>'; return; }
    let html = '';
    for (const docSnap of snap.docs) {
      const post = { id: docSnap.id, ...docSnap.data() };
      const authorSnap = await getDoc(doc(db, "users", post.authorId));
      const author = authorSnap.exists() ? authorSnap.data() : { name: "Невідомий", photoURL: null };
      const isLiked = currentUser && post.likes?.includes(currentUser.uid);
      const commentsSnap = await getDocs(query(collection(db, "comments"), where("postId", "==", post.id), orderBy("createdAt", "asc")));
      const comments = commentsSnap.docs.map(c => ({ id: c.id, ...c.data() }));
      html += `
        <div class="post-card" data-postid="${post.id}">
          <div class="post-header">
            <div class="post-avatar">${author.photoURL ? `<img src="${author.photoURL}">` : '<svg width="28" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>'}</div>
            <div><div class="post-author" onclick="navigate('profile','${post.authorId}')">${escapeHtml(author.name)}</div><div class="post-date">${new Date(post.createdAt?.toDate()).toLocaleDateString('uk-UA')}</div></div>
          </div>
          ${post.imageURL ? `<img class="post-image" src="${post.imageURL}" alt="post">` : ''}
          <div class="post-caption">${escapeHtml(post.caption || '')}</div>
          <div class="post-actions">
            <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">❤️ ${post.likesCount || 0} Лайків</button>
            <button class="action-btn" onclick="focusComment('${post.id}')">💬 ${comments.length} Коментарів</button>
          </div>
          <div class="comments-section" id="comments-${post.id}">
            ${comments.map(c => `<div class="comment"><span class="comment-strong">${escapeHtml(c.authorName)}</span> ${escapeHtml(c.text)}</div>`).join('')}
            ${currentUser ? `<div class="comment-form"><input class="comment-input" id="comment-${post.id}" placeholder="Ваш коментар..."><button class="comment-submit" onclick="addComment('${post.id}')">→</button></div>` : '<div class="comment-form">Увійдіть, щоб коментувати</div>'}
          </div>
        </div>`;
    }
    feedContainer.innerHTML = html;
  }

  window.toggleLike = async (postId) => {
    if (!currentUser) { showToast('Увійдіть, щоб ставити лайки'); openAuthModal(); return; }
    const postRef = doc(db, "posts", postId);
    const postSnap = await getDoc(postRef);
    const likes = postSnap.data().likes || [];
    if (likes.includes(currentUser.uid)) {
      await updateDoc(postRef, { likes: arrayRemove(currentUser.uid), likesCount: increment(-1) });
    } else {
      await updateDoc(postRef, { likes: arrayUnion(currentUser.uid), likesCount: increment(1) });
    }
    renderFeed();
  };

  window.addComment = async (postId) => {
    if (!currentUser) return;
    const input = document.getElementById(`comment-${postId}`);
    const text = input.value.trim();
    if (!text) return;
    await addDoc(collection(db, "comments"), {
      postId, authorId: currentUser.uid, authorName: currentUser.displayName || currentUser.email.split('@')[0], text, createdAt: Timestamp.now()
    });
    input.value = '';
    renderFeed();
  };

  window.focusComment = (postId) => { document.getElementById(`comment-${postId}`)?.focus(); };

  // === Рендер списку майстрів ===
  async function renderMastersList() {
    mastersList.innerHTML = '<div style="text-align:center;padding:60px;">Завантаження...</div>';
    const q = query(collection(db, "users"), where("role", "==", "master"));
    const snap = await getDocs(q);
    if (snap.empty) { mastersList.innerHTML = '<div>Майстрів поки немає</div>'; return; }
    let html = '';
    for (const docSnap of snap.docs) {
      const u = docSnap.data();
      const postsCount = (await getDocs(query(collection(db, "posts"), where("authorId", "==", docSnap.id)))).size;
      html += `<div class="master-card" onclick="navigate('profile','${docSnap.id}')"><div class="master-card-photo">${u.photoURL ? `<img src="${u.photoURL}">` : '<svg width="64" fill="none" stroke="#aaa"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>'}</div><div class="master-card-info"><div class="master-card-name">${escapeHtml(u.name || u.email.split('@')[0])}</div><div class="master-card-role">Майстер</div><div class="master-card-rating">⭐ ${u.rating || '—'}</div><div>📸 ${postsCount} робіт</div></div></div>`;
    }
    mastersList.innerHTML = html;
  }

  // === Рендер профілю ===
  async function renderProfile(userId) {
    if (!userId) { profileContainer.innerHTML = '<div style="padding:120px;text-align:center">Користувач не знайдений. Увійдіть.</div>'; return; }
    const userSnap = await getDoc(doc(db, "users", userId));
    if (!userSnap.exists()) { profileContainer.innerHTML = '<div>Користувача не існує</div>'; return; }
    const user = userSnap.data();
    const postsSnap = await getDocs(query(collection(db, "posts"), where("authorId", "==", userId), orderBy("createdAt", "desc")));
    const posts = postsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const isOwnProfile = currentUser && currentUser.uid === userId;
    profileContainer.innerHTML = `
      <div class="profile-sidebar">
        <div class="profile-avatar">${user.photoURL ? `<img src="${user.photoURL}">` : '<svg width="100%" fill="none" stroke="#aaa"><circle cx="50%" cy="40%" r="40"/><path d="M20 80c0-30 20-50 50-50s50 20 50 50"/></svg>'}</div>
        <div class="profile-name">${escapeHtml(user.name || user.email.split('@')[0])}</div>
        <div class="profile-role">${user.role === 'master' ? 'Майстер' : 'Користувач'}</div>
        <div class="profile-stats"><div class="profile-stat"><div class="profile-stat-value">${posts.length}</div><div>робіт</div></div></div>
        ${user.bio ? `<p>${escapeHtml(user.bio)}</p>` : ''}
        ${isOwnProfile && user.role === 'master' ? `<button class="btn-primary" style="margin-top:32px;width:100%" onclick="openCreatePost()">+ Нова робота</button>` : ''}
        ${isOwnProfile ? `<button class="btn-secondary" style="margin-top:16px;width:100%" onclick="logout()">Вийти</button>` : ''}
      </div>
      <div class="profile-main">
        <h3>Роботи</h3>
        <div class="profile-posts-grid">${posts.map(p => `<div class="profile-post"><img src="${p.imageURL}" onerror="this.src='https://placehold.co/400x400?text=No+Image'"></div>`).join('') || '<div>Ще немає робіт</div>'}</div>
      </div>
    `;
  }

  // === Створення поста ===
  window.openCreatePost = () => { if (!currentUser || currentUserRole !== 'master') { showToast('Тільки майстри можуть створювати пости'); return; } document.getElementById('postPhotoInput').value = ''; document.getElementById('postPhotoArea').style.background = ''; openModal('modal-post'); };
  document.getElementById('submitPostBtn').onclick = async () => {
    const file = document.getElementById('postPhotoInput').files[0];
    if (!file) { showToast('Оберіть фото'); return; }
    const caption = document.getElementById('postCaption').value;
    const storageRef = ref(storage, `posts/${Date.now()}_${file.name}`);
    await uploadBytes(storageRef, file);
    const imageURL = await getDownloadURL(storageRef);
    await addDoc(collection(db, "posts"), {
      authorId: currentUser.uid, authorName: currentUser.displayName || currentUser.email.split('@')[0], caption, imageURL, createdAt: Timestamp.now(), likes: [], likesCount: 0
    });
    closeModal('modal-post');
    showToast('Пост опубліковано!');
    navigate('feed');
  };

  // === Аутентифікація ===
  function openAuthModal() { document.getElementById('authModalTitle').innerText = isLoginMode ? 'Вхід' : 'Реєстрація'; openModal('modal-auth'); }
  let isLoginMode = true;
  document.getElementById('toggleAuthBtn').onclick = () => {
    isLoginMode = !isLoginMode;
    document.getElementById('authModalTitle').innerText = isLoginMode ? 'Вхід' : 'Реєстрація';
    document.getElementById('roleSelectGroup').style.display = isLoginMode ? 'none' : 'block';
    document.getElementById('toggleAuthBtn').innerText = isLoginMode ? 'Зареєструватися' : 'Вже маєте акаунт? Увійти';
    document.getElementById('submitAuthBtn').innerText = isLoginMode ? 'Увійти' : 'Зареєструватися';
  };
  document.getElementById('submitAuthBtn').onclick = async () => {
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    if (!email || !password) { showToast('Заповніть усі поля'); return; }
    try {
      if (isLoginMode) {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        showToast(`Вітаємо, ${cred.user.email}`);
      } else {
        const role = document.getElementById('authRole').value;
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "users", cred.user.uid), { email, role, name: email.split('@')[0], createdAt: Timestamp.now() });
        showToast('Реєстрація успішна!');
      }
      closeModal('modal-auth');
    } catch(e) { showToast('Помилка: ' + e.message); }
  };

  function logout() { signOut(auth); showToast('Ви вийшли'); navigate('feed'); }

  // === Стан авторизації ===
  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists()) { currentUserRole = userDoc.data().role; user.displayName = userDoc.data().name; }
      else { currentUserRole = 'user'; }
      authBtn.innerText = 'Профіль';
      mobileAuthBtn.innerText = 'Профіль';
      authBtn.onclick = () => navigate('profile');
      mobileAuthBtn.onclick = () => navigate('profile');
      createPostFAB.style.display = currentUserRole === 'master' ? 'flex' : 'none';
    } else {
      currentUserRole = null;
      authBtn.innerText = 'Увійти';
      mobileAuthBtn.innerText = 'Увійти';
      authBtn.onclick = () => openAuthModal();
      mobileAuthBtn.onclick = () => openAuthModal();
      createPostFAB.style.display = 'none';
    }
    if (document.getElementById('page-feed').classList.contains('active')) renderFeed();
    else if (document.getElementById('page-profile').classList.contains('active')) renderProfile(currentUser?.uid);
  });

  // === Допоміжні функції ===
  window.openModal = (id) => document.getElementById(id).classList.add('open');
  window.closeModal = (id) => document.getElementById(id).classList.remove('open');
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target === o) o.classList.remove('open'); }));
  document.getElementById('createPostFAB').onclick = () => openCreatePost();
  document.getElementById('postPhotoInput').onchange = (e) => { if(e.target.files[0]) { const url = URL.createObjectURL(e.target.files[0]); document.getElementById('postPhotoArea').style.background = `url(${url}) center/cover`; } };
  window.closeMobileMenu = () => { document.getElementById('mobileMenu').classList.remove('open'); document.getElementById('menuOverlay').classList.remove('open'); document.body.style.overflow = ''; };
  document.getElementById('hamburgerBtn').onclick = () => { document.getElementById('mobileMenu').classList.add('open'); document.getElementById('menuOverlay').classList.add('open'); document.body.style.overflow = 'hidden'; };
  document.getElementById('menuOverlay').onclick = closeMobileMenu;
  window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40));
  // Курсор (простий)
  if (window.innerWidth > 1024) {
    const cur = document.getElementById('cursor'), ring = document.getElementById('cursorRing');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; });
    function anim(){ cur.style.left=mx+'px'; cur.style.top=my+'px'; rx+=(mx-rx)*0.15; ry+=(my-ry)*0.15; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(anim); }
    anim();
  }
  // початкова навігація
  navigate('feed');
</script>
</body>
</html>
