<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VAKDAB • твій аніме каталог</title>
    <link rel="preconnect" href="https://monoanime.animegran8.workers.dev" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <meta property="og:title" content="VAKDAB - твій аніме каталог" />
    <meta property="og:description" content="Сучасна платформа для перегляду аніме" />
    <meta property="og:type" content="website" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" defer></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <meta name="theme-color" content="#0d0d0d" />

    <style>
        /* ============================================================
                   CSS ЗМІННІ (Mobile-First)
                   ============================================================ */
        :root {
            --accent: #0b0b0b;
            --accent-rgb: 11, 11, 11;
            --accent-hover: #1a1a1a;
            --accent-text: #ffffff;
            --accent-gradient: linear-gradient(135deg, #0b0b0b, #1a1a1a);
            --accent-light: rgba(11, 11, 11, 0.15);
            --accent-glow: rgba(11, 11, 11, 0.35);
            --bg: #ffffff;
            --surface: rgba(255, 255, 255, 0.98);
            --text: #0b0b0b;
            --text-secondary: #4a4a4a;
            --text-muted: #7a7a7a;
            --border: #e9e9e9;
            --border-light: #f3f3f3;
            --border-hover: #d0d0d0;
            --hover: rgba(0, 0, 0, 0.03);
            --tag-bg: #f6f6f6;
            --glass: rgba(255, 255, 255, 0.6);
            --glass-dark: rgba(20, 20, 20, 0.35);
            --blur-amount: 8px;
            --shadow-sm: 0 6px 18px rgba(11, 11, 11, 0.06);
            --shadow-md: 0 14px 32px rgba(11, 11, 11, 0.10);
            --shadow-lg: 0 30px 60px rgba(11, 11, 11, 0.14);
            --radius-sm: 12px;
            --radius: 16px;
            --radius-md: 14px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --transition: 280ms cubic-bezier(.2, .9, .2, 1);
            --transition-smooth: 360ms cubic-bezier(.2, .9, .2, 1);
            --agnative-scale: 1;
            /* HeroBar ширина +1.3см */
            --hero-extra-width: 1.3cm;
        }

        .dark-mode {
            --accent: #f7f7f7;
            --accent-rgb: 247, 247, 247;
            --accent-hover: #cfcfcf;
            --accent-text: #0a0a0a;
            --accent-gradient: linear-gradient(135deg, #f7f7f7, #cfcfcf);
            --accent-light: rgba(247, 247, 247, 0.15);
            --accent-glow: rgba(247, 247, 247, 0.35);
            --bg: #0a0a0a;
            --surface: rgba(20, 20, 20, 0.95);
            --text: #f7f7f7;
            --text-secondary: #cfcfcf;
            --text-muted: #9a9a9a;
            --border: #222222;
            --border-light: #151515;
            --border-hover: #3a3a3a;
            --hover: rgba(255, 255, 255, 0.02);
            --tag-bg: #141414;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-dark: rgba(0, 0, 0, 0.45);
            --shadow-sm: 0 6px 18px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 14px 32px rgba(0, 0, 0, 0.55);
            --shadow-lg: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            height: 100%;
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background var(--transition-smooth), color var(--transition-smooth);
            line-height: 1.5;
            overflow-x: hidden;
            font-size: 16px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 0.75rem 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: clip;
        }
        @media (min-width:480px) {
            .app-container { padding: 0 1rem 2.5rem; }
        }
        @media (min-width:768px) {
            .app-container { padding: 0 1.5rem 2.5rem; }
        }
        @media (min-width:1024px) {
            .app-container { padding: 0 2rem 3rem; }
        }

        /* Анімації */
        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(16px); }
            to { opacity:1; transform:translateY(0); }
        }
        @keyframes subtlePulse {
            0%,100% { transform:scale(1); }
            50% { transform:scale(1.02); }
        }
        @keyframes scaleIn {
            from { opacity:0; transform:scale(0.92); }
            to { opacity:1; transform:scale(1); }
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes skeletonShimmer {
            0% { background-position:-200px 0; }
            100% { background-position:calc(200px + 100%) 0; }
        }
        @keyframes kenBurns {
            0% { transform:scale(1) translateX(0); object-position:center center; }
            50% { transform:scale(1.08) translateX(2%); object-position:center top; }
            100% { transform:scale(1) translateX(0); object-position:center center; }
        }
        @keyframes fadeIn {
            from { opacity:0; transform:scale(1.03); }
            to { opacity:1; transform:scale(1); }
        }
        @keyframes heroFadeIn {
            from { opacity:0; transform:scale(1.04) rotate(0.5deg); }
            to { opacity:1; transform:scale(1) rotate(0); }
        }

        /* ===== ХЕДЕР — ПРОЗОРИЙ, ПЛАВАЮЧИЙ ===== */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.8rem 0.4rem;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 30;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            transition: all var(--transition);
            pointer-events: none;
        }
        .header>* {
            pointer-events: auto;
        }

        @media (min-width:480px) {
            .header { padding: 0.8rem 1rem 0.5rem; gap: 0.8rem; }
        }
        @media (min-width:768px) {
            .header { padding: 1rem 1.2rem 0.6rem; gap: 1rem; }
        }
        @media (min-width:1024px) {
            .header { padding: 1.2rem 1.5rem 0.8rem; gap: 1.2rem; }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex: 1 1 auto;
            min-width: 0;
        }
        @media (min-width:480px) {
            .header-left { gap: 0.8rem; }
        }
        @media (min-width:768px) {
            .header-left { gap: 1rem; }
        }

        .burger-btn {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            border-radius: 50%;
            width: 44px;
            min-width: 44px;
            height: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 30;
            flex-shrink: 0;
            pointer-events: auto;
        }
        .burger-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.08);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3);
        }
        .burger-btn.active {
            background: rgba(255, 255, 255, 0.25);
        }

        .dark-mode .burger-btn {
            background: rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .dark-mode .burger-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            user-select: none;
            text-decoration: none;
            transition: transform var(--transition);
            flex-shrink: 0;
            pointer-events: auto;
        }
        .logo:hover {
            transform: translateY(-2px);
        }
        .logo-title-row {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            line-height: 1;
        }
        .logo-text h1 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #fff;
            margin: 0;
            line-height: 1;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        }
        @media (min-width:480px) {
            .logo-text h1 { font-size: 1.4rem; }
        }
        @media (min-width:768px) {
            .logo-text h1 { font-size: 1.6rem; }
        }
        @media (min-width:1024px) {
            .logo-text h1 { font-size: 1.75rem; }
        }

        .logo-icon {
            font-size: 1.4rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
            line-height: 1;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            transform: translateY(-0.1em);
        }
        @media (min-width:480px) {
            .logo-icon { font-size: 1.7rem; }
        }
        @media (min-width:768px) {
            .logo-icon { font-size: 2rem; }
        }
        @media (min-width:1024px) {
            .logo-icon { font-size: 2.2rem; }
        }
        .logo:hover .logo-icon {
            transform: rotate(-8deg) scale(1.12) translateY(-0.1em);
            filter: brightness(1.1);
        }

        .logo-text span {
            font-size: 0.55rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.3px;
            display: block;
            margin-top: 1px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }
        @media (min-width:480px) {
            .logo-text span { font-size: 0.6rem; }
        }
        @media (min-width:768px) {
            .logo-text span { font-size: 0.72rem; margin-top: 2px; }
        }
        @media (min-width:1024px) {
            .logo-text span { font-size: 0.82rem; }
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            flex: 0 0 auto;
            min-width: 0;
            pointer-events: auto;
        }
        @media (min-width:480px) {
            .header-actions { gap: 0.7rem; }
        }
        @media (min-width:768px) {
            .header-actions { gap: 0.9rem; }
        }

        .search-circle-btn {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            border-radius: 50%;
            width: 44px;
            min-width: 44px;
            height: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
            position: relative;
            pointer-events: auto;
        }
        .search-circle-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.08) rotate(5deg);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3);
        }
        .dark-mode .search-circle-btn {
            background: rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .dark-mode .search-circle-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .search-circle-btn .search-shortcut-badge {
            display: none !important;
        }

        .agnative-topnav-clock {
            display: none;
        }
        @media (min-width:768px) {
            .agnative-topnav-clock {
                display: inline-flex;
                position: absolute;
                right: 1.15em;
                top: .7em;
                z-index: 20;
                align-items: center;
                justify-content: center;
                min-width: 5em;
                height: 3em;
                padding: 0 1.1em;
                border-radius: 999px;
                background: rgba(0, 0, 0, 0.4);
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
                border: 1px solid rgba(255, 255, 255, 0.08);
                color: rgba(255, 255, 255, 0.9);
                font-size: 1.05em;
                font-weight: 700;
                letter-spacing: .01em;
                cursor: default;
                user-select: none;
                pointer-events: none;
            }
            .dark-mode .agnative-topnav-clock {
                background: rgba(0, 0, 0, 0.5);
            }
        }

        /* ============================================================
                   НОВИЙ ГЕРО-БАНЕР — ПРЕМІУМ (ПОВНОРОЗМІРНИЙ ПОСТЕР)
                   ============================================================ */
        .hero-wrapper {
            position: relative;
            width: 100vw;
            max-width: none;
            margin-left: calc(-0.75rem);
            margin-right: calc(-0.75rem);
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: #0a0a0a;
            height: 100svh;
            min-height: 500px;
        }
        @media (max-width: 768px) {
            .hero-wrapper {
                height: 100svh;
                min-height: 400px;
                width: 100vw;
                margin-left: -1rem;
                margin-right: -1rem;
            }
        }
        @media (max-width: 480px) {
            .hero-wrapper {
                height: 100svh;
                min-height: 360px;
                width: 100vw;
                margin-left: -0.75rem;
                margin-right: -0.75rem;
            }
        }

        /* Світла тема — білий фон */
        body:not(.dark-mode) .hero-wrapper {
            background: #ffffff;
            margin-top: 0;
            margin-bottom: 0;
        }
        body:not(.dark-mode) .hero-wrapper::after {
            content: 'Стрічковий каталог аніме — обирай улюблене';
            display: block;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 0.4rem 0 0.6rem;
            letter-spacing: 0.5px;
            border-top: 1px solid var(--border-light);
            background: var(--bg);
        }

        .hero-slide {
            display: none;
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 240px;
            overflow: hidden;
        }
        .hero-slide.active {
            display: block;
            animation: heroFadeIn 0.6s ease;
        }

        .hero-slide-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center top;
            filter: none;
            transform: scale(1.06);
            transition: transform 8s ease;
        }
        .hero-slide.active .hero-slide-bg {
            transform: scale(1);
        }

        /* ГРАДІЄНТ — плавний перехід знизу вгору */
        .hero-slide-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 30%, rgba(0,0,0,0.15) 60%, transparent 100%);
            z-index: 1;
        }
        body:not(.dark-mode) .hero-slide-overlay {
            background: linear-gradient(to top, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.5) 30%, rgba(255,255,255,0.1) 60%, transparent 100%);
        }

        /* ===== НАЗВА НА ГЕРО ===== */
        .hero-brand-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            font-size: clamp(2.2rem, 8vw, 5.5rem);
            font-weight: 900;
            color: rgba(255,255,255,0.06);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
            text-shadow: 0 0 60px rgba(0,0,0,0.2);
            font-family: 'Inter', sans-serif;
        }
        body:not(.dark-mode) .hero-brand-title {
            color: rgba(0,0,0,0.04);
            text-shadow: 0 0 60px rgba(0,0,0,0.05);
        }
        @media (max-width: 600px) {
            .hero-brand-title {
                font-size: clamp(1.6rem, 6vw, 3rem);
                letter-spacing: 0.15em;
            }
        }

        /* ===== КОНТЕНТ ГЕРО — ТЕПЕР ВНИЗУ, ДО СТРІЛОК ===== */
        .hero-slide-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            padding-left: 24px;
            padding-right: 24px;
            padding-top: 80px;
            padding-bottom: 110px;
            height: 100%;
            justify-content: flex-end;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-top: none;
        }
        @media (min-width: 480px) {
            .hero-slide-content {
                padding-left: 5%;
                padding-right: 5%;
                padding-top: 80px;
                padding-bottom: 115px;
            }
        }
        @media (min-width: 768px) {
            .hero-slide-content {
                padding-left: 6%;
                padding-right: 6%;
                padding-top: 90px;
                padding-bottom: 120px;
            }
        }
        @media (min-width: 1024px) {
            .hero-slide-content {
                padding-left: 8%;
                padding-right: 8%;
                padding-top: 100px;
                padding-bottom: 130px;
            }
        }

        .hero-slide-title {
            font-size: clamp(1.4rem, 4vw, 3.2rem);
            font-weight: 800;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 4px;
            text-align: left;
            text-shadow: 0 2px 24px rgba(0, 0, 0, 0.7);
            max-width: 80%;
        }
        body:not(.dark-mode) .hero-slide-title {
            color: #0b0b0b;
            text-shadow: 0 2px 24px rgba(255,255,255,0.3);
        }
        @media (max-width: 480px) {
            .hero-slide-title {
                font-size: 1.4rem;
                max-width: 90%;
            }
        }

        .hero-slide-subtitle {
            font-size: clamp(0.7rem, 1.2vw, 1rem);
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
            font-weight: 400;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.5);
            text-align: left;
        }
        body:not(.dark-mode) .hero-slide-subtitle {
            color: rgba(0,0,0,0.5);
            text-shadow: 0 1px 10px rgba(255,255,255,0.2);
        }

        /* ТЕГИ — МОНОХРОМНІ БІЛІ (без синього) */
        .hero-slide-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            text-align: left;
        }
        .hero-tag {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.92);
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.3px;
        }
        body:not(.dark-mode) .hero-tag {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: rgba(0, 0, 0, 0.8);
            text-shadow: none;
        }
        .hero-tag.rating {
            background: rgba(255, 255, 255, 0.10);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }
        body:not(.dark-mode) .hero-tag.rating {
            background: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.08);
            color: #0b0b0b;
        }
        .hero-tag.genre-tag {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.10);
            color: rgba(255, 255, 255, 0.85);
        }
        body:not(.dark-mode) .hero-tag.genre-tag {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.06);
            color: rgba(0, 0, 0, 0.7);
        }

        .hero-slide-desc {
            font-size: clamp(0.7rem, 0.9vw, 0.95rem);
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            text-align: left;
        }
        body:not(.dark-mode) .hero-slide-desc {
            color: rgba(0, 0, 0, 0.6);
            text-shadow: 0 1px 8px rgba(255,255,255,0.1);
        }
        @media (min-width: 768px) {
            .hero-slide-desc {
                -webkit-line-clamp: 3;
            }
        }

        /* КНОПКА "Детальніше" — МОНОХРОМНА */
        .hero-slide-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.25s ease;
            text-decoration: none;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        body:not(.dark-mode) .hero-slide-btn {
            background: rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #0b0b0b;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            text-shadow: none;
        }
        .hero-slide-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.25);
        }
        body:not(.dark-mode) .hero-slide-btn:hover {
            background: rgba(0, 0, 0, 0.10);
            border-color: rgba(0, 0, 0, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }
        @media (max-width: 480px) {
            .hero-slide-btn {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
        }

        /* ===== СТРІЛКИ — НАД КОНТЕНТОМ, ВНИЗУ ===== */
        .hero-nav {
            position: absolute;
            bottom: 60px;
            width: 44px;
            height: 44px;
            background: rgba(0, 0, 0, 0.30);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: all 0.25s ease;
            color: rgba(255, 255, 255, 0.75);
            font-size: 1.2rem;
            padding: 0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }
        body:not(.dark-mode) .hero-nav {
            background: rgba(255, 255, 255, 0.50);
            border: 1px solid rgba(0, 0, 0, 0.06);
            color: rgba(0, 0, 0, 0.6);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }
        .hero-nav:hover {
            background: rgba(255, 255, 255, 0.20);
            transform: scale(1.12);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.25);
        }
        body:not(.dark-mode) .hero-nav:hover {
            background: rgba(0, 0, 0, 0.08);
            color: #0b0b0b;
            border-color: rgba(0, 0, 0, 0.12);
        }
        .hero-nav-prev {
            left: 24px;
        }
        .hero-nav-next {
            right: 24px;
        }
        @media (max-width: 480px) {
            .hero-nav {
                width: 38px;
                height: 38px;
                font-size: 1rem;
                bottom: 52px;
            }
            .hero-nav-prev {
                left: 16px;
            }
            .hero-nav-next {
                right: 16px;
            }
        }
        @media (min-width: 768px) {
            .hero-nav {
                bottom: 66px;
                width: 50px;
                height: 50px;
                font-size: 1.3rem;
            }
            .hero-nav-prev {
                left: 32px;
            }
            .hero-nav-next {
                right: 32px;
            }
        }

        /* ===== ІНДИКАТОРИ (DOTS) ===== */
        .hero-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 20;
            align-items: center;
        }
        .hero-dot {
            width: 24px;
            height: 3px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.25);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        body:not(.dark-mode) .hero-dot {
            background: rgba(0, 0, 0, 0.15);
        }
        .hero-dot.active {
            background: #ffffff;
            width: 40px;
        }
        body:not(.dark-mode) .hero-dot.active {
            background: #0b0b0b;
        }
        @media (max-width: 480px) {
            .hero-dots {
                bottom: 16px;
                gap: 6px;
            }
            .hero-dot {
                width: 18px;
                height: 2px;
            }
            .hero-dot.active {
                width: 30px;
            }
        }

        .dark-mode .hero-slide-content {
            background: transparent;
        }

        /* ===== КАРТКА АНІМЕ ===== */
        .anime-card {
            background: var(--surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            cursor: pointer;
            overflow: hidden;
            position: relative;
            animation: fadeInUp 0.5s ease both;
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 160px;
        }
        .anime-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }
        @media (min-width:480px) {
            .anime-card {
                border-radius: var(--radius);
                min-height: 180px;
            }
            .anime-card:hover {
                transform: translateY(-6px);
            }
        }

        .anime-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: #e0e0e0;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }
        .dark-mode .anime-poster {
            background: #2a2a2a;
        }
        .anime-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .anime-card:hover .anime-poster img {
            transform: scale(1.05);
        }

        .anime-title-under {
            padding: 0.4rem 0.3rem 0.35rem;
            font-weight: 700;
            font-size: 0.75rem;
            line-height: 1.2;
            color: var(--text);
            text-align: center;
            background: transparent;
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            min-height: 2.2em;
        }
        @media (min-width:480px) {
            .anime-title-under {
                font-size: 0.8rem;
                padding: 0.45rem 0.35rem 0.4rem;
                min-height: 2.4em;
            }
        }
        @media (min-width:768px) {
            .anime-title-under {
                font-size: 0.85rem;
                padding: 0.5rem 0.4rem 0.4rem;
                min-height: 2.6em;
            }
        }

        /* Сітка 3 колонки для сторінок жанрів та профілю */
        .grid-3cols {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin-top: 0.5rem;
            flex: 1;
        }
        @media (min-width:480px) {
            .grid-3cols { gap: 1rem; }
        }
        @media (min-width:1024px) {
            .grid-3cols { gap: 1.6rem; }
        }

        /* Сітка для головної (2,3,4 колонки) */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-top: 0.5rem;
            flex: 1;
        }
        @media (min-width:480px) {
            .anime-grid { gap: 1rem; }
        }
        @media (min-width:768px) {
            .anime-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1.4rem;
            }
        }
        @media (min-width:1024px) {
            .anime-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 1.6rem;
            }
        }
        .anime-grid .anime-card {
            animation: fadeInUp 0.5s ease both;
        }

        /* Жанрові каруселі */
        .genre-carousel .anime-card {
            flex: 0 0 110px;
            scroll-snap-align: start;
            animation: none;
            min-height: 140px;
        }
        .genre-carousel .anime-title-under {
            font-size: 0.65rem;
            padding: 0.25rem 0.15rem 0.2rem;
            min-height: 2rem;
        }
        @media (min-width:480px) {
            .genre-carousel .anime-card {
                flex: 0 0 130px;
                min-height: 160px;
            }
            .genre-carousel .anime-title-under {
                font-size: 0.7rem;
                min-height: 2.2em;
            }
        }
        @media (min-width:768px) {
            .genre-carousel .anime-card {
                flex: 0 0 150px;
            }
            .genre-carousel .anime-title-under {
                font-size: 0.75rem;
                min-height: 2.4em;
            }
        }

        /* ===== ЛІВЕ МЕНЮ ===== */
        .leftdock-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(3px);
            z-index: 40;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .leftdock-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .agnative-leftdock {
            position: fixed !important;
            left: 0.75rem !important;
            top: 45% !important;
            transform: translateX(-130%) translateY(-50%) !important;
            z-index: 50 !important;
            width: max-content !important;
            max-width: 14rem !important;
            max-height: 80vh !important;
            overflow-y: auto !important;
            display: inline-flex !important;
            flex-direction: column !important;
            padding: 0.25rem !important;
            border-radius: 1.2rem !important;
            background: rgba(22, 24, 30, .42) !important;
            border: 1px solid rgba(255, 255, 255, .10) !important;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .10), 0 12px 32px rgba(0, 0, 0, .28) !important;
            backdrop-filter: blur(22px) saturate(140%) !important;
            -webkit-backdrop-filter: blur(22px) saturate(140%) !important;
            font-size: calc(clamp(0.8rem, 0.4rem + 1.2vmin, 1.4rem)) !important;
            opacity: 0 !important;
            pointer-events: none !important;
            transition: transform .28s cubic-bezier(.22, .61, .36, 1), opacity .2s ease !important;
        }
        @media (min-width:480px) {
            .agnative-leftdock {
                left: 1rem !important;
                max-width: 15rem !important;
                padding: 0.3rem !important;
                border-radius: 1.3rem !important;
                font-size: calc(clamp(0.85rem, 0.5rem + 1.3vmin, 1.5rem)) !important;
            }
        }
        @media (min-width:768px) {
            .agnative-leftdock {
                left: 1.25rem !important;
                max-width: 16rem !important;
                padding: 0.35rem !important;
                border-radius: 1.4rem !important;
                font-size: calc(clamp(0.92rem, 0.5rem + 1.4vmin, 1.7rem)) !important;
            }
        }

        .agnative-leftdock.is-visible {
            transform: translateX(0) translateY(-50%) !important;
            opacity: 1 !important;
            pointer-events: auto !important;
        }
        .agnative-leftdock::-webkit-scrollbar {
            width: 3px;
        }
        .agnative-leftdock::-webkit-scrollbar-track {
            background: transparent;
        }
        .agnative-leftdock::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 10px;
        }

        .agnative-leftdock__inner {
            display: flex;
            flex-direction: column;
            gap: 0.08rem;
        }
        .agnative-leftdock__case {
            display: flex;
            flex-direction: column;
            gap: 0.04rem;
        }
        .agnative-leftdock__split {
            height: 1px;
            margin: 0.25rem 0.3rem;
            background: rgba(255, 255, 255, .10);
        }

        .agnative-leftdock__item.selector {
            appearance: none;
            -webkit-appearance: none;
            border: 0;
            background: none;
            color: rgba(255, 255, 255, .92);
            min-height: 2.4rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
            font-size: 0.85em;
            font-weight: 700;
            line-height: 1.1;
            white-space: nowrap;
            transition: background .2s ease, transform .2s ease, box-shadow .2s ease;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            text-align: left;
            min-width: 44px;
            min-height: 44px;
        }
        @media (min-width:480px) {
            .agnative-leftdock__item.selector {
                padding: 0.4rem 0.8rem;
                min-height: 2.6rem;
                font-size: 0.9em;
            }
        }
        @media (min-width:768px) {
            .agnative-leftdock__item.selector {
                padding: 0.4rem 0.9rem;
                font-size: 0.92em;
                min-height: 2.8rem;
            }
        }

        .agnative-leftdock__item.selector:hover,
        .agnative-leftdock__item.selector.is-active {
            background: rgba(255, 255, 255, .16) !important;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .14) !important;
            transform: translateX(0.04rem) !important;
        }

        .agnative-leftdock__item .menu__ico {
            width: 1.4rem;
            height: 1.4rem;
            min-width: 1.4rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            margin-right: 0.2rem !important;
            color: currentColor;
        }
        .agnative-leftdock__item .menu__ico svg {
            width: 1.4rem;
            height: 1.4rem;
            color: currentColor;
        }
        .agnative-leftdock__item .menu__text {
            display: inline-block;
            flex: 1 1 auto;
        }

        /* Жанрові секції */
        #genreSectionsContainer {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }
        @media (min-width:480px) {
            #genreSectionsContainer { gap: 1.8rem; }
        }
        @media (min-width:768px) {
            #genreSectionsContainer { gap: 2.2rem; }
        }

        .genre-section {
            position: relative;
        }
        .genre-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.5rem;
            padding-left: 0.2rem;
        }
        @media (min-width:480px) {
            .genre-title {
                font-size: 1.1rem;
                margin-bottom: 0.6rem;
            }
        }
        @media (min-width:768px) {
            .genre-title {
                font-size: 1.2rem;
                margin-bottom: 0.8rem;
            }
        }
        .genre-title .genre-name {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .genre-carousel-wrapper {
            position: relative;
            overflow: visible;
        }
        .genre-carousel {
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            padding: 0.15rem 0.15rem 0.6rem 0.15rem;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        @media (min-width:480px) {
            .genre-carousel {
                gap: 1rem;
                padding: 0.2rem 0.2rem 0.7rem 0.2rem;
            }
        }
        @media (min-width:768px) {
            .genre-carousel {
                gap: 1.2rem;
                padding: 0.2rem 0.2rem 0.8rem 0.2rem;
            }
        }
        .genre-carousel::-webkit-scrollbar {
            height: 4px;
        }
        .genre-carousel::-webkit-scrollbar-track {
            background: transparent;
        }
        .genre-carousel::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .carousel-btn {
            display: none;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 50%;
            background: var(--surface);
            border: 1.5px solid var(--border);
            color: var(--text);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            z-index: 5;
            font-size: 0.9rem;
        }
        @media (min-width:768px) {
            .carousel-btn {
                display: flex;
                opacity: 0;
                pointer-events: none;
            }
            .genre-section:hover .carousel-btn {
                opacity: 1;
                pointer-events: auto;
            }
        }
        .carousel-btn:hover {
            background: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .carousel-btn-left {
            left: -0.6rem;
        }
        .carousel-btn-right {
            right: -0.6rem;
        }
        @media (min-width:768px) {
            .carousel-btn-left {
                left: -0.8rem;
            }
            .carousel-btn-right {
                right: -0.8rem;
            }
        }

        .actions-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            align-items: center;
        }
        @media (min-width:480px) {
            .actions-row {
                gap: 0.6rem;
                margin-bottom: 1.2rem;
            }
        }
        @media (min-width:768px) {
            .actions-row {
                gap: 0.7rem;
                margin-bottom: 1.5rem;
            }
        }
        @media (min-width:1024px) {
            .actions-row {
                margin-bottom: 1.8rem;
            }
        }

        .action-pill {
            background: var(--surface);
            border: 1.5px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-xl);
            padding: 0.45rem 0.9rem;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            min-height: 44px;
            min-width: 44px;
        }
        @media (min-width:480px) {
            .action-pill {
                padding: 0.5rem 1.1rem;
                font-size: 0.8rem;
                gap: 0.4rem;
            }
        }
        @media (min-width:768px) {
            .action-pill {
                padding: 0.6rem 1.4rem;
                font-size: 0.88rem;
                gap: 0.5rem;
                min-height: auto;
            }
        }

        .action-pill:hover {
            background: var(--hover);
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }
        .action-pill.active-pill {
            background: var(--accent-gradient);
            color: var(--accent-text);
            border-color: transparent;
            transform: scale(1.04);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        /* ===== СТОРІНКА ПОШУКУ ===== */
        #searchPageContainer {
            display: none;
            animation: fadeInUp 0.5s ease;
            margin-top: 0.5rem;
            width: 100%;
        }
        #searchPageContainer.active {
            display: block;
        }

        .search-page-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }
        .search-page-header h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
        }
        @media (min-width:480px) {
            .search-page-header h2 { font-size: 1.6rem; }
        }
        @media (min-width:768px) {
            .search-page-header h2 { font-size: 1.8rem; }
        }

        .search-page-input-wrap {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 0.5rem 0.9rem;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            flex: 1 1 100%;
            max-width: 600px;
        }
        .search-page-input-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light), var(--shadow-md);
            transform: translateY(-2px);
        }
        .search-page-input-wrap i {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-right: 0.6rem;
            transition: color var(--transition);
            flex-shrink: 0;
        }
        .search-page-input-wrap:focus-within i {
            color: var(--accent);
        }

        #searchPageInput {
            border: none;
            outline: none;
            font-size: 0.95rem;
            background: transparent;
            width: 100%;
            font-weight: 500;
            color: var(--text);
            font-family: inherit;
            padding: 0;
            min-height: 40px;
        }
        @media (min-width:480px) {
            #searchPageInput { font-size: 1rem; }
        }
        #searchPageInput::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .search-page-clear {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.2rem;
            margin-left: 0.2rem;
            border-radius: 50%;
            width: 32px;
            min-width: 32px;
            height: 32px;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            flex-shrink: 0;
        }
        .search-page-clear.visible {
            opacity: 0.7;
            visibility: visible;
            pointer-events: auto;
        }
        .search-page-clear:hover {
            opacity: 1;
            color: var(--accent);
            background: var(--hover);
            transform: scale(1.1);
        }

        .search-results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-top: 1rem;
        }
        @media (min-width:480px) {
            .search-results-grid { gap: 1rem; }
        }

        /* ===== BOTTOM SHEET ===== */
        .bottom-sheet-overlay {
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            padding: 0 0.5rem 0.5rem;
        }
        .bottom-sheet-overlay.open {
            display: flex;
            animation: bsOverlayIn 0.25s ease;
        }
        @keyframes bsOverlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .bottom-sheet {
            width: 100%;
            max-width: 580px;
            background: rgba(14, 14, 14, 0.92);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom: none;
            border-radius: 20px 20px 0 0;
            padding: 0.8rem 1rem 1.2rem;
            max-height: 70vh;
            overflow-y: auto;
            animation: bsSheetUp 0.32s cubic-bezier(.16, 1, .3, 1);
        }
        @media (min-width:480px) {

                padding: 1rem 1.2rem 1.5rem;
                border-radius: 22px 22px 0 0;
                max-height: 65vh;
            }
        }

                padding: 1.2rem 1.5rem 1.8rem;
                max-height: 60vh;
            }

        @keyframes bsSheetUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .toast {

            color: var(--accent-text);

    <script>
        // ====================================================================
        //  КОНФІГУРАЦІЯ
        // ====================================================================
        const PROXY_URL = 'https://monoanime.animegran8.workers.dev';
        const ANIMEUA_BASE = 'https://animeua.club';

        const GENRE_MAP = {
            "Аніфільми": "film",
            "Бойові мистецтва": "boivie",
            "Бойовики": "boyovik",
            "Воєнні": "voenne",
            "Гарем": "garems",
            "Драми": "drama",
            "Детектив": "detektiv",
            "Демони": "demons",
            "Комедії": "komik",
            "Роботи": "meha",
            "Повсякденність": "posyardnevnist",
            "Пригоди": "adventures",
            "Психологічні": "psih",
            "Романтика": "romantik",
            "Надприродні": "weird",
            "Фантастика": "fantastika",
            "Фентезі": "fentezi",
            "Школа": "classes",
            "Еччі": "echhi"
        };
        const GENRE_NAMES = Object.keys(GENRE_MAP);

        String.prototype.hashCode = function() {
            let h = 0;
            for (let i = 0; i < this.length; i++) { h = ((h << 5) - h) + this.charCodeAt(i);
                h |= 0; }
            return Math.abs(h);
        };

        function safeQuery(sel, parent) { try { return (parent || document).querySelector(sel); } catch { return null; } }

        function safeQueryAll(sel, parent) { try { return Array.from((parent || document).querySelectorAll(sel)); } catch {
                return []; } }

        function getProxyUrl(url) { if (!url) return null; return PROXY_URL + '?url=' + encodeURIComponent(url); }

        function isEmbedUrl(url) {
            if (!url) return false;
            return url.includes('tortuga.tw/embed') || url.includes('/embed/');
        }

        // ====================================================================
        //  РОУТЕР
        // ====================================================================
        const Router = {
            currentRoute: 'main',
            params: {},

            init() {
                window.addEventListener('hashchange', () => this.handleRoute());
                this.handleRoute();
            },

            handleRoute() {
                const hash = window.location.hash.slice(1) || 'main';
                const parts = hash.split('?');
                const route = parts[0];
                const query = parts[1] || '';
                const params = Object.fromEntries(new URLSearchParams(query));

                this.currentRoute = route;
                this.params = params;
                this.navigate(route, params);
            },

            navigate(route, params) {
                document.getElementById('genreSectionsContainer').style.display = 'none';
                document.getElementById('animeContainer').style.display = 'none';
                document.getElementById('paginationRow').innerHTML = '';
                document.getElementById('profilePageContainer').classList.remove('active');
                document.getElementById('profilePageContainer').style.display = 'none';
                document.getElementById('genrePageContainer').classList.remove('active');
                document.getElementById('genrePageContainer').style.display = 'none';
                document.getElementById('searchPageContainer').classList.remove('active');
                document.getElementById('searchPageContainer').style.display = 'none';
                document.getElementById('settingsPageContainer').classList.remove('active');
                document.getElementById('settingsPageContainer').style.display = 'none';

                const hero = document.getElementById('heroWrapper');
                const actions = document.getElementById('actionsRow');
                const logo = document.querySelector('.logo');
                const searchBtn = document.querySelector('.search-circle-btn');

                if (route === 'main') {
                    hero.style.display = 'block';
                    actions.style.display = 'flex';
                    if (logo) logo.style.display = 'flex';
                    if (searchBtn) searchBtn.style.display = 'flex';
                } else {
                    hero.style.display = 'none';
                    actions.style.display = 'none';
                    if (logo) logo.style.display = 'none';
                    if (searchBtn) searchBtn.style.display = 'none';
                }

                document.querySelectorAll('.agnative-leftdock__item.selector').forEach(el => el.classList.remove(
                'is-active'));

                if (route === 'main') {
                    document.querySelector('.agnative-leftdock__item.selector[data-action="main"]')?.classList.add(
                        'is-active');
                    this.showMain();
                } else if (route === 'profile') {
                    document.querySelector('.agnative-leftdock__item.selector[data-action="profile"]')?.classList.add(
                        'is-active');
                    this.showProfile();
                } else if (route === 'genre') {
                    const slug = params.slug || '';
                    const name = params.name || slug;
                    document.querySelector(`.agnative-leftdock__item.selector[data-action="genre-${slug}"]`)?.classList
                        .add('is-active');
                    this.showGenre(slug, name);
                } else if (route === 'search') {
                    document.querySelector('.agnative-leftdock__item.selector[data-action="main"]')?.classList.add(
                        'is-active');
                    this.showSearch();
                } else if (route === 'settings') {
                    document.querySelector('.agnative-leftdock__item.selector[data-action="settings"]')?.classList.add(
                        'is-active');
                    this.showSettings();
                } else {
                    window.location.hash = 'main';
                }
            },

            showMain() {
                document.getElementById('genreSectionsContainer').style.display = 'flex';
                document.getElementById('animeContainer').style.display = 'none';
                document.getElementById('paginationRow').innerHTML = '';
                if (!document.getElementById('genreSectionsContainer').hasChildNodes() ||
                    document.getElementById('genreSectionsContainer').querySelector('.loader')) {
                    loadAndDisplayGenreSections();
                }
                currentTab = 'main';
                currentSearchQuery = '';
                currentCategory = '';
                currentPage = 1;
                document.querySelectorAll('.action-pill').forEach(p => p.classList.remove('active-pill'));
                const si = document.getElementById('searchInput');
                if (si) si.value = '';
                const cb = document.getElementById('searchClearBtn');
                if (cb) cb.classList.remove('visible');
                document.getElementById('animeContainer').style.display = 'none';
                document.getElementById('paginationRow').innerHTML = '';
                syncLeftdockActive();
            },

            showProfile() {
                const container = document.getElementById('profilePageContainer');
                container.style.display = 'block';
                container.classList.add('active');
                renderProfilePage();
                syncLeftdockActive();
            },

            showGenre(slug, name) {
                const container = document.getElementById('genrePageContainer');
                container.style.display = 'block';
                container.classList.add('active');
                renderGenrePage(slug, name);
                syncLeftdockActive();
            },

            showSearch() {
                const container = document.getElementById('searchPageContainer');
                container.style.display = 'block';
                container.classList.add('active');
                renderSearchPage();
                syncLeftdockActive();
            },

            showSettings() {
                const container = document.getElementById('settingsPageContainer');
                container.style.display = 'block';
                container.classList.add('active');
                renderSettingsPage();
                syncLeftdockActive();
            },

            goTo(route, params) {
                const qs = params ? '?' + new URLSearchParams(params).toString() : '';
                window.location.hash = route + qs;
            }
        };

        // ====================================================================
        //  ЗБЕРІГАННЯ
        // ====================================================================
        const Storage = {
            getTheme() { try { return localStorage.getItem('mono_anime_theme') || 'light'; } catch { return 'light'; } },
            setTheme(t) { localStorage.setItem('mono_anime_theme', t); },
            getCategory() { try { return localStorage.getItem('vakdab_category') || ''; } catch { return ''; } },
            setCategory(c) { localStorage.setItem('vakdab_category', c); },
            getProfile() {
                try {
                    const raw = localStorage.getItem('vakdab_profile');
                    if (raw) return JSON.parse(raw);
                } catch {}
                return null;
            },
            setProfile(data) { localStorage.setItem('vakdab_profile', JSON.stringify(data)); },
            getHistory() {
                try {
                    const raw = localStorage.getItem('vakdab_history');
                    return raw ? JSON.parse(raw) : [];
                } catch { return []; }
            },
            setHistory(h) { localStorage.setItem('vakdab_history', JSON.stringify(h)); },
            getBookmarks() {
                try {
                    const raw = localStorage.getItem('vakdab_bookmarks');
                    return raw ? JSON.parse(raw) : [];
                } catch { return []; }
            },
            setBookmarks(b) { localStorage.setItem('vakdab_bookmarks', JSON.stringify(b)); },
            getLikes() {
                try {
                    const raw = localStorage.getItem('vakdab_likes');
                    return raw ? JSON.parse(raw) : {};
                } catch { return {}; }
            },
            setLikes(l) { localStorage.setItem('vakdab_likes', JSON.stringify(l)); },
        };

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
            const settingsBtn = document.getElementById('settingsThemeBtn');
            if (settingsBtn) {
                const icon = settingsBtn.querySelector('.theme-icon');
                if (icon) {
                    icon.textContent = theme === 'dark' ? '☀️' : '🌙';
                }
                settingsBtn.textContent = theme === 'dark' ? '☀️ Світла тема' : '🌙 Темна тема';
                const newIcon = document.createElement('span');
                newIcon.className = 'theme-icon';
                newIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
                settingsBtn.prepend(newIcon);
            }
        }

        function toggleTheme() {
            const next = Storage.getTheme() === 'dark' ? 'light' : 'dark';
            Storage.setTheme(next);
            applyTheme(next);
            showToast(next === 'dark' ? '🌙 Темний режим' : '☀️ Світлий режим');
            if (Router.currentRoute === 'settings') {
                renderSettingsPage();
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        // ====================================================================
        //  API-ФУНКЦІЇ
        // ====================================================================
        async function fetchUA(url) {
            const proxyUrl = getProxyUrl(url);
            const resp = await fetch(proxyUrl);
            if (!resp.ok) throw new Error(`Помилка ${resp.status}`);
            const html = await resp.text();
            return new DOMParser().parseFromString(html, 'text/html');
        }

        function parseAnimeuaCards(doc) {
            const cards = safeQueryAll('.poster', doc);
            if (cards.length) return cards.map(card => {
                const linkEl = card.tagName === 'A' ? card : safeQuery('a', card);
                const href = linkEl?.getAttribute('href') || '';
                const img = safeQuery('img', card);
                const posterSrc = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
                const titleEl = safeQuery('.poster__title', card) || safeQuery('h3', card);
                const title = (titleEl?.textContent || '').trim() || 'Без назви';
                return {
                    mal_id: href.hashCode(),
                    title,
                    url: href.startsWith('http') ? href : ANIMEUA_BASE + href,
                    images: { jpg: { large_image_url: posterSrc.startsWith('http') ? posterSrc : (posterSrc ?
                                ANIMEUA_BASE + posterSrc : '') } },
                    score: null,
                    year: null,
                    from: 'animeua'
                };
            });
            const links = safeQueryAll('a[href*="/anime/"]', doc);
            const unique = new Map();
            links.forEach(a => { if (!unique.has(a.href)) unique.set(a.href, a); });
            return Array.from(unique.values()).map(a => {
                const img = safeQuery('img', a);
                const src = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
                const title = (safeQuery('.poster__title', a)?.textContent || a.textContent || '').trim();
                return {
                    mal_id: a.href.hashCode(),
                    title: title || 'Без назви',
                    url: a.href,
                    images: { jpg: { large_image_url: src.startsWith('http') ? src : ANIMEUA_BASE + src } },
                    score: null,
                    year: null,
                    from: 'animeua'
                };
            });
        }

        async function fetchAnimeuaMain(page) { const doc = await fetchUA(`${ANIMEUA_BASE}/page/${page}/`); return parseAnimeuaCards(
                doc); }

        async function searchAnimeua(query, page) { const doc = await fetchUA(
                `${ANIMEUA_BASE}/index.php?do=search&subaction=search&story=${encodeURIComponent(query)}&page=${page}`);
            return parseAnimeuaCards(doc); }

        async function fetchAnimeuaByCategory(categorySlug, page) {
            const url = page > 1 ? `${ANIMEUA_BASE}/${categorySlug}/page/${page}/` : `${ANIMEUA_BASE}/${categorySlug}/`;
            const doc = await fetchUA(url);
            return parseAnimeuaCards(doc);
        }

        async function fetchAnimeuaTop100() { const doc = await fetchUA(`${ANIMEUA_BASE}/top.html`); return parseAnimeuaCards(
                doc); }

        async function fetchAnimeuaByGenre(genreSlug, page) {
            const url = page > 1 ? `${ANIMEUA_BASE}/${genreSlug}/page/${page}/` : `${ANIMEUA_BASE}/${genreSlug}/`;
            const doc = await fetchUA(url);
            return parseAnimeuaCards(doc);
        }

        async function loadAnimeuaDetail(animeUrl) {
            const doc = await fetchUA(animeUrl);
            let title = '';
            for (const sel of ['.page__subcol-main h1', '.pmovie__title', 'h1.title', 'h1']) {
                const el = safeQuery(sel, doc);
                if (el?.textContent.trim()) { title = el.textContent.trim(); break; }
            }
            let poster = '';
            for (const sel of ['div.page__subcol-side .img-fit-cover img', '.pmovie__poster img', '.anime__poster img']) {
                const el = safeQuery(sel, doc);
                if (el) { const src = el.getAttribute('data-src') || el.getAttribute('src') || '';
                    if (src) { poster = src.startsWith('http') ? src : ANIMEUA_BASE + src; break; } }
            }
            const genres = safeQueryAll('.pmovie__genres a, .genres a', doc).map(a => a.textContent.trim()).filter(Boolean);
            const yearEl = safeQuery('.pmovie__year, .release-year', doc);
            const yearMatch = (yearEl?.textContent || '').match(/\d{4}/);
            let year = yearMatch ? parseInt(yearMatch[0]) : null;
            // Опускаємо рік на 1 вниз
            if (year !== null) year = year - 1;
            let synopsis = '';
            for (const sel of ['.full-text', '.pmovie__description', '.anime__description']) {
                const el = safeQuery(sel, doc);
                if (el?.textContent.trim()) { synopsis = el.textContent.trim(); break; }
            }
            let rating = '';
            const ratingEl = doc.querySelector('.pmovie__age p, .pmovie__age');
            if (ratingEl) rating = ratingEl.textContent.replace('Рейтинг:', '').trim();

            const playerUrls = extractPlayerIframeUrls(doc);
            const allRawSources = [];
            for (const playerUrl of playerUrls) {
                try {
                    let provider = 'Джерело';
                    if (playerUrl.includes('ashdi')) provider = 'Ashdi';
                    else if (playerUrl.includes('vidmoly')) provider = 'Vidmoly';
                    else if (playerUrl.includes('player')) provider = 'Player';
                    const playerHtml = await fetchUA(playerUrl);
                    const text = playerHtml.body?.innerHTML || '';
                    allRawSources.push(...extractSourcesFromText(text, provider));
                    const nestedIframes = safeQueryAll('iframe', playerHtml);
                    for (const nested of nestedIframes) {
                        let nestedUrl = nested.getAttribute('src') || nested.getAttribute('data-src');
                        if (nestedUrl && nestedUrl !== 'about:blank') {
                            if (nestedUrl.startsWith('//')) nestedUrl = 'https:' + nestedUrl;
                            if (!nestedUrl.startsWith('http')) nestedUrl = ANIMEUA_BASE + nestedUrl;
                            const nestedHtml = await fetchUA(nestedUrl);
                            allRawSources.push(...extractSourcesFromText(nestedHtml.body?.innerHTML || '',
                            provider));
                        }
                    }
                } catch (e) { console.warn('Player fetch failed', playerUrl, e); }
            }

            const seasons = {};
            const seenKeys = new Set();
            allRawSources.forEach(s => {
                const sn = s.season || '1',
                    dn = s.dub || 'UA',
                    en = s.episode || '1';
                const uk = `${sn}-${dn}-${en}-${s.file}`;
                if (!seenKeys.has(uk)) {
                    seenKeys.add(uk);
                    if (!seasons[sn]) seasons[sn] = {};
                    if (!seasons[sn][dn]) seasons[sn][dn] = [];
                    seasons[sn][dn].push({ title: s.label, season: sn, episode: en, file: s.file, dub: dn,
                        provider: s.provider });
                }
            });
            for (const s in seasons)
                for (const d in seasons[s]) seasons[s][d].sort((a, b) => parseInt(a.episode) - parseInt(b.episode));

            const sources = [...new Set(allRawSources.map(s => s.provider).filter(Boolean))];
            if (sources.length === 0) sources.push('Основне');

            return {
                mal_id: animeUrl.hashCode(),
                title,
                images: { jpg: { large_image_url: poster, image_url: poster } },
                genres,
                year,
                synopsis,
                seasons,
                url: animeUrl,
                from: 'animeua',
                score: rating,
                sources: sources,
                totalEpisodes: Object.values(seasons).reduce((sum, s) => sum + Object.values(s).reduce((s2, e) => Math.max(
                    s2, e.length), 0), 0)
            };
        }

        function extractPlayerIframeUrls(doc) {
            const selectors = ['.video-responsive iframe', '.player-responsive iframe', '#player iframe',
                '.pmovie__player iframe', 'iframe[src]', 'iframe[data-src]'
            ];
            const urls = [];
            for (const sel of selectors) {
                safeQueryAll(sel, doc).forEach(el => {
                    let src = el.getAttribute('src') || el.getAttribute('data-src');
                    if (!src || src === 'about:blank') return;
                    if (src.startsWith('//')) src = 'https:' + src;
                    if (!src.startsWith('http')) src = ANIMEUA_BASE + src;
                    urls.push(src);
                });
            }
            const scripts = safeQueryAll('script:not([src])', doc);
            for (const s of scripts) {
                const matches = s.textContent.matchAll(/(?:playerUrl|iframeUrl|src)\s*[:=]\s*['"]([^'"]+)['"]/g);
                for (const match of matches) {
                    let url = match[1];
                    if (url.includes('ashdi.vip') || url.includes('vidmoly') || url.includes('player')) {
                        if (url.startsWith('//')) url = 'https:' + url;
                        if (!url.startsWith('http')) url = ANIMEUA_BASE + url;
                        urls.push(url);
                    }
                }
            }
            return [...new Set(urls)];
        }

        function extractSourcesFromText(text, providerName) {
            let sources = [];
            const jsonMatch = text.match(/file\s*:\s*(\[[\s\S]+?\]|\'[\s\S]+?\'|\"[\s\S]+?\"|\{[\s\S]+?\})/i) || text
                .match(/playlist\s*:\s*(\[[\s\S]+?\])/i);
            if (jsonMatch) {
                try {
                    let raw = jsonMatch[1].trim();
                    if ((raw.startsWith("'") && raw.endsWith("'")) || (raw.startsWith('"') && raw.endsWith('"'))) raw = raw
                        .slice(1, -1);
                    if (raw.startsWith('{') && raw.endsWith('}')) raw = `[${raw}]`;
                    const clean = raw.replace(/,\s*\]/g, ']').replace(/,\s*\}/g, '}');
                    const arr = JSON.parse(clean);
                    const walk = (items, dub, season) => {
                        dub = dub || '';
                        season = season || '1';
                        items.forEach(item => {
                            if (item.folder || item.playlist) {
                                let nd = dub,
                                    ns = season;
                                const ft = item.title || '';
                                const sm = ft.match(/[Сс]езон\s*(\d+)/);
                                if (sm) { ns = sm[1]; if (ft.trim().toLowerCase() !== `сезон ${ns}`.toLowerCase()) nd =
                                        ft.replace(/[Сс]езон\s*\d+/g, '').replace(/\//g, '').trim() || dub; } else if (
                                    ft) nd = ft;
                                walk(item.folder || item.playlist, nd, ns);
                            } else if (item.file) {
                                const epT = item.title || 'Серія';
                                let fd = dub || providerName || 'UA',
                                    fs = season;
                                const esm = epT.match(/[Сс]езон\s*(\d+)/);
                                if (esm) fs = esm[1];
                                const epm = epT.match(/(\d+)\s*[Сс]ері[яіяа]|[Сс]ері[яіяа]\s*(\d+)|[Еe]п\.?\s*(\d+)/);
                                sources.push({ label: epT, file: item.file, provider: providerName, dub: fd.trim(),
                                    season: fs, episode: epm ? (epm[1] || epm[2] || epm[3]) : '1' });
                            }
                        });
                    };
                    if (Array.isArray(arr)) walk(arr);
                    else if (arr.file) sources.push({ label: arr.title || 'Озвучка', file: arr.file,
                        provider: providerName, dub: providerName || 'UA', season: '1', episode: '1' });
                } catch (e) { console.warn('JSON parse error', e); }
            }
            if (sources.length === 0) {
                const urlMatches = [...text.matchAll(/https?:\/\/[^\s\'"<>]+\.m3u8[^\s\'"<>]*/g)];
                urlMatches.forEach((m, idx) => {
                    if (!sources.some(s => s.file === m[0])) sources.push({ label: `Потік ${idx+1}`, file: m[0],
                        provider: providerName, dub: providerName || 'UA', season: '1', episode: String(idx +
                            1) });
                });
            }
            return sources;
        }
