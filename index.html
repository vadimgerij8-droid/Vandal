        /* ========== ЗАВАНТАЖУВАЛЬНЕ ВІКНО (LOADING) ========== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 2rem;
            transition: opacity 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: blur(0px);
        }

        .glitch-text {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 2px 2px 0px #444, -2px -2px 0px #aaa;
            animation: glitchPulse 1.2s infinite steps(1);
        }

        @keyframes glitchPulse {
            0%, 100% { text-shadow: 2px 2px 0px #666, -1px -1px 0px #ccc; opacity: 1; }
            25% { text-shadow: -3px 1px 0px #fff, 2px -2px 0px #333; }
            50% { text-shadow: 2px -2px 0px #fff, -1px 1px 0px #000; letter-spacing: 8px; }
            75% { text-shadow: 1px 2px 0px #aaa, -2px -1px 0px #fff; }

            background: #111;
            border: 1px solid #fff;
            padding: 3px;
            box-shadow: 0 0 8px rgba(255,255,255,0.2);

            height: 24px;
            background: #ffffff;
            transition: width 0.1s linear;
        }

        .load-status {
            font-family: monospace;
            font-size: 0.85rem;
            letter-spacing: 1px;
            background: #000;
            padding: 8px 16px;
            border-left: 3px solid #fff;
            color: #ddd;

            align-items: flex-start;

            margin-bottom: 8px;
            color: #fff;
            box-shadow: 0 0 4px rgba(255,255,255,0.3);

        .icon-label {

            background: #000000aa;

            left: 0;

        // створимо іконки робочого столу
        const iconList = [
