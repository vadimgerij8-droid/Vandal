<!-- Firebase Module (завантажується асинхронно, не блокує UI) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
import { 
    getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword,
    createUserWithEmailAndPassword, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { 
    getFirestore, collection, doc, getDocs, setDoc, deleteDoc, 
    query, orderBy, limit, getDoc 
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDxEGgR8KuZh9IEeAEv5yXa2lAzdLGP5jI",
    authDomain: "monoanime-46d6f.firebaseapp.com",
    projectId: "monoanime-46d6f",
    storageBucket: "monoanime-46d6f.firebasestorage.app",
    messagingSenderId: "645025854458",
    appId: "1:645025854458:web:f41af5e48b79517522aa43",
    measurementId: "G-ZJB9D0CJQL"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getFirestore(app);

window.auth = auth;
window.db = db;

window.cloudGetBookmarks = async () => {
    if (!window.currentUser) return [];
    const snapshot = await getDocs(collection(db, 'users', window.currentUser.uid, 'bookmarks'));
    return snapshot.docs.map(d => d.data());
};
window.cloudAddBookmark = async (anime) => {
    if (!window.currentUser) return;
    await setDoc(doc(db, 'users', window.currentUser.uid, 'bookmarks', String(anime.mal_id)), anime);
};
window.cloudRemoveBookmark = async (mal_id) => {
    if (!window.currentUser) return;
    await deleteDoc(doc(db, 'users', window.currentUser.uid, 'bookmarks', String(mal_id)));
};
window.cloudGetHistory = async () => {
    if (!window.currentUser) return [];
    const q = query(collection(db, 'users', window.currentUser.uid, 'history'), orderBy('timestamp', 'desc'), limit(50));
    const snapshot = await getDocs(q);
    return snapshot.docs.map(d => d.data());
};
window.cloudAddHistory = async (anime) => {
    if (!window.currentUser) return;
    await setDoc(doc(db, 'users', window.currentUser.uid, 'history', String(anime.mal_id)), {
        mal_id: anime.mal_id, title: anime.title,
        image_url: anime.images?.jpg?.large_image_url || '',
        url: anime.url || '', score: anime.score, year: anime.year, timestamp: Date.now()
    });
};
window.cloudSaveProgress = async (mal_id, season, dub, episode) => {
    if (!window.currentUser) return;
    await setDoc(doc(db, 'users', window.currentUser.uid, 'progress', String(mal_id)), {
        season, dub, episode, timestamp: Date.now()
    });
};
window.cloudGetProgress = async (mal_id) => {
    if (!window.currentUser) return null;
    const docSnap = await getDoc(doc(db, 'users', window.currentUser.uid, 'progress', String(mal_id)));
    return docSnap.exists() ? docSnap.data() : null;
};

window.authGoogleSignIn = async () => {
    try {
        const provider = new GoogleAuthProvider();
        const result = await signInWithPopup(auth, provider);
        window.currentUser = {
            uid: result.user.uid, displayName: result.user.displayName || '',
            email: result.user.email || '', photoURL: result.user.photoURL || ''
        };
        closeAuthModal();
        showToast('✓ Успішно авторизовані');
    } catch (err) { showToast(`❌ Помилка: ${err.message}`); }
};

window.authEmailLogin = async () => {
    const email = document.getElementById('authEmail')?.value?.trim();
    const password = document.getElementById('authPassword')?.value;
    if (!email || !password) { showToast('❌ Заповніть email та пароль'); return; }
    try {
        const result = await signInWithEmailAndPassword(auth, email, password);
        window.currentUser = {
            uid: result.user.uid, displayName: result.user.displayName || '',
            email: result.user.email || '', photoURL: result.user.photoURL || ''
        };
        closeAuthModal(); showToast('✓ Успішно авторизовані');
    } catch (err) { showToast(`❌ Помилка входу: ${err.message}`); }
};

window.authEmailRegister = async () => {
    const name = document.getElementById('authName')?.value?.trim();
    const email = document.getElementById('authEmail')?.value?.trim();
    const password = document.getElementById('authPassword')?.value;
    if (!name || !email || !password) { showToast('❌ Заповніть усі поля'); return; }
    if (password.length < 6) { showToast('❌ Пароль повинен мати щонайменше 6 символів'); return; }
    try {
        const result = await createUserWithEmailAndPassword(auth, email, password);
        await result.user.updateProfile({ displayName: name });
        window.currentUser = {
            uid: result.user.uid, displayName: result.user.displayName || '',
            email: result.user.email || '', photoURL: result.user.photoURL || ''
        };
        closeAuthModal(); showToast('✓ Акаунт успішно створений');
    } catch (err) { showToast(`❌ Помилка реєстрації: ${err.message}`); }
};

window.authSignOut = async () => {
    await signOut(auth);
    window.currentUser = null;
    updateBadge();
    showToast('✓ Ви вийшли');
    if (document.getElementById('profileModal').style.display === 'flex') openProfileModal();
};

onAuthStateChanged(auth, (user) => {
    window.currentUser = user ? {
        uid: user.uid, displayName: user.displayName || '',
        email: user.email || '', photoURL: user.photoURL || ''
    } : null;
    updateBadge?.();
});
</script>

<!-- Основний додаток (запускається миттєво) -->
<script>
(function() {
    // ===== utils.js =====
    String.prototype.hashCode = function () {
        let hash = 0;
        for (let i = 0; i < this.length; i++) {
            hash = ((hash << 5) - hash) + this.charCodeAt(i);
            hash |= 0;
        }
        return Math.abs(hash);
    };

    function safeQuery(selector, parent = document) {
        try { return parent.querySelector(selector); } catch (e) { return null; }
    }
    function safeQueryAll(selector, parent = document) {
        try { return Array.from(parent.querySelectorAll(selector)); } catch (e) { return []; }
    }
    function debounce(fn, delay) {
        let timer;
        return function (...args) {
            clearTimeout(timer);
            timer = setTimeout(() => fn.apply(this, args), delay);
        };
    }

    // ===== config.js =====
    const PROXY_URL = 'https://monoanime.animegran8.workers.dev';
    const ANIMEUA_BASE = 'https://animeua.club';
    const GENRE_MAP = {
        "Бойові мистецтва": "boivie", "Бойовики": "boyovik", "Воєнні": "voenne", "Гарем": "garems",
        "Драми": "drama", "Детектив": "detektiv", "Демони": "demons", "Комедії": "komik",
        "Роботи": "meha", "Повсякденність": "posyardnevnist", "Пригоди": "adventures",
        "Психологічні": "psih", "Романтика": "romantik", "Надприродні": "weird",
        "Фантастика": "fantastika", "Фентезі": "fentezi", "Школа": "classes", "Еччі": "echhi"
    };

    function getProxyUrl(url) {
        if (!url) return null;
        return PROXY_URL + '?url=' + encodeURIComponent(url);
    }

    // ===== storage.js =====
    const Storage = {
        getBookmarks() { try { return JSON.parse(localStorage.getItem('mono_anime_bookmarks') || '[]'); } catch { return []; } },
        saveBookmarks(arr) { localStorage.setItem('mono_anime_bookmarks', JSON.stringify(arr)); },
        getHistory() { try { return JSON.parse(localStorage.getItem('mono_anime_history') || '[]'); } catch { return []; } },
        addHistory(anime) {
            if (!anime || !anime.mal_id) return;
            const hist = this.getHistory().filter(h => h.mal_id !== anime.mal_id);
            hist.unshift({
                mal_id: anime.mal_id, title: anime.title,
                image_url: anime.images?.jpg?.large_image_url || '',
                url: anime.url || '', score: anime.score, year: anime.year, timestamp: Date.now()
            });
            localStorage.setItem('mono_anime_history', JSON.stringify(hist.slice(0, 50)));
        },
        getTheme() { return localStorage.getItem('mono_anime_theme') || 'light'; },
        setTheme(theme) { localStorage.setItem('mono_anime_theme', theme); }
    };

    window.showToast = function(msg) {
        const toast = document.getElementById('toast');
        if (!toast) return;
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 2200);
    };

    function applyTheme(theme) {
        const btn = document.getElementById('themeToggleBtn');
        if (theme === 'dark') {
            document.body.classList.add('dark-mode');
            if (btn) btn.innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            document.body.classList.remove('dark-mode');
            if (btn) btn.innerHTML = '<i class="fas fa-moon"></i>';
        }
    }

    window.toggleTheme = function() {
        const next = Storage.getTheme() === 'dark' ? 'light' : 'dark';
        Storage.setTheme(next);
        applyTheme(next);
    };

    async function updateBadgeAsync() {
        const badge = document.getElementById('bookmarkBadge');
        if (!badge) return;
        let count = 0;
        if (window.currentUser && window.cloudGetBookmarks) {
            try { count = (await window.cloudGetBookmarks()).length; } catch (e) {}
        } else {
            count = Storage.getBookmarks().length;
        }
        badge.textContent = count;
        badge.style.display = count > 0 ? 'flex' : 'none';
    }
    window.updateBadge = updateBadgeAsync;

    // ===== api.js =====
    async function fetchUA(url) {
        if (!url) throw new Error('empty url');
        const proxyUrl = getProxyUrl(url);
        const resp = await fetch(proxyUrl);
        if (!resp.ok) throw new Error(`status ${resp.status}`);
        const html = await resp.text();
        return new DOMParser().parseFromString(html, 'text/html');
    }

    function parseCards(doc) {
        const cards = safeQueryAll('.poster', doc);
        if (cards.length) {
            return cards.map(card => {
                const linkEl = card.tagName === 'A' ? card : safeQuery('a', card);
                const href = linkEl?.getAttribute('href') || '';
                const img = safeQuery('img', card);
                const posterSrc = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
                const titleEl = safeQuery('.poster__title', card) || safeQuery('h3', card);
                const title = (titleEl?.textContent || '').trim() || 'Без назви';
                return {
                    mal_id: href.hashCode(),
                    title,
                    url: href.startsWith('http') ? href : ANIMEUA_BASE + href,
                    images: { jpg: { large_image_url: posterSrc.startsWith('http') ? posterSrc : (posterSrc ? ANIMEUA_BASE + posterSrc : '') } },
                    score: null, year: null, from: 'animeua'
                };
            });
        }
        return [];
    }

    async function fetchMainPage(page = 1) {
        const doc = await fetchUA(`${ANIMEUA_BASE}/page/${page}/`);
        return parseCards(doc);
    }

    async function searchAnimeUA(query, page = 1) {
        const doc = await fetchUA(`${ANIMEUA_BASE}/index.php?do=search&subaction=search&story=${encodeURIComponent(query)}&page=${page}`);
        return parseCards(doc);
    }

    async function fetchByGenre(genreSlug, page = 1) {
        const doc = await fetchUA(`${ANIMEUA_BASE}/genre/${genreSlug}/page/${page}/`);
        return parseCards(doc);
    }

    async function fetchTop100() {
        const doc = await fetchUA(`${ANIMEUA_BASE}/top.html`);
        return parseCards(doc);
    }

    function fetchGenres() {
        return Object.entries(GENRE_MAP)
            .map(([name, slug]) => ({ slug, name }))
            .sort((a, b) => a.name.localeCompare(b.name, 'uk'));
    }

    function extractSourcesFromText(text, providerName = '') { /* ... (same as before) */ }

    function extractPlayerIframeUrls(doc) {
        const selectors = ['.video-responsive iframe', '.player-responsive iframe', 'iframe[src]'];
        const urls = [];
        for (const sel of selectors) {
            safeQueryAll(sel, doc).forEach(el => {
                let src = el.getAttribute('src') || el.getAttribute('data-src');
                if (!src || src === 'about:blank') return;
                if (src.startsWith('//')) src = 'https:' + src;
                if (!src.startsWith('http')) src = ANIMEUA_BASE + src;
                urls.push(src);
            });
        }
        return [...new Set(urls)];
    }

    async function loadAnimeDetails(animeUrl) {
        const doc = await fetchUA(animeUrl);
        let title = safeQuery('.page__subcol-main h1, .pmovie__title, h1', doc)?.textContent.trim() || '';
        let poster = '';
        const posterEl = safeQuery('.img-fit-cover img, .pmovie__poster img', doc);
        if (posterEl) {
            const src = posterEl.getAttribute('data-src') || posterEl.getAttribute('src') || '';
            poster = src.startsWith('http') ? src : ANIMEUA_BASE + src;
        }
        const genres = safeQueryAll('.pmovie__genres a, .genres a', doc).map(a => a.textContent.trim());
        const yearEl = safeQuery('.pmovie__year', doc);
        const year = yearEl ? parseInt((yearEl.textContent.match(/\d{4}/) || [])[0]) : null;
        let synopsis = safeQuery('.full-text, .pmovie__description', doc)?.textContent.trim() || '';
        const ratingEl = doc.querySelector('.pmovie__age');
        const rating = ratingEl ? ratingEl.textContent.replace('Рейтинг:', '').trim() : '';

        const playerUrls = extractPlayerIframeUrls(doc);
        const allSources = [];
        for (const url of playerUrls) {
            try {
                const playerHtml = await fetchUA(url);
                const text = playerHtml.body?.innerHTML || '';
                allSources.push(...extractSourcesFromText(text, 'Джерело'));
            } catch (e) {}
        }

        const seasons = {};
        allSources.forEach(s => {
            const season = s.season || '1';
            const dub = s.dub || 'UA';
            if (!seasons[season]) seasons[season] = {};
            if (!seasons[season][dub]) seasons[season][dub] = [];
            seasons[season][dub].push(s);
        });

        return {
            mal_id: animeUrl.hashCode(), title,
            images: { jpg: { large_image_url: poster } },
            genres, year, synopsis, seasons,
            url: animeUrl, rating
        };
    }

    // ===== player.js =====
    const hlsInstances = new Map();
    function destroyHlsForVideo(videoEl) {
        if (hlsInstances.has(videoEl)) {
            try { hlsInstances.get(videoEl).destroy(); } catch(e) {}
            hlsInstances.delete(videoEl);
        }
    }
    async function loadVideo(url, videoElement) {
        if (!videoElement) return;
        destroyHlsForVideo(videoElement);
        videoElement.pause();
        videoElement.removeAttribute('src');
        videoElement.load();
        if (!url) return;
        const proxyUrl = getProxyUrl(url);
        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
            const hls = new Hls({ enableWorker: true });
            hlsInstances.set(videoElement, hls);
            hls.loadSource(proxyUrl);
            hls.attachMedia(videoElement);
        } else {
            videoElement.src = proxyUrl;
        }
    }

    // ===== ui.js =====
    function renderCards(list) {
        const container = document.getElementById('animeContainer');
        if (!container) return;
        if (!list.length) { container.innerHTML = '<div class="loader">Нічого не знайдено</div>'; return; }

            <div class="anime-card" data-url="${a.url}">
                <div class="anime-poster"><img src="${a.images.jpg.large_image_url}" alt="${a.title}" loading="lazy"></div>
                <div class="anime-info">
                    <div class="anime-title">${a.title}</div>
                    <div class="anime-meta">${a.year || ''} • UA</div>
                </div>
            </div>
        `).join('');
        container.querySelectorAll('.anime-card').forEach(card =>
            card.addEventListener('click', () => openDetailModal(card.dataset.url))

    }

        `;
    }

    window.closeAuthModal = function() {
        const modal = document.getElementById('authModal');
        if (modal) {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }
    };

    window.switchAuthTab = (tab) => {
        const nameWrap = document.getElementById('authNameWrap');
        const submitBtn = document.getElementById('authSubmitBtn');
        const loginBtn = document.getElementById('tabLoginBtn');
        const regBtn = document.getElementById('tabRegisterBtn');
        if (tab === 'register') {
            nameWrap.style.display = 'block';
            submitBtn.textContent = 'Зареєструватись';
            submitBtn.onclick = window.authEmailRegister;

            regBtn.style.background = '#ffcc00'; regBtn.style.color = '#333';
        } else {
            nameWrap.style.display = 'none';
            submitBtn.textContent = 'Увійти';
            submitBtn.onclick = window.authEmailLogin;

            regBtn.style.background = 'transparent'; regBtn.style.color = 'inherit';
        }

    function renderProfileGrid(list, emptyMsg) {
        if (!list.length) return `<p style="text-align:center;color:#888;padding:2rem;">${emptyMsg}</p>`;
        return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:0.75rem;">
            ${list.slice(0, 24).map(item => `
                <div class="profile-card" data-url="${item.url}" style="cursor:pointer;border-radius:10px;overflow:hidden;">
                    <img src="${item.image_url}" alt="${item.title}" style="width:100%;aspect-ratio:2/3;object-fit:cover;">

                </div>
            `).join('')}
        </div>`;
    }

    window.switchProfileTab = function(btn, tab) {
        document.querySelectorAll('.profile-tab').forEach(b => {
            b.style.background = 'transparent'; b.style.color = 'inherit';
        });
        btn.style.background = '#ffcc00'; btn.style.color = '#333';
        document.getElementById('profileTabBookmarks').style.display = tab === 'bookmarks' ? '' : 'none';
        document.getElementById('profileTabHistory').style.display = tab === 'history' ? '' : 'none';
    };

    window.openProfileModal = async function() {
        const modal = document.getElementById('profileModal');
        const body = document.getElementById('profileBody');
        if (!modal) return;

            const bookmarks = Storage.getBookmarks();

                <div style="text-align:center;padding:1rem 0 2rem;">
                    <div style="width:70px;height:70px;border-radius:50%;background:#ffcc00;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:2rem;"><i class="fas fa-user"></i></div>
                    <div style="font-size:1.1rem;font-weight:700;">Гість</div>
                    <button onclick="window.openAuthModal()" style="margin-top:1rem;padding:0.7rem 1.4rem;border-radius:8px;background:#ffcc00;color:#333;border:none;cursor:pointer;"><i class="fas fa-sign-in-alt"></i> Увійти / Зареєструватись</button>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1.5rem;">
                    <div style="background:rgba(255,204,0,0.15);border-radius:10px;padding:0.9rem;text-align:center;">

                        <div style="font-size:0.75rem;">Обране</div>
                    </div>
                    <div style="background:rgba(0,0,0,0.05);border-radius:10px;padding:0.9rem;text-align:center;">

        body.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-pulse"></i> Завантаження...</div>';
        try {
            const [bookmarks, history] = await Promise.all([
                window.cloudGetBookmarks?.() || [],
                window.cloudGetHistory?.() || []
            ]);
            const user = window.currentUser;
            body.innerHTML = `
                <div style="display:flex;align-items:center;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border);margin-bottom:1.5rem;">

                    <div style="flex:1;"><div style="font-weight:700;">${user.displayName || 'Без імені'}</div><div style="color:#888;">${user.email || ''}</div></div>
                    <button onclick="window.authSignOut()" style="padding:0.4rem 0.9rem;border-radius:8px;border:1px solid #ddd;background:none;cursor:pointer;">Вийти</button>

                <div style="display:flex;gap:0;margin-bottom:1rem;border:1px solid var(--border);border-radius:8px;overflow:hidden;">

    window.openDetailModal = async function(url) {
        const modal = document.getElementById('animeModal');
        const titleEl = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        titleEl.textContent = 'Завантаження...';
        body.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-pulse"></i> Завантаження...</div>';
        try {
            const anime = await loadAnimeDetails(url);
            if (window.currentUser && window.cloudAddHistory) {
                window.cloudAddHistory(anime).catch(() => {});
            } else {
                Storage.addHistory(anime);
            }
            let isBookmarked = false;
            if (window.currentUser && window.cloudGetBookmarks) {
                try { const bm = await window.cloudGetBookmarks(); isBookmarked = bm.some(b => b.mal_id === anime.mal_id); } catch {}
            } else {
                isBookmarked = Storage.getBookmarks().some(b => b.mal_id === anime.mal_id);
            }
            titleEl.textContent = anime.title;
            body.innerHTML = `
                <div style="display:flex; gap:2rem; flex-wrap:wrap;">
                    <div style="flex:0 0 170px;"><img src="${anime.images.jpg.large_image_url}" style="width:100%; border-radius:12px;"></div>
                    <div style="flex:1; min-width:250px;">
                        <div>${anime.genres.map(g => `<span class="tag">${g}</span>`).join('')}</div>
                        <p style="margin:1rem 0;">${anime.synopsis || 'Опис відсутній.'}</p>
                        <button id="toggleBookmarkBtn" class="btn-outline"><i class="fas fa-star"></i> ${isBookmarked ? 'В обраному' : 'Додати в обране'}</button>
                    </div>
                </div>
                <div style="margin-top:1.5rem;">
                    <div style="display:flex; gap:1rem; flex-wrap:wrap; align-items:center; margin-bottom:1rem;">
                        <select id="seasonSelect" class="btn-outline"></select>
                        <select id="dubSelect" class="btn-outline"></select>
                        <select id="episodeSelect" class="btn-outline"></select>
                    </div>
                    <div class="player-container"><video id="detailVideoPlayer" controls crossorigin="anonymous" style="width:100%; height:auto;"></video></div>
                </div>
            `;
            // setup player selects...
        } catch (err) {
            body.innerHTML = `<div class="loader">Помилка: ${err.message}</div>`;
        }
    };

    // ===== app.js =====
    let currentPage = 1, currentSearchQuery = '', currentGenreSlug = null, currentTab = 'main';
    window.changePage = (p) => { currentPage = p; loadContent(); };

    async function loadContent() {
        const container = document.getElementById('animeContainer');
        container.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-pulse"></i> Завантаження...</div>';
        try {
            let list;
            if (currentTab === 'top100') list = await fetchTop100();
            else if (currentSearchQuery) list = await searchAnimeUA(currentSearchQuery, currentPage);
            else if (currentGenreSlug) list = await fetchByGenre(currentGenreSlug, currentPage);
            else list = await fetchMainPage(currentPage);
            renderCards(list);
        } catch (e) {
            container.innerHTML = '<div class="loader">Помилка завантаження</div>';
        }
    }

    async function initGenres() {
        const scroll = document.getElementById('categoryScroll');
        const genres = fetchGenres();
        scroll.querySelectorAll('.category-pill').forEach(p => p.remove());
        const allBtn = document.createElement('button');
        allBtn.className = 'category-pill active-pill';
        allBtn.textContent = 'Усі';
        allBtn.onclick = () => { currentGenreSlug = null; currentPage = 1; loadContent(); };
        scroll.appendChild(allBtn);
        genres.forEach(g => {
            const btn = document.createElement('button');
            btn.className = 'category-pill';
            btn.textContent = g.name;
            btn.onclick = () => { currentGenreSlug = g.slug; currentPage = 1; loadContent(); };
            scroll.appendChild(btn);
        });
    }

    applyTheme(Storage.getTheme());
    updateBadgeAsync();

    document.getElementById('themeToggleBtn').addEventListener('click', window.toggleTheme);
    document.getElementById('profileBtn').addEventListener('click', window.openProfileModal);
    document.getElementById('searchInput').addEventListener('input', debounce(() => {
        currentSearchQuery = document.getElementById('searchInput').value.trim();
        currentPage = 1; loadContent();
    }, 500));
    document.getElementById('top100Btn').addEventListener('click', () => { currentTab = 'top100'; currentPage = 1; loadContent(); });
    document.getElementById('randomBtn').addEventListener('click', () => openDetailModal(`${ANIMEUA_BASE}/index.php?do=rand`));
    document.getElementById('closeModalBtn').addEventListener('click', () => {
        document.getElementById('animeModal').style.display = 'none';
        document.body.style.overflow = '';
    });
    document.getElementById('closePlayerBtn').addEventListener('click', () => {
        document.getElementById('playerModal').style.display = 'none';
        document.body.style.overflow = '';
    });
    document.getElementById('closeProfileBtn').addEventListener('click', () => {
        document.getElementById('profileModal').style.display = 'none';
        document.body.style.overflow = '';
    });

    initGenres().then(() => loadContent());
})();
